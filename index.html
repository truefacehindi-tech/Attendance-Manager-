*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh}

::-webkit-scrollbar-track{background:#0b1120}
::-webkit-scrollbar-thumb{background:#4f46e5;border-radius:3px}
.hd{padding:10px 14px;border-bottom:1px solid rgba(99,102,241,.07);position:sticky;top:0;z-index:100;background:rgba(11,17,32,.95);backdrop-filter:blur(12px)}
.hd-in{max-width:1400px;margin:0 auto}
.logo{font-weight:800;font-size:clamp(16px,3.5vw,22px);background:linear-gradient(135deg,#818cf8,#c084fc,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:none;gap:2px;margin-top:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tb{padding:6px 10px;border:none;background:0;color:#4b5563;cursor:pointer;font-weight:600;font-size:11px;border-radius:7px;white-space:nowrap;font-family:inherit}
.tb:hover{color:#94a3b8}
.tb.on{color:#a5b4fc;background:rgba(99,102,241,.12)}
.mn{max-width:1400px;margin:0 auto;padding:12px 14px}
.cd{background:rgba(22,30,50,.65);border:1px solid rgba(99,102,241,.07);border-radius:12px;overflow:hidden}
.inp{padding:8px 10px;border-radius:7px;border:1px solid rgba(99,102,241,.15);background:rgba(12,18,36,.85);color:#e2e8f0;font-size:12px;outline:none;width:100%;font-family:inherit}
.inp:focus{border-color:#6366f1}
.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:11px;font-family:inherit}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.bd{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.bg2{background:rgba(255,255,255,.03);color:#94a3b8;border:1px solid rgba(255,255,255,.06)}
.bg2:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.rw{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.025);gap:8px;transition:background .08s}
.rw:hover{background:rgba(99,102,241,.03)}
.rw.act{background:rgba(99,102,241,.07)!important;outline:1px solid rgba(99,102,241,.18);outline-offset:-1px}
.cb{min-width:34px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;font-family:'JetBrains Mono',monospace;padding:0 3px;transition:.08s}
.cb:hover{transform:scale(1.08)}
.cb:focus{outline:2px solid #818cf8;outline-offset:1px;z-index:1}
.sa{max-height:58vh;overflow-y:auto}
.badge{padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-block}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#1e293b;border:1px solid rgba(99,102,241,.12);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.toast{position:fixed;top:12px;right:12px;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12px;z-index:9999;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.25);display:none}
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{padding:5px 3px;font-weight:600;position:sticky;top:0;background:#161e32;z-index:2;text-align:center}
.tbl td{padding:3px 2px;text-align:center;border-bottom:1px solid rgba(255,255,255,.015)}
.tbl .sk{position:sticky;left:0;background:#161e32;z-index:1;text-align:left;min-width:130px}
.tbl th.sk{z-index:3}
.sc{padding:12px 14px;border-radius:10px;background:rgba(12,18,36,.45);border:1px solid rgba(255,255,255,.04)}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.cg{display:flex;flex-direction:column;gap:2px}
.cl{font-size:9px;color:#4b5563;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.kb{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.92);border:1px solid rgba(99,102,241,.12);border-radius:9px;padding:5px 12px;font-size:9px;color:#64748b;z-index:50;display:flex;gap:8px;backdrop-filter:blur(6px)}
.kb b{color:#a5b4fc;font-family:'JetBrains Mono',monospace;background:rgba(99,102,241,.12);padding:0 4px;border-radius:3px;font-weight:600}
@media(max-width:640px){.cb{min-width:30px;height:24px;font-size:9px}.rw{padding:6px 10px;gap:6px}.hm{display:none!important}.kb{display:none}}
</style>

// STORAGE — IndexedDB (300MB+) + localStorage fallback
const IDB={
  db:null,
  name:'AttendanceManager',
  store:'data',
  async init(){
    return new Promise((resolve,reject)=>{
      try{
        const req=indexedDB.open(IDB.name,1);
        req.onupgradeneeded=e=>{
          const db=e.target.result;
          if(!db.objectStoreNames.contains(IDB.store)){
            db.createObjectStore(IDB.store);
          }
        };
        req.onsuccess=e=>{IDB.db=e.target.result;resolve(true);};
        req.onerror=()=>{console.warn('IndexedDB failed, using localStorage');resolve(false);};
      }catch{resolve(false);}
    });
  },
  async set(k,v){
    if(!IDB.db)return false;
    return new Promise(resolve=>{
      try{
        const tx=IDB.db.transaction(IDB.store,'readwrite');
        tx.objectStore(IDB.store).put(v,'am_'+k);
        tx.oncomplete=()=>resolve(true);
        tx.onerror=()=>resolve(false);
      }catch{resolve(false);}
    });
  },
  async get(k){
    if(!IDB.db)return null;
    return new Promise(resolve=>{
      try{
        const tx=IDB.db.transaction(IDB.store,'readonly');
        const req=tx.objectStore(IDB.store).get('am_'+k);
        req.onsuccess=()=>resolve(req.result!==undefined?req.result:null);
        req.onerror=()=>resolve(null);
      }catch{resolve(null);}
    });
  },
  async del(k){
    if(!IDB.db)return;
    try{
      const tx=IDB.db.transaction(IDB.store,'readwrite');
      tx.objectStore(IDB.store).delete('am_'+k);
    }catch{}
  },
  async keys(){
    if(!IDB.db)return[];
    return new Promise(resolve=>{
      try{
        const tx=IDB.db.transaction(IDB.store,'readonly');
        const req=tx.objectStore(IDB.store).getAllKeys();
        req.onsuccess=()=>resolve(req.result||[]);
        req.onerror=()=>resolve([]);
      }catch{resolve([]);}
    });
  },
  async size(){
    if(!IDB.db)return{used:0,mb:'0'};
    return new Promise(resolve=>{
      try{
        const tx=IDB.db.transaction(IDB.store,'readonly');
        const store=tx.objectStore(IDB.store);
        const req=store.openCursor();
        let total=0;
        req.onsuccess=e=>{
          const cursor=e.target.result;
          if(cursor){
            const val=cursor.value;
            total+=typeof val==='string'?val.length*2:JSON.stringify(val).length*2;
            cursor.continue();
          }else{
            const mb=(total/(1024*1024)).toFixed(2);
            resolve({used:total,mb});
          }
        };
        req.onerror=()=>resolve({used:0,mb:'0'});
      }catch{resolve({used:0,mb:'0'});}
    });
  }
};

// LS now saves to BOTH IndexedDB (primary) and localStorage (fallback for small data)
const LS={
  s(k,v){
    try{
      const json=JSON.stringify(v);
      // Always try IndexedDB
      if(IDB.db){IDB.set(k,json);}
      // localStorage only for small data (skip yearly)
      if(!k.startsWith('yr_')){
        try{localStorage.setItem('am_'+k,json);}catch{}
      }
      return true;
    }catch(e){
      console.error('Save failed for '+k+':',e.message);
      return false;
    }
  },
  g(k){
    // Sync read from localStorage (IndexedDB is async)
    try{const v=localStorage.getItem('am_'+k);return v?JSON.parse(v):null}catch{return null}
  },
  async gAsync(k){
    // Try IndexedDB first
    try{
      const v=await IDB.get(k);
      if(v)return JSON.parse(v);
    }catch{}
    // Fallback to localStorage
    return LS.g(k);
  },
  _warn(msg){
    const el=document.getElementById('storage-warn');
    if(el){el.textContent='\u26a0\ufe0f '+msg;el.style.display='block';setTimeout(()=>el.style.display='none',8000);}
  },
  health(){
    try{
      let total=0;
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        total+=localStorage.getItem(k).length;
      }
      const mb=(total/(1024*1024)).toFixed(2);
      const pct=Math.min(100,Math.round(total/(5*1024*1024)*100));
      return {used:mb,pct,ok:pct<85};
    }catch{return{used:'?',pct:0,ok:true};}
  }
};

// Async load from IndexedDB (runs after init)
async function loadFromIDB(){
  if(!IDB.db)return;
  try{
    const e=await LS.gAsync('e');if(e&&e.length)S.emps=e;
    const a=await LS.gAsync('a');if(a&&Object.keys(a).length)S.att=a;
    const a2=await LS.gAsync('a2');if(a2&&Object.keys(a2).length)S.att2=a2;
    const h=await LS.gAsync('h');if(h&&Object.keys(h).length)S.hols=h;
    
    // Load yearly from IndexedDB
    const yrIdx=await LS.gAsync('yr_idx');
    if(yrIdx&&Array.isArray(yrIdx)){
      for(const m of yrIdx){
        const d=await LS.gAsync('yr_'+m);
        if(d)yrAtt[m]=d;
      }
    }
    
    // Load other data
    const od=await LS.gAsync('otdata');if(od)otData=od;
    const nd=await LS.gAsync('nightdata');if(nd)nightData=nd;
    const td=await LS.gAsync('todolist');if(td)todoList=td;
    const ad=await LS.gAsync('amrdata');if(ad)amrData=ad;
    const vl=await LS.gAsync('vwlog');if(vl)vwLog=vl;
    const al=await LS.gAsync('actlog');if(al)actLog=al;
    const md=await LS.gAsync('mddata');if(md)mdData=md;
    
    render();
    console.log('IndexedDB loaded successfully');
  }catch(e){console.warn('IDB load error:',e);}
}

// Migrate localStorage yearly data to IndexedDB
async function migrateToIDB(){
  if(!IDB.db)return;
  let migrated=0;
  try{
    for(let i=localStorage.length-1;i>=0;i--){
      const k=localStorage.key(i);
      if(k&&k.startsWith('am_yr_')){
        const v=localStorage.getItem(k);
        const shortK=k.replace('am_','');
        await IDB.set(shortK,v);
        localStorage.removeItem(k);
        migrated++;
      }
    }
    if(migrated)console.log('Migrated '+migrated+' yearly months to IndexedDB');
  }catch(e){console.warn('Migration error:',e);}
}

function gA(k,d){return S.att[k+'|'+d]||'';}
function gA2(k,d){return S.att2[k+'|'+d]||'';}

// KEY FIX: Update attendance WITHOUT full re-render
function mA(k,d,c){
  const key=k+'|'+d;
  const old=S.att[key]||'';
  if(!c)delete S.att[key];else S.att[key]=c;
  saveA();
  addLog('Attendance',`${k.split('~')[0]} on ${d}: ${old||'blank'} → ${c||'cleared'}`);
  // Only update the specific row instead of full render
  updateRow(k);
  updateStats();
}

function getFil(){
  const raw=S.sr.toLowerCase().trim();
  const ctf=S.ctF||'all';
  // Support comma-separated multi-search
  const terms=raw?raw.split(',').map(t=>t.trim()).filter(t=>t):[];
  return S.emps.filter(e=>{
    let ms=true;
    if(terms.length){
      const nm=e.n.toLowerCase();const id=e.i.toLowerCase();
      ms=terms.some(t=>nm.includes(t)||id.includes(t));
    }
    const ppMatch=S.ppF==='all'||e.p===S.ppF;
    const ctMatch=ctf==='all'||(ctf==='S'?e.ct==='S':e.ct!=='S');
    return ms&&ppMatch&&ctMatch;
  });
}
function getStats(dt){const s={};CC.forEach(c=>s[c.c]=0);s.un=0;S.emps.forEach(e=>{const c=gA(ek(e),dt);if(c&&c in s)s[c]++;else s.un++;});return s;}

function renderAttList(){
  const container=document.getElementById('att-list');
  const countEl=document.getElementById('att-count');

  const pagEl=document.getElementById('att-pag');
  if(!container)return;

  const fil=getFil();
  const total=fil.length;
  const ps=S.page*S.PS;
  const pe=Math.min(ps+S.PS,total);
  const page=fil.slice(ps,pe);
  const totalPages=Math.ceil(total/S.PS);
  const stats=getStats(S.dt);

  if(countEl)countEl.textContent=`Showing ${ps+1}-${pe} of ${total}`;
  
  if(statsEl){
    let sh='';
    Object.entries(stats).forEach(([k,v])=>{if(v>0&&k!=='un'){const s=gc(k);sh+=`<span class="badge" style="background:${s.bg};color:${s.cl}">${k}:${v}</span> `;}});
    if(stats.un>0)sh+=`<span class="badge" style="background:#334155;color:#94a3b8">—:${stats.un}</span>`;
    statsEl.innerHTML=sh;
  }

  let h='';
  page.forEach((emp,idx)=>{
    const key=ek(emp);const code=gA(key,S.dt);const cs=gc(code);
    const rowIdx=ps+idx;
    h+=`<div class="rw ${S.focusRow===rowIdx?'act':''}" data-ek="${key}" data-ri="${rowIdx}">
      <div class="code-badge" style="width:28px;height:28px;border-radius:7px;background:${code?cs.bg:'rgba(255,255,255,.03)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:${code?cs.cl:'#374151'};font-family:'JetBrains Mono',monospace;flex-shrink:0">${code||'—'}</div>

        <div style="font-size:9px;color:#4b5563">${emp.i} · ${ppN(emp.p)}</div>
      </div>
      <div class="code-btns" style="display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end">
        ${CC.map(c=>`<button class="cb" data-code="${c.c}" tabindex="-1" style="background:${code===c.c?c.cl:c.bg};color:${code===c.c?'#fff':c.cl};border-color:${code===c.c?c.cl:'transparent'}" onclick="event.stopPropagation();mA('${key}','${S.dt}','${c.c}')" title="${c.l}">${c.c}</button>`).join('')}
        <button class="cb" data-code="" tabindex="-1" style="background:#1e293b;color:#475569" onclick="event.stopPropagation();mA('${key}','${S.dt}','')" title="Clear">✕</button>

  if(pagEl){

    let ph=`<div style="padding:8px 12px;border-top:1px solid rgba(255,255,255,.04);display:flex;justify-content:center;gap:4px;flex-wrap:wrap">`;

let focusedCode=0; // index into CC array

function focusRow(idx){
  S.focusRow=idx;
  // Remove old highlight
  document.querySelectorAll('.rw.act').forEach(el=>el.classList.remove('act'));
  const fil=getFil();
  const emp=fil[idx];
  if(!emp)return;
  const el=document.querySelector(`[data-ri="${idx}"]`);
  if(el){
    el.classList.add('act');
    el.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

document.addEventListener('keydown',function(e){
  if(S.tab!=='att')return;
  // Don't intercept if user is in an input field (EXCEPT arrow keys)
  const inInput=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
  
  if(inInput&&e.key!=='Escape')return;

  const fil=getFil();
  const total=fil.length;
  if(!total)return;

  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(S.focusRow<0)S.focusRow=S.page*S.PS;
    else S.focusRow=Math.min(S.focusRow+1,total-1);
    // Auto page
    const newPage=Math.floor(S.focusRow/S.PS);
    if(newPage!==S.page){S.page=newPage;renderAttList();}
    focusRow(S.focusRow);
  }
  else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(S.focusRow<0)S.focusRow=S.page*S.PS;
    else S.focusRow=Math.max(S.focusRow-1,0);
    const newPage=Math.floor(S.focusRow/S.PS);
    if(newPage!==S.page){S.page=newPage;renderAttList();}
    focusRow(S.focusRow);
  }
  else if(e.key==='ArrowRight'){
    e.preventDefault();
    focusedCode=Math.min(focusedCode+1,CC.length); // CC.length = clear button
  }
  else if(e.key==='ArrowLeft'){
    e.preventDefault();
    focusedCode=Math.max(focusedCode-1,0);
  }
  else if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(S.focusRow<0)return;
    const emp=fil[S.focusRow];
    if(!emp)return;
    const key=ek(emp);
    const code=focusedCode<CC.length?CC[focusedCode].c:'';
    mA(key,S.dt,code);
    // Auto advance to next row
    if(S.focusRow<total-1){
      S.focusRow++;
      const newPage=Math.floor(S.focusRow/S.PS);
      if(newPage!==S.page){S.page=newPage;renderAttList();}
      focusRow(S.focusRow);
    }
  }
  else if(e.key==='Tab'){
    e.preventDefault();
    // Tab cycles through codes for current row
    focusedCode=(focusedCode+1)%(CC.length+1);
    showCodeHint();
  }
  else if(e.key==='Escape'){
    S.focusRow=-1;
    document.querySelectorAll('.rw.act').forEach(el=>el.classList.remove('act'));
    if(inInput)document.activeElement.blur();
  }
});

function showCodeHint(){
  let hint=document.getElementById('code-hint');
  if(!hint){
    hint=document.createElement('div');
    hint.id='code-hint';
    hint.className='kb';
    document.body.appendChild(hint);
  }
  const codes=[...CC.map(c=>c.c),'✕'];
  let h='';
  codes.forEach((c,i)=>{
    const isActive=i===focusedCode;
    h+=`<span style="${isActive?'color:#a5b4fc;font-weight:700;text-decoration:underline':'color:#4b5563'};font-family:'JetBrains Mono',monospace;font-size:10px">${c}</span>`;
  });
  hint.innerHTML='<b>Tab</b> cycle code | <b>Space</b> apply | <b>↑↓</b> rows | '+h;
  clearTimeout(hint._t);
  hint._t=setTimeout(()=>{if(hint)hint.remove();},5000);
}

// ══════════════════════════════════════════════════
// LETTER GENERATOR — with persistent storage
// ══════════════════════════════════════════════════
let ltMonths = [];
let ltEditingIdx = -1; // -1 = new, else edit index

// ── Storage helpers ──
function ltEmpList() {
  try { return JSON.parse(localStorage.getItem('lt_emps') || '[]'); } catch { return []; }
}
function ltSaveList(list) {
  try { localStorage.setItem('lt_emps', JSON.stringify(list)); } catch {}
  // Also try persistent storage
  try { window.storage && window.storage.set('lt_emps', JSON.stringify(list)); } catch {}
}

// ── Load from persistent storage on init ──
(async function ltLoad() {
  try {
    const r = await window.storage.get('lt_emps');
    if (r && r.value) {
      const data = JSON.parse(r.value);
      if (Array.isArray(data) && data.length > 0) {
        localStorage.setItem('lt_emps', JSON.stringify(data));
      }
    }
  } catch {}
})();

function ltNewForm() {
  ltEditingIdx = -1;
  ltMonths = [];
  const fw = document.getElementById('lt-form-wrap');
  if (fw) fw.style.display = 'block';
  ['lt-name','lt-father','lt-eid','lt-class','lt-job','lt-feedback'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const vtc = document.getElementById('lt-vtc'); if (vtc) vtc.value = '28';
  const dt = document.getElementById('lt-date'); if (dt) dt.value = S.dt;
  ltRenderMonths();
  fw && fw.scrollIntoView({ behavior: 'smooth' });
}

function ltEditEmp(idx) {
  const list = ltEmpList();
  if (idx < 0 || idx >= list.length) return;
  const emp = list[idx];
  ltEditingIdx = idx;
  ltMonths = emp.months.map(m => ({ month: m.month, days: m.days }));
  const fw = document.getElementById('lt-form-wrap');
  if (fw) fw.style.display = 'block';
  setTimeout(() => {
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
    set('lt-name', emp.name);
    set('lt-father', emp.fathersName);
    set('lt-eid', emp.eid);
    set('lt-vtc', emp.vtcAttendance || 28);
    set('lt-class', emp.classroomPeriod);
    set('lt-job', emp.jobTrainingPeriod);
    set('lt-feedback', emp.feedback);
    set('lt-date', emp.letterDate || S.dt);
    ltRenderMonths();
    fw && fw.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

function ltCancelForm() {
  ltEditingIdx = -1; ltMonths = [];
  const fw = document.getElementById('lt-form-wrap');
  if (fw) fw.style.display = 'none';
}

function ltSaveEmp() {
  const name     = document.getElementById('lt-name')?.value?.trim().toUpperCase();
  const father   = document.getElementById('lt-father')?.value?.trim().toUpperCase();
  const eid      = document.getElementById('lt-eid')?.value?.trim();
  const vtc      = document.getElementById('lt-vtc')?.value?.trim() || '28';
  const classroom= document.getElementById('lt-class')?.value?.trim();
  const jobTr    = document.getElementById('lt-job')?.value?.trim();
  const feedback = document.getElementById('lt-feedback')?.value?.trim();
  const letterDate = document.getElementById('lt-date')?.value || S.dt;

  if (!name || !eid) { toast('Name aur Employee ID required hai!', false); return; }
  if (!ltMonths.length) { toast('Kam se kam ek month add karo!', false); return; }

  const emp = { name, fathersName: father, eid, vtcAttendance: parseInt(vtc)||28,
    classroomPeriod: classroom, jobTrainingPeriod: jobTr, feedback, letterDate,
    months: ltMonths.map(m => ({ month: m.month, days: m.days })) };

  const list = ltEmpList();
  if (ltEditingIdx >= 0) { list[ltEditingIdx] = emp; toast('Updated: ' + name); }
  else { list.push(emp); toast('Saved: ' + name); }
  ltSaveList(list);
  ltEditingIdx = -1; ltMonths = [];
  render();
}

function ltDeleteEmp(idx) {
  const list = ltEmpList();
  if (!confirm('Delete ' + (list[idx]?.name || '') + '?')) return;
  list.splice(idx, 1);
  ltSaveList(list);
  render();
}

function ltRenderMonths() {
  const el = document.getElementById('lt-months-list');
  if (!el) return;
  if (!ltMonths.length) {
    el.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:6px">Koi month nahi. Neeche se add karo.</div>';
    return;
  }
  const total = ltMonths.reduce((s, m) => s + m.days, 0);
  let h = '<div style="border:1px solid rgba(34,197,94,.2);border-radius:8px;overflow:hidden">';
  h += '<div style="display:grid;grid-template-columns:1fr 80px 30px;background:rgba(34,197,94,.08);padding:5px 10px;font-size:10px;font-weight:700;color:#22c55e"><span>MONTH</span><span style="text-align:center">DAYS</span><span></span></div>';

// ── Load docx library ──
function ltLoadDocx(cb) {
  if (window.docx) { cb(); return; }
  // Already preloaded at app start — retry after short delay
  let tries = 0;
  const check = () => {
    if (window.docx) { cb(); return; }
    if (++tries > 20) { toast('docx library load nahi hua! Internet check karo.', true); return; }
    setTimeout(check, 200);
  };
  check();
}

// ── Generate ALL as ZIP of .docx ──
function ltGenerateAll() {
  const list = ltEmpList();
  if (!list.length) { toast('Koi employee saved nahi!', false); return; }
  toast('Generating docx files...'); 
  ltLoadDocx(() => {
    // Load JSZip too
    if (typeof JSZip === 'undefined') {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload = () => ltZipAll(list);
      s.onerror = () => toast('JSZip load nahi hua!', true);
      document.head.appendChild(s);
    } else {
      ltZipAll(list);
    }
  });
}

async function ltZipAll(list) {
  const zip = new JSZip();
  toast('Building ' + list.length + ' Word files...');
  for (const emp of list) {
    try {
      const buf = await ltBuildDocx(emp);
      const fname = 'Letter_' + emp.name.replace(/\s+/g,'_') + '_' + emp.eid + '.docx';
      zip.file(fname, buf);
    } catch(e) { console.error('docx error:', e); }
  }
  zip.generateAsync({ type: 'blob' }).then(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Training_Letters_All.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    toast(list.length + ' Word letters ZIP downloaded!');
  });
}

// ── Generate single .docx ──
function ltMakeAndDownload(emp) {
  ltLoadDocx(async () => {
    try {
      const buf = await ltBuildDocx(emp);
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Letter_' + emp.name.replace(/\s+/g,'_') + '_' + emp.eid + '.docx';
      a.click();
      URL.revokeObjectURL(a.href);
      toast(emp.name + ' ka Word letter downloaded!');
    } catch(e) { toast('Error: ' + e.message, true); }
  });
}

// ══════════════════════════════════════════════════
// FIRST IN / LAST OUT PROCESSOR
// ══════════════════════════════════════════════════
let filoData = []; // processed results

function filoProcess() {
  const fileInput = document.getElementById('filo-file');
  if (!fileInput || !fileInput.files[0]) { toast('File select karo!', false); return; }
  const statusEl = document.getElementById('filo-status');
  const resultsEl = document.getElementById('filo-results');
  if (statusEl) statusEl.textContent = '⏳ Processing...';
  if (resultsEl) resultsEl.innerHTML = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (!rows.length) { toast('File empty hai!', false); return; }

      // Detect columns
      const keys = Object.keys(rows[0]);
      const eidCol  = keys.find(k => /employee.?id|person.?no|emp.?id/i.test(k)) || keys[0];
      const nameCol = keys.find(k => /name/i.test(k)) || keys[1];
      const dateCol = keys.find(k => /date/i.test(k)) || keys[2];
      const inCol   = keys.find(k => /in.?time|first.?in/i.test(k)) || keys[3];
      const outCol  = keys.find(k => /out.?time|last.?out/i.test(k)) || keys[5];

      // Parse rows
      function parseTime(val) {
        if (!val) return null;
        const s = String(val).trim();
        const m = s.match(/(\d{1,2}):(\d{2}):(\d{2})/);
        if (m) return { h: +m[1], min: +m[2], s: +m[3], str: s };
        // Excel serial number (fraction of day)
        if (!isNaN(s)) {
          const frac = parseFloat(s) % 1;
          const totalSec = Math.round(frac * 86400);
          const h = Math.floor(totalSec / 3600);
          const min = Math.floor((totalSec % 3600) / 60);
          const sec = totalSec % 60;
          return { h, min, s: sec, str: String(h).padStart(2,'0')+':'+String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0') };
        }
        return null;
      }

      function parseDate(val) {
        if (!val) return null;
        const s = String(val).trim();
        // YYYY-MM-DD
        let m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (m) return new Date(+m[1], +m[2]-1, +m[3]);
        // DD/MM/YYYY
        m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (m) return new Date(+m[3], +m[2]-1, +m[1]);
        // Excel serial
        if (!isNaN(s)) {
          const d = new Date(Math.round((+s - 25569) * 86400 * 1000));
          return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
        }
        return null;
      }

      function fmtDate(d) {
        if (!d) return '';
        return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
      }

      function addDay(d) {
        const nd = new Date(d);
        nd.setDate(nd.getDate() + 1);
        return nd;
      }

      function dateKey(d) {
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }

      // Build lookup: eid → dateKey → row
      const lookup = {};
      rows.forEach(function(r) {
        const eid  = String(r[eidCol]||'').trim();
        const date = parseDate(r[dateCol]);
        if (!eid || !date) return;
        if (!lookup[eid]) lookup[eid] = {};
        lookup[eid][dateKey(date)] = r;
      });

      // Process each row
      const processed = [];
      const skipSet = new Set(); // eid|dateKey = night-OUT rows to skip

      rows.forEach(function(r) {
        const eid   = String(r[eidCol]||'').trim();
        const name  = String(r[nameCol]||'').trim();
        const date  = parseDate(r[dateCol]);
        const inT   = parseTime(r[inCol]);
        const outT  = parseTime(r[outCol]);
        if (!eid || !date || !inT) return;

        const key = eid + '|' + dateKey(date);
        if (skipSet.has(key)) return; // skip — already used as night OUT

        const samePunch = inT && outT && (inT.str === outT.str);

        // Night shift: IN >= 21:00
        if (inT.h >= 21) {
          const nextDate = addDay(date);
          const nextKey  = dateKey(nextDate);
          const nextRow  = lookup[eid] && lookup[eid][nextKey];

          if (nextRow) {
            const nextInT = parseTime(nextRow[inCol]);
            if (nextInT && nextInT.h >= 6 && nextInT.h <= 9) {
              // Real OUT = next day IN time
              const inMins  = inT.h * 60 + inT.min;
              const outMins = nextInT.h * 60 + nextInT.min + 1440; // +1440 = overnight
              const workMin = outMins - inMins;
              const wHrs    = Math.floor(workMin/60) + 'h ' + (workMin%60) + 'm';
              const code    = workMin >= 420 ? 'U' : 'SHORT(U)';

              processed.push({
                eid, name,
                inDate:  fmtDate(date),
                outDate: fmtDate(nextDate),
                inTime:  inT.str,
                outTime: nextInT.str,
                workHrs: wHrs,
                workMin: workMin,
                code:    code,
                remark:  'Night shift — OUT next day'
              });
              skipSet.add(eid + '|' + nextKey);
              return;
            }
          }

          // No next day match
          processed.push({
            eid, name,
            inDate:  fmtDate(date),
            outDate: fmtDate(date),
            inTime:  inT.str,
            outTime: outT ? outT.str : '--',
            workHrs: '--',
            workMin: 0,
            code:    'SKIPPED',
            remark:  'Night IN — no next day OUT (06-09)'
          });
          return;
        }

        // Same punch
        if (samePunch) {
          processed.push({
            eid, name,
            inDate:  fmtDate(date),
            outDate: fmtDate(date),
            inTime:  inT.str,
            outTime: outT ? outT.str : '--',
            workHrs: '--',
            workMin: 0,
            code:    'SKIPPED',
            remark:  'Single punch — IN=OUT'
          });
          return;
        }

        // Normal same-day
        const inM  = inT.h * 60 + inT.min;
        const outM = outT ? (outT.h * 60 + outT.min) : inM;
        let workMin = outM - inM;
        if (workMin < 0) workMin += 1440;
        const wHrs = Math.floor(workMin/60) + 'h ' + (workMin%60) + 'm';
        const code = workMin >= 420 ? 'P' : 'SHORT(P)';

        processed.push({
          eid, name,
          inDate:  fmtDate(date),
          outDate: fmtDate(date),
          inTime:  inT.str,
          outTime: outT ? outT.str : '--',
          workHrs: wHrs,
          workMin: workMin,
          code:    code,
          remark:  workMin < 420 ? 'Short duty — ' + wHrs : ''
        });
      });

      filoData = processed;

      // Count
      const counts = {};
      processed.forEach(function(p) { counts[p.code] = (counts[p.code]||0) + 1; });

      if (statusEl) {
        statusEl.innerHTML =
          '<span style="color:#22c55e;font-weight:700">✅ ' + processed.length + ' entries processed</span> &nbsp;|&nbsp; ' +
          '<span style="color:#16a34a">P: ' + (counts['P']||0) + '</span> &nbsp;' +
          '<span style="color:#818cf8">U: ' + (counts['U']||0) + '</span> &nbsp;' +
          '<span style="color:#f59e0b">SHORT: ' + ((counts['SHORT(P)']||0)+(counts['SHORT(U)']||0)) + '</span> &nbsp;' +
          '<span style="color:#ef4444">SKIPPED: ' + (counts['SKIPPED']||0) + '</span>';
      }

      // Check if att file uploaded
      const dlBtn = document.getElementById('filo-dl-btn');
      const attFileInput = document.getElementById('filo-att-file');
      if (attFileInput && attFileInput.files[0]) {
        // Hide download button until att file also processed
        if (dlBtn) dlBtn.style.display = 'none';
        if (statusEl) statusEl.innerHTML = '<span style="color:#f59e0b">⏳ Att register loading...</span>';
        const attReader = new FileReader();
        attReader.onload = function(ae) {
          try {
            const attWb = XLSX.read(ae.target.result, { type: 'array' });
            const attWs = attWb.Sheets[attWb.SheetNames[0]];
            const attRows = XLSX.utils.sheet_to_json(attWs, { defval: '' });
            // Build att lookup: eid → {DD.MM.YYYY: code}
            const attKeys = attRows.length ? Object.keys(attRows[0]) : [];
            const attEidCol = attKeys.find(k => /employee.?id|person.?no/i.test(k)) || attKeys[1];
            
            // Normalize date column keys to DD.MM.YYYY format
            function normalizeAttDateKey(k) {
              const s = String(k).trim();
              // Already DD.MM.YYYY
              if (/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
              // DD/MM/YYYY
              let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
              if (m) return String(m[1]).padStart(2,'0')+'.'+String(m[2]).padStart(2,'0')+'.'+m[3];
              // YYYY-MM-DD
              m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
              if (m) return m[3]+'.'+m[2]+'.'+m[1];
              // Excel serial number as date
              if (!isNaN(s) && Number(s) > 40000) {
                const d = new Date(Math.round((Number(s) - 25569) * 86400 * 1000));
                return String(d.getUTCDate()).padStart(2,'0')+'.'+String(d.getUTCMonth()+1).padStart(2,'0')+'.'+d.getUTCFullYear();
              }
              return null;
            }
            
            const attDateCols = attKeys.filter(k => normalizeAttDateKey(k) !== null);
            const attLookup = {};
            attRows.forEach(function(r) {
              const eid = String(r[attEidCol]||'').trim();
              if (!eid) return;
              attLookup[eid] = {};
              attDateCols.forEach(function(dc) {
                const normalKey = normalizeAttDateKey(dc);
                if (normalKey) {
                  attLookup[eid][normalKey] = String(r[dc]||'').trim();
                }
              });
            });
            // Debug: log first employee
            const firstEid = Object.keys(attLookup)[0];
            if (firstEid) {
              const sample = Object.entries(attLookup[firstEid]).slice(0,3);
              console.log('Att lookup sample:', firstEid, sample);
            }
            // Attach att code ONLY for problem entries (SKIPPED + SHORT)
            processed.forEach(function(p) {
              const isProblem = p.code === 'SKIPPED' || p.code.indexOf('SHORT') >= 0;
              if (!isProblem) return; // P and U entries — skip
              const empAtt = attLookup[p.eid];
              if (empAtt) {
                const code = empAtt[p.inDate] || '';
                p.attCode = code || '(blank)';
                p.attFound = true;
              } else {
                p.attCode = '—';
                p.attFound = false;
              }
              // Conclusion
              const ac = p.attCode;
              if (!p.attFound)              p.conclusion = '❓ Not in att file';
              else if (ac === '(blank)' || ac === '') p.conclusion = '⬜ Blank/Weekly off';
              else if (ac === 'A')          p.conclusion = '🔴 Absent';
              else if (/^P/.test(ac))       p.conclusion = '✅ P — bio mismatch';
              else if (/^U/.test(ac))       p.conclusion = '🌙 U — bio mismatch';
              else if (/^S$/.test(ac))      p.conclusion = '📋 S (Sunday)';
              else if (/WE|HE|HD/.test(ac)) p.conclusion = '🟡 Holiday/Weekend';
              else if (/CL|SL|EL|LL|ML/.test(ac)) p.conclusion = '📝 Leave: ' + ac;
              else if (ac === 'R')          p.conclusion = '😴 Rest day';
              else if (ac === 'HN')         p.conclusion = '🌙 HN';
              else                          p.conclusion = ac;
            });
            filoData = processed;
            // Update status with att info
            const mismatches = processed.filter(function(p){ return p.attFound && /^P|^U|^S$/.test(p.attCode||''); }).length;
            const absents = processed.filter(function(p){ return p.attCode === 'A'; }).length;
            const counts2 = {};
            processed.forEach(function(p) { counts2[p.code] = (counts2[p.code]||0) + 1; });
            if (statusEl) {
              statusEl.innerHTML =
                '<span style="color:#22c55e;font-weight:700">✅ ' + processed.length + ' entries</span> &nbsp;|&nbsp; ' +
                '<span style="color:#16a34a">P: ' + (counts2['P']||0) + '</span> &nbsp;' +
                '<span style="color:#818cf8">U: ' + (counts2['U']||0) + '</span> &nbsp;' +
                '<span style="color:#f59e0b">SHORT: ' + ((counts2['SHORT(P)']||0)+(counts2['SHORT(U)']||0)) + '</span> &nbsp;' +
                '<span style="color:#ef4444">SKIPPED: ' + (counts2['SKIPPED']||0) + '</span>' +
                ' &nbsp;|&nbsp; <span style="color:#a5b4fc">Att matched — Mismatch: ' + mismatches + ', Absent: ' + absents + '</span>';
            }
            filoRenderResults(processed);
            // NOW show download button — att code attached
            const dlBtn2 = document.getElementById('filo-dl-btn');
            if (dlBtn2) dlBtn2.style.display = 'inline-block';
            toast('Done! Att codes matched.');
          } catch(err2) {
            toast('Att file error: ' + err2.message, true);
            filoData = processed;
            filoRenderResults(processed);
            const dlBtn2 = document.getElementById('filo-dl-btn');
            if (dlBtn2) dlBtn2.style.display = 'inline-block';
          }
        };
        attReader.readAsArrayBuffer(attFileInput.files[0]);
      } else {
        // No att file — show download immediately
        if (dlBtn) dlBtn.style.display = 'inline-block';
        filoData = processed;
        const counts = {};
        processed.forEach(function(p) { counts[p.code] = (counts[p.code]||0) + 1; });
        if (statusEl) {
          statusEl.innerHTML =
            '<span style="color:#22c55e;font-weight:700">✅ ' + processed.length + ' entries processed</span> &nbsp;|&nbsp; ' +
            '<span style="color:#16a34a">P: ' + (counts['P']||0) + '</span> &nbsp;' +
            '<span style="color:#818cf8">U: ' + (counts['U']||0) + '</span> &nbsp;' +
            '<span style="color:#f59e0b">SHORT: ' + ((counts['SHORT(P)']||0)+(counts['SHORT(U)']||0)) + '</span> &nbsp;' +
            '<span style="color:#ef4444">SKIPPED: ' + (counts['SKIPPED']||0) + '</span>';
        }
        filoRenderResults(processed);
        toast('Processing done! ' + processed.length + ' entries');
      }

    } catch(err) {
      toast('Error: ' + err.message, true);
      if (statusEl) statusEl.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
}

function filoRenderResults(data) {
  const el = document.getElementById('filo-results');
  if (!el) return;

  const CODE_COLORS = {
    'P':        { bg:'rgba(22,163,74,.12)',  txt:'#16a34a' },
    'U':        { bg:'rgba(129,140,248,.15)',txt:'#818cf8' },
    'SHORT(P)': { bg:'rgba(245,158,11,.12)', txt:'#f59e0b' },
    'SHORT(U)': { bg:'rgba(245,158,11,.12)', txt:'#f59e0b' },
    'SKIPPED':  { bg:'rgba(239,68,68,.12)',  txt:'#ef4444' }
  };

  const hasAttData = data.length > 0 && data[0].attCode !== undefined;
  // Filter controls
  let h = '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px">';
  h += '<select class="inp" id="filo-filter" style="max-width:120px;font-size:10px" onchange="filoFilterRender()">';
  h += '<option value="all">All Bio Codes</option>';
  ['P','U','SHORT(P)','SHORT(U)','SKIPPED'].forEach(function(c){
    h += '<option value="'+c+'">'+c+'</option>';
  });
  h += '</select>';
  if (hasAttData) {
    h += '<select class="inp" id="filo-att-filter" style="max-width:140px;font-size:10px" onchange="filoFilterRender()">';
    h += '<option value="all">All Att Codes</option>';
    h += '<option value="mismatch">🔥 Mismatch (P/U/S)</option>';
    h += '<option value="absent">🔴 Absent (A)</option>';
    ['P','U','S','R','WE','HD','HE','CL','SL','EL','HN','(blank)'].forEach(function(c){
      h += '<option value="'+c+'">'+c+'</option>';
    });
    h += '</select>';
  }
  h += '<input class="inp" id="filo-search" placeholder="🔍 Name ya ID..." style="max-width:150px;font-size:10px" oninput="filoFilterRender()">';
  h += '</div>';

  h += '<div id="filo-table-wrap">';
  h += filoTableHTML(data);
  h += '</div>';
  el.innerHTML = h;
}

function filoFilterRender() {
  const filter    = document.getElementById('filo-filter')?.value || 'all';
  const attFilter = document.getElementById('filo-att-filter')?.value || 'all';
  const search    = (document.getElementById('filo-search')?.value || '').toLowerCase().trim();
  const filtered  = filoData.filter(function(r) {
    const codeMatch = filter === 'all' || r.code === filter;
    const attMatch  = attFilter === 'all' || (r.attCode && r.attCode.trim() === attFilter) ||
                      (attFilter === 'mismatch' && r.attFound && /^P|^U|^S$/.test(r.attCode||'')) ||
                      (attFilter === 'absent'   && r.attCode === 'A');
    const srMatch   = !search || r.eid.toLowerCase().includes(search) || r.name.toLowerCase().includes(search);
    return codeMatch && attMatch && srMatch;
  });
  const wrap = document.getElementById('filo-table-wrap');
  if (wrap) wrap.innerHTML = filoTableHTML(filtered);
}

function filoTableHTML(data) {
  if (!data.length) return '<div style="padding:12px;text-align:center;color:#4b5563;font-size:11px">Koi entry nahi mili.</div>';
  const CODE_COLORS = {
    'P':        { bg:'rgba(22,163,74,.12)',  txt:'#16a34a' },
    'U':        { bg:'rgba(129,140,248,.15)',txt:'#818cf8' },
    'SHORT(P)': { bg:'rgba(245,158,11,.12)', txt:'#f59e0b' },
    'SHORT(U)': { bg:'rgba(245,158,11,.12)', txt:'#f59e0b' },
    'SKIPPED':  { bg:'rgba(239,68,68,.12)',  txt:'#ef4444' }
  };
  const ATT_COLORS = {
    'A':'rgba(239,68,68,.18)','P':'rgba(22,163,74,.15)','P*':'rgba(22,163,74,.15)',
    'U':'rgba(129,140,248,.18)','U*':'rgba(129,140,248,.18)','S':'rgba(168,85,247,.12)',
    'R':'rgba(100,116,139,.12)','HN':'rgba(129,140,248,.12)','CL':'rgba(59,130,246,.15)',
    'SL':'rgba(236,72,153,.12)','EL':'rgba(20,184,166,.12)','WE':'rgba(99,102,241,.10)',
    'HD':'rgba(249,115,22,.12)','HE':'rgba(139,92,246,.12)','(blank)':'rgba(255,255,255,.04)'
  };
  // hasAtt: true if any entry in data has attCode set
  const hasAtt = data.some(function(r){ return r.attCode !== undefined; });
  const cols = ['ID','Name','IN Date','OUT Date','IN Time','OUT Time','Work','Bio Code'];
  if (hasAtt) cols.push('Att Code','Conclusion');
  else cols.push('Remark');
  let h = '<table style="width:100%;border-collapse:collapse;font-size:9px">';
  h += '<thead><tr style="background:rgba(99,102,241,.1)">';
  cols.forEach(function(col){
    h += '<th style="padding:4px 6px;text-align:left;color:#a5b4fc;font-weight:700;white-space:nowrap;border-bottom:1px solid rgba(99,102,241,.15)">'+col+'</th>';
  });
  h += '</tr></thead><tbody>';
  data.forEach(function(r, i) {
    const cc = CODE_COLORS[r.code] || {bg:'transparent',txt:'#94a3b8'};
    const bg = i % 2 === 0 ? 'rgba(255,255,255,.02)' : 'transparent';
    const nightRow = r.inDate !== r.outDate;
    const ac = r.attCode || '';
    const acBg = ATT_COLORS[ac] || 'rgba(255,255,255,.03)';
    const acTxt = ac==='A'?'#ef4444':/^P/.test(ac)?'#16a34a':/^U/.test(ac)?'#818cf8':'#94a3b8';
    h += '<tr style="background:'+bg+'">';
    h += '<td style="padding:3px 6px;color:#94a3b8;white-space:nowrap">'+r.eid+'</td>';
    h += '<td style="padding:3px 6px;font-weight:600;white-space:nowrap">'+r.name+'</td>';
    h += '<td style="padding:3px 6px;text-align:center;white-space:nowrap">'+r.inDate+'</td>';
    h += '<td style="padding:3px 6px;text-align:center;color:'+(nightRow?'#818cf8':'#94a3b8')+';white-space:nowrap">'+r.outDate+'</td>';
    h += '<td style="padding:3px 6px;text-align:center;white-space:nowrap">'+r.inTime+'</td>';
    h += '<td style="padding:3px 6px;text-align:center;color:'+(nightRow?'#818cf8':'#94a3b8')+';white-space:nowrap">'+r.outTime+'</td>';
    h += '<td style="padding:3px 6px;text-align:center">'+r.workHrs+'</td>';
    h += '<td style="padding:3px 6px;text-align:center;background:'+cc.bg+';color:'+cc.txt+';font-weight:700;border-radius:3px">'+r.code+'</td>';
    if (hasAtt) {
      const isProbRow = r.code === 'SKIPPED' || (r.code && r.code.indexOf('SHORT') >= 0);
      if (isProbRow && r.attCode !== undefined) {
        h += '<td style="padding:3px 6px;text-align:center;background:'+acBg+';color:'+acTxt+';font-weight:700;border-radius:3px">'+(ac||'—')+'</td>';
        h += '<td style="padding:3px 6px;color:#64748b;font-size:8px;white-space:nowrap">'+(r.conclusion||'')+'</td>';
      } else {
        h += '<td style="padding:3px 6px;color:#4b5563;font-size:8px;text-align:center">—</td>';
        h += '<td style="padding:3px 6px;color:#4b5563;font-size:8px">'+(r.remark||'')+'</td>';
      }
    } else {
      h += '<td style="padding:3px 6px;color:#64748b;font-size:8px">'+(r.remark||'')+'</td>';
    }
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function filoDownload() {
  if (!filoData.length) { toast('Pehle Process karo!', false); return; }

  const wb2 = XLSX.utils.book_new();

  // Sheet 1: Full data
  // hasAtt2: true if ANY entry has attCode set (SKIPPED/SHORT entries)
  const hasAtt2 = filoData.some(function(r){ return r.attCode !== undefined; });
  const rows1 = filoData.map(function(r, i) {
    const isProbRow = r.code === 'SKIPPED' || (r.code && r.code.indexOf('SHORT') >= 0);
    const row = {
      'SN': i+1,
      'Employee ID': r.eid,
      'Name': r.name,
      'IN Date': r.inDate,
      'OUT Date': r.outDate,
      'IN Time': r.inTime,
      'OUT Time': r.outTime,
      'Work Hours': r.workHrs,
      'Bio Code': r.code,
    };
    if (hasAtt2) {
      // Att Code only for SKIPPED/SHORT — P/U mein blank
      row['Att Code']   = isProbRow ? (r.attCode || '') : '';
      row['Conclusion'] = isProbRow ? (r.conclusion || '') : '';
    } else {
      row['Remark'] = r.remark;
    }
    return row;
  });
  const ws1 = XLSX.utils.json_to_sheet(rows1);
  ws1['!cols'] = [{wch:5},{wch:13},{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11},{wch:10},{wch:10},{wch:30}];
  XLSX.utils.book_append_sheet(wb2, ws1, 'Processed Data');

  // Mismatch sheet (att P/U but bio SKIPPED/SHORT)
  if (hasAtt2) {
    const mismatch = filoData.filter(function(r){ return r.attFound && /^P|^U|^S$/.test(r.attCode||''); });
    if (mismatch.length) {
      const wsMM = XLSX.utils.json_to_sheet(mismatch.map(function(r,i){
        return {'SN':i+1,'Employee ID':r.eid,'Name':r.name,'IN Date':r.inDate,'OUT Date':r.outDate,'IN Time':r.inTime,'OUT Time':r.outTime,'Work Hours':r.workHrs,'Bio Code':r.code,'Att Code':r.attCode,'Conclusion':r.conclusion};
      }));
      wsMM['!cols'] = [{wch:5},{wch:13},{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11},{wch:10},{wch:10},{wch:25}];
      XLSX.utils.book_append_sheet(wb2, wsMM, 'Mismatch (Att PU bio SKIP)');
    }
    // Absent sheet
    const absents = filoData.filter(function(r){ return r.attCode === 'A'; });
    if (absents.length) {
      const wsAbs = XLSX.utils.json_to_sheet(absents.map(function(r,i){
        return {'SN':i+1,'Employee ID':r.eid,'Name':r.name,'IN Date':r.inDate,'OUT Date':r.outDate,'IN Time':r.inTime,'OUT Time':r.outTime,'Work Hours':r.workHrs,'Bio Code':r.code,'Att Code':'A'};
      }));
      wsAbs['!cols'] = [{wch:5},{wch:13},{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11},{wch:10},{wch:8}];
      XLSX.utils.book_append_sheet(wb2, wsAbs, 'Absent in Att');
    }
  }

  // Sheet 2: Night shift only
  const nightRows = filoData.filter(function(r){ return r.code === 'U' || r.code === 'SHORT(U)'; });
  if (nightRows.length) {
    const ws2 = XLSX.utils.json_to_sheet(nightRows.map(function(r,i){
      return {'SN':i+1,'Employee ID':r.eid,'Name':r.name,'IN Date':r.inDate,'OUT Date':r.outDate,'IN Time':r.inTime,'OUT Time':r.outTime,'Work Hours':r.workHrs,'Code':r.code};
    }));
    ws2['!cols'] = [{wch:5},{wch:13},{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11},{wch:10}];
    XLSX.utils.book_append_sheet(wb2, ws2, 'Night Shift (U)');
  }

  // Sheet 3: Problem entries
  const probRows = filoData.filter(function(r){ return r.code === 'SKIPPED' || r.code.includes('SHORT'); });
  if (probRows.length) {
    const ws3 = XLSX.utils.json_to_sheet(probRows.map(function(r,i){
      return {'SN':i+1,'Employee ID':r.eid,'Name':r.name,'IN Date':r.inDate,'OUT Date':r.outDate,'IN Time':r.inTime,'OUT Time':r.outTime,'Work Hours':r.workHrs,'Code':r.code,'Issue':r.remark};
    }));
    ws3['!cols'] = [{wch:5},{wch:13},{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb2, ws3, 'Problem Entries');
  }

  // Sheet 4: Summary
  const counts = {};
  filoData.forEach(function(r){ counts[r.code] = (counts[r.code]||0)+1; });
  const summaryRows = [
    {'Category':'Total Processed','Count':filoData.length},
    {'Category':'P — Present Day (7+ hrs)','Count':counts['P']||0},
    {'Category':'U — Night Shift (7+ hrs)','Count':counts['U']||0},
    {'Category':'SHORT(P) — Short Day','Count':counts['SHORT(P)']||0},
    {'Category':'SHORT(U) — Short Night','Count':counts['SHORT(U)']||0},
    {'Category':'SKIPPED — Single Punch','Count':counts['SKIPPED']||0},
  ];
  const ws4 = XLSX.utils.json_to_sheet(summaryRows);
  ws4['!cols'] = [{wch:36},{wch:10}];
  XLSX.utils.book_append_sheet(wb2, ws4, 'Summary');

  XLSX.writeFile(wb2, 'FirstInLastOut_Processed.xlsx');
  toast('Excel downloaded!');
}

function rosterShowSummary(type){
  var el=document.getElementById('roster-summary');if(!el)return;
  if(!type){el.innerHTML='';return;}
  
  var emps=S.emps;
  
  function getMD(emp){
    return mdData.find(function(m){return m.pid===emp.i||String(m.sn)===String(emp.s);})||{};
  }
  function getGender(emp){
    var md=getMD(emp);
    if(md.gender)return md.gender.toUpperCase().charAt(0)==='F'?'Female':'Male';
    return 'Male';
  }
  function getGroup(emp){
    var md=getMD(emp);
    return md.egText||md.egc||'Unknown';
  }
  function getSubGroup(emp){
    var md=getMD(emp);
    return md.esgText||md.esgCode||emp.desig||'Unknown';
  }
  function getJobText(emp){
    var md=getMD(emp);
    return md.jobText||emp.desig||'Unknown';
  }
  function getEmpCat(emp){
    var md=getMD(emp);
    var eg=(md.egText||md.egc||'').toUpperCase();
    var esg=(md.esgText||md.esgCode||'').toUpperCase();
    var cat=(md.empCat||'').toUpperCase();
    // Executive
    if(eg.includes('EXEC')||esg.match(/^E-?[0-9]/)||cat.includes('EXEC'))return 'Executive';
    // Monthly Rated: T&S grades, EXCV categories, Clerk grades
    if(esg.includes('T&S')||esg.includes('EXCV')||esg.includes('CLERK')||cat.includes('MONTHLY')||cat.includes('MR'))return 'Monthly Rated';
    // Daily Rated: CAT I through CAT VI, or DR
    if((esg.indexOf('CAT I')>=0||esg.indexOf('CAT II')>=0||esg.indexOf('CAT III')>=0||esg.indexOf('CAT IV')>=0||esg.indexOf('CAT V')>=0||esg.indexOf('CAT VI')>=0)||cat.includes('DAILY')||cat.includes('DR'))return 'Daily Rated';
    // Trainee
    if(esg.includes('TRAINEE'))return 'Daily Rated';
    // Fallback - check emp group text
    if(eg.includes('NON-EXEC')||eg.includes('NON EXEC')){
      // Non-exec without specific sub-group
      if(esg)return 'Monthly Rated';
      return 'Daily Rated';
    }
    return 'Other';
  }
  
  var h='';
  
  if(type==='all'){
    // COMPREHENSIVE SUMMARY
    
    // 1. Executive / Monthly / Daily count with gender
    var cats={};
    emps.forEach(function(e){
      var c=getEmpCat(e);
      var g=getGender(e);
      if(!cats[c])cats[c]={Male:0,Female:0,Total:0};
      cats[c][g]++;cats[c].Total++;

function toggleContract(sn){
  const emp=S.emps.find(e=>e.s===sn);
  if(!emp)return;
  emp.ct=emp.ct==='S'?'U':'S';
  saveE();pS('e',S.emps);
  renderRoster();
  toast(emp.n+' → '+(emp.ct==='S'?'Surface':'Underground'));
}

function setEmpCat(eid,cat){
  const emp=S.emps.find(e=>e.i===eid);
  if(!emp)return;
  emp.empCat=cat;
  saveE();try{pS('e',S.emps);}catch{}
  renderRoster();
  toast(emp.n+' → '+(cat||'Category cleared'));
}

// ═══════ ROSTER REORDER (Drag & Drop) ═══════
let rosterReorderMode=false;
let rosterDragEid=null;
let rosterUndoState=null;

let rosterSwapFirst=null;

function rosterMoveTop(idx){
  if(idx<=0)return;
  const emp=S.emps.splice(idx,1)[0];
  S.emps.unshift(emp);
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  renderRoster();
  toast(emp.n+' → #1');
}

function rosterJumpTo(idx){
  const emp=S.emps[idx];
  if(!emp)return;
  const pos=prompt(emp.n+' (abhi #'+(idx+1)+')\n\nKis position pe rakhna hai? (1-'+S.emps.length+')');
  if(!pos)return;
  const target=parseInt(pos)-1;
  if(isNaN(target)||target<0||target>=S.emps.length)return alert('Invalid position!');
  if(target===idx)return;
  S.emps.splice(idx,1);
  S.emps.splice(target,0,emp);
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  renderRoster();
  toast(emp.n+' → #'+(target+1));
}

function rosterSwapMode(){
  if(rosterSwapFirst!==null){
    rosterSwapFirst=null;
    toast('Swap cancelled');
    renderRoster();
    return;
  }
  rosterSwapFirst='waiting';
  toast('Pehle employee tap karo swap ke liye...');
  // Temporarily override row clicks
  setTimeout(()=>{
    const rows=document.querySelectorAll('.drag-row');
    rows.forEach(row=>{
      row.style.cursor='crosshair';
      row.onclick=function(){
        const eid=this.dataset.eid;
        const gidx=parseInt(this.dataset.gidx);
        if(rosterSwapFirst==='waiting'){
          rosterSwapFirst=gidx;
          this.style.background='rgba(245,158,11,.2)';
          this.style.border='2px solid #f59e0b';
          toast('Ab doosra employee tap karo...');
        } else if(typeof rosterSwapFirst==='number'){
          // Do the swap
          const temp=S.emps[rosterSwapFirst];
          S.emps[rosterSwapFirst]=S.emps[gidx];
          S.emps[gidx]=temp;
          S.emps.forEach((e,i)=>e.s=i+1);
          saveE();
          rosterSwapFirst=null;
          renderRoster();
          toast('Swap done!');
        }
      };
    });
  },100);
}

function rosterUndoReorder(){
  if(!rosterUndoState||!rosterUndoState.length)return alert('Koi undo state nahi hai!');
  if(!confirm('Reorder undo karna hai? Sab changes reset ho jayenge.'))return;
  const newEmps=[];
  rosterUndoState.forEach(eid=>{
    const emp=S.emps.find(e=>e.i===eid);
    if(emp)newEmps.push(emp);
  });
  // Add any new employees not in undo state
  S.emps.forEach(e=>{if(!rosterUndoState.includes(e.i))newEmps.push(e);});
  S.emps=newEmps;
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  renderRoster();
  toast('Undo done! Original order restored.');
}


// ═══ ROSTER ← MASTER DATA SYNC ═══
function rosterSyncFromMD(){
  if(!mdData.length){alert("Master Data load nahi hai! Pehle Master Data tab mein upload karo.");return;}
  var updated=0,notFound=0;
  var log=[];
  S.emps.forEach(function(emp){
    var eid=String(emp.i||"").trim();
    var md=mdData.find(function(m){return String(m.pid||""  ).trim()===eid;});
    if(!md){notFound++;return;}
    var changed=[];
    var newDesig=String(md.pos||"").trim();
    if(newDesig&&newDesig!==emp.desig){emp.desig=newDesig;changed.push("Desig");}
    var rawG=String(md.gender||"").trim().toUpperCase();
    var newGender=rawG==="FEMALE"||rawG==="F"?"Female":rawG==="MALE"||rawG==="M"?"Male":"";
    if(newGender&&newGender!==emp.gender){emp.gender=newGender;changed.push("Gender:"+newGender);}
    var egText=String(md.egText||"").trim();
    var empCatRaw=String(md.empCat||"").trim().toUpperCase();
    var esg=String(md.esgText||md.esgCode||"").toUpperCase();
    var newCat="";
    if(egText==="Executives"||esg.indexOf("E-")===0){newCat="Executive";}
    else if(empCatRaw.indexOf("MONTHLY RATED")===0){newCat="Monthly Rated";}
    else if(empCatRaw.indexOf("DAILY RATED")===0){newCat="Daily Rated";}
    else if(egText==="Apprentice"){newCat="Daily Rated";}
    else if(esg.indexOf("T&S")>=0||esg.indexOf("CLERK")>=0){newCat="Monthly Rated";}
    else if(esg.indexOf("CAT ")>=0||esg.indexOf("TRAINEE")>=0){newCat="Daily Rated";}
    if(newCat&&newCat!==emp.empCat){emp.empCat=newCat;changed.push("Cat:"+newCat);}
    if(changed.length){updated++;log.push(emp.n+": "+changed.join(", "));}
  });
  saveE();
  try{pS("e",S.emps);}catch(ex){}
  renderRoster();
  var summary="Sync complete! "+updated+" updated, "+notFound+" not in MD";
  toast(summary);
  alert(summary);
}

function rosterSortByPP(){
  if(!confirm('Pay Point wise sort karna hai?'))return;
  const ppOrder=[...new Set(S.emps.map(e=>e.p))].sort();
  S.emps.sort((a,b)=>{
    const pa=ppOrder.indexOf(a.p),pb=ppOrder.indexOf(b.p);
    if(pa!==pb)return pa-pb;
    return(a.n||'').localeCompare(b.n||'');
  });

function rosterMoveUp(idx){
  if(idx<=0)return;
  const fil=getFil();
  const emp=fil[idx];
  const prevEmp=fil[idx-1];
  // Find actual indices in S.emps
  const ai=S.emps.findIndex(e=>e.i===emp.i);
  const bi=S.emps.findIndex(e=>e.i===prevEmp.i);
  if(ai<0||bi<0)return;
  // Swap
  [S.emps[ai],S.emps[bi]]=[S.emps[bi],S.emps[ai]];
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  renderRoster();
}

function rosterMoveDown(idx){
  const fil=getFil();
  if(idx>=fil.length-1)return;
  const emp=fil[idx];
  const nextEmp=fil[idx+1];
  const ai=S.emps.findIndex(e=>e.i===emp.i);
  const bi=S.emps.findIndex(e=>e.i===nextEmp.i);
  if(ai<0||bi<0)return;
  [S.emps[ai],S.emps[bi]]=[S.emps[bi],S.emps[ai]];
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  renderRoster();
}

function rosterInitDrag(){
  const list=document.getElementById('roster-list');
  if(!list)return;
  const rows=list.querySelectorAll('.drag-row');
  
  let dragEl=null;
  let dragClone=null;
  let startY=0;
  let startIdx=-1;
  let dropIndicator=null;
  
  // Create drop indicator
  dropIndicator=document.createElement('div');
  dropIndicator.style.cssText='height:3px;background:#f59e0b;border-radius:2px;display:none;margin:2px 0;transition:all .1s';
  
  rows.forEach(row=>{
    // Touch events
    row.addEventListener('touchstart',function(e){
      if(!rosterReorderMode)return;
      dragEl=this;
      startIdx=parseInt(this.dataset.gidx);
      startY=e.touches[0].clientY;
      
      // Create visual clone
      dragClone=document.createElement('div');
      dragClone.style.cssText='position:fixed;left:10px;right:10px;padding:10px;background:rgba(245,158,11,.15);border:2px solid #f59e0b;border-radius:10px;z-index:9999;pointer-events:none;font-size:12px;font-weight:600;color:#f59e0b;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)';
      const emp=S.emps.find(emp2=>emp2.i===this.dataset.eid);
      dragClone.textContent='☰ '+(emp?emp.n:'')+ ' (SN '+(startIdx+1)+')';
      document.body.appendChild(dragClone);
      
      this.style.opacity='0.4';
      try{navigator.vibrate(30);}catch{}
    },{passive:true});
    
    row.addEventListener('touchmove',function(e){
      if(!dragEl||!dragClone)return;
      e.preventDefault();
      const y=e.touches[0].clientY;
      dragClone.style.top=(y-20)+'px';
      
      // Find which row we're over
      rows.forEach(r=>{
        const rect=r.getBoundingClientRect();
        if(y>rect.top&&y<rect.bottom&&r!==dragEl){
          r.style.borderTop='3px solid #f59e0b';
        } else {
          r.style.borderTop='';
        }
      });
    },{passive:false});
    
    row.addEventListener('touchend',function(e){
      if(!dragEl||!dragClone)return;
      
      const y=e.changedTouches[0].clientY;
      let dropIdx=-1;
      
      rows.forEach(r=>{
        r.style.borderTop='';
        const rect=r.getBoundingClientRect();
        if(y>rect.top&&y<rect.bottom){
          dropIdx=parseInt(r.dataset.gidx);
        }
      });
      
      dragEl.style.opacity='1';
      dragClone.remove();
      dragClone=null;
      
      if(dropIdx>=0&&dropIdx!==startIdx){
        rosterReorder(startIdx,dropIdx);
      }
      
      dragEl=null;
      try{navigator.vibrate(15);}catch{}
    },{passive:true});
  });
}

function rosterReorder(fromIdx,toIdx){
  const fil=getFil();
  if(fromIdx<0||fromIdx>=fil.length||toIdx<0||toIdx>=fil.length)return;
  
  const movingEid=fil[fromIdx].i;
  const targetEid=fil[toIdx].i;
  
  // Find actual positions in S.emps
  const fromPos=S.emps.findIndex(e=>e.i===movingEid);
  const toPos=S.emps.findIndex(e=>e.i===targetEid);
  if(fromPos<0||toPos<0)return;
  
  // Remove from old position and insert at new
  const [moved]=S.emps.splice(fromPos,1);
  S.emps.splice(toPos,0,moved);
  
  // Update SN numbers
  S.emps.forEach((e,i)=>e.s=i+1);
  saveE();
  
  toast(moved.n+' moved to position '+(toPos+1));
  renderRoster();
}

function rosterDownload(){
  const dlType=document.getElementById('roster-dl-type')?.value||'all';
  const ppSelect=document.getElementById('roster-dl-pp');
  const selectedPPs=ppSelect?Array.from(ppSelect.selectedOptions).map(o=>o.value):[];
  
  // Base set — filter by selected pay points first
  let base=selectedPPs.length?S.emps.filter(e=>selectedPPs.includes(e.p)):S.emps;
  
  // Further filter by type
  if(dlType==='surface')base=base.filter(e=>e.ct==='S');
  else if(dlType==='underground')base=base.filter(e=>!e.ct||e.ct==='U');
  else if(dlType==='male')base=base.filter(e=>{const md=mdData.find(m=>m.pid===e.i);return md&&md.gender?.toLowerCase()==='male';});
  else if(dlType==='female')base=base.filter(e=>{const md=mdData.find(m=>m.pid===e.i);return md&&md.gender?.toLowerCase()==='female';});
  
  function makeRows(emps){
    return emps.map((e,i)=>{
      const md=mdData.length?mdData.find(m=>m.pid===e.i):null;
      return{
        'SN':i+1,'Employee ID':e.i,'Employee Name':e.n,'Pay Point':ppN(e.p),
        'Designation':e.desig||(md?.pos||''),'Posting':e.posting||'',
        'Contract':e.ct==='S'?'Surface':'Underground','Gender':md?.gender||'',
        'Department':md?.deptText||'','Phone':md?.phone||'','Category':md?.empCat||''
      };
    });
  }
  
  const colWidths=[{wch:4},{wch:12},{wch:26},{wch:14},{wch:22},{wch:10},{wch:12},{wch:8},{wch:18},{wch:12},{wch:20}];
  const wb=XLSX.utils.book_new();
  
  if(dlType==='posting_sheets'){
    // Separate sheets for each posting + unassigned
    const postings=['Mining','Personnel','E&M'];
    postings.forEach(p=>{
      const emps=base.filter(e=>e.posting===p);
      if(!emps.length)return;
      const ws=XLSX.utils.json_to_sheet(makeRows(emps));
      ws['!cols']=colWidths;
      XLSX.utils.book_append_sheet(wb,ws,p);
    });
    const unassigned=base.filter(e=>!e.posting);
    if(unassigned.length){
      const ws=XLSX.utils.json_to_sheet(makeRows(unassigned));
      ws['!cols']=colWidths;
      XLSX.utils.book_append_sheet(wb,ws,'Unassigned');
    }
    if(!wb.SheetNames.length)return alert('No employees found!');
    XLSX.writeFile(wb,'Roster_By_Posting.xlsx');
    toast('Downloaded with '+wb.SheetNames.length+' posting sheets!');
  } else {
    if(!base.length)return alert('No employees found!');
    const ws=XLSX.utils.json_to_sheet(makeRows(base));
    ws['!cols']=colWidths;
    const label=dlType==='all'?'All':(dlType.charAt(0).toUpperCase()+dlType.slice(1));
    XLSX.utils.book_append_sheet(wb,ws,'Roster');
    XLSX.writeFile(wb,'Roster_'+label+'.xlsx');
    toast(label+' — '+base.length+' employees downloaded!');
  }
}

function showStorageManager(){
  // Calculate localStorage size
  const sizes={};
  let totalSize=0;
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      const v=localStorage.getItem(k);
      const bytes=v?v.length*2:0;
      const cat=k.startsWith('am_yr_')?'Yearly (localStorage)':
               k.startsWith('am_a2')?'Biometric Att':
               k==='am_a'?'Attendance':
               k==='am_e'?'Employees/Roster':
               k==='am_h'?'Holidays':
               k.startsWith('am_ot')?'Overtime':
               k.startsWith('am_night')?'Night Hours':
               k.startsWith('am_amr')?'AMR Data':
               k.startsWith('am_todo')?'To-Do':
               k.startsWith('am_vw')?'Viewer Log':
               k.startsWith('am_act')?'Activity Log':
               k.startsWith('am_md')?'Master Data':
               k.startsWith('am_ps')?'Pay Slip':
               'Other';
      if(!sizes[cat])sizes[cat]={bytes:0,keys:[]};
      sizes[cat].bytes+=bytes;
      sizes[cat].keys.push(k);
      totalSize+=bytes;
    }
  }catch{}
  
  const lsMb=(totalSize/(1024*1024)).toFixed(2);
  const lsPct=Math.min(100,Math.round(totalSize/(5*1024*1024)*100));
  const barColor=lsPct>=85?'#ef4444':lsPct>=60?'#f59e0b':'#22c55e';
  
  const sorted=Object.entries(sizes).sort((a,b)=>b[1].bytes-a[1].bytes);
  
  const yrMonths=Object.keys(yrAtt).sort(yrSortMonths);
  const idbReady=!!IDB.db;
  
  let yrDetail='';
  if(yrMonths.length){
    yrDetail='<div style="margin-top:8px;font-size:10px;font-weight:600;color:#a5b4fc">Yearly Months in IndexedDB ('+yrMonths.length+'):</div>';
    yrDetail+='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;max-height:120px;overflow-y:auto">';
    yrMonths.forEach(m=>{
      yrDetail+='<div style="padding:3px 6px;border-radius:4px;background:rgba(34,197,94,.1);font-size:8px;color:#22c55e">'+m+'</div>';
    });
    yrDetail+='</div>';
  }
  
  const d=document.createElement('div');d.className='modal-bg';d.onclick=e=>{if(e.target===d)d.remove();};
  d.innerHTML=`<div class="modal" style="max-width:380px;max-height:85vh;overflow-y:auto">
    <h2 style="font-size:14px;font-weight:700;color:#a5b4fc;margin-bottom:8px">\ud83d\udce6 Storage Manager</h2>
    
    <div style="padding:8px;border-radius:8px;margin-bottom:8px;background:${idbReady?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'}">
      <div style="font-size:11px;font-weight:700;color:${idbReady?'#22c55e':'#ef4444'}">${idbReady?'\u2705 IndexedDB Active (300MB+)':'\u274c IndexedDB Not Available'}</div>
      <div style="font-size:9px;color:#94a3b8">${idbReady?'Yearly data stored in IndexedDB — no storage limit worry!':'Using localStorage only (5-10MB limit)'}</div>
    </div>
    
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">localStorage (small data):</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:#94a3b8">Used: <b style="color:#e2e8f0">${lsMb} MB</b></span>
        <span style="color:${barColor};font-weight:700">${lsPct}%</span>
      </div>
      <div style="height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${lsPct}%;background:${barColor};border-radius:4px"></div>
      </div>
    </div>
    
    <div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:4px">localStorage Breakdown:</div>
    ${sorted.map(([cat,info])=>{
      const kb=(info.bytes/1024).toFixed(0);
      return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)"><span style="font-size:9px;color:#e2e8f0">'+cat+'</span><span style="font-size:9px;color:#f59e0b;font-weight:600">'+kb+' KB</span></div>';
    }).join('')}
    
    ${yrDetail}
    
    <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">

      <button class="btn bg2" style="font-size:10px;padding:6px 12px" onclick="this.closest('.modal-bg').remove()">Close</button>
    </div>
  </div>`;
  document.body.appendChild(d);
  
  // Show IndexedDB size async
  if(idbReady){
    IDB.size().then(s=>{
      const idbInfo=d.querySelector('.idb-size');
      if(idbInfo)idbInfo.textContent='IndexedDB: '+s.mb+' MB used';

  }

function importAllData(input){
  if(!input.files||!input.files[0])return;
  if(!confirm('This will REPLACE all current data with the imported backup. Continue?'))return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const backup=JSON.parse(e.target.result);
      if(!backup.emps||!backup.att){alert('Invalid backup file!');return;}
      
      // Restore state
      S.emps=backup.emps;
      S.att=backup.att;
      if(backup.att2)S.att2=backup.att2;
      S.hols=backup.hols||{};
      
      // Save to localStorage
      saveE();saveA();saveH();
      
      // Restore other data
      if(backup.actlog)LS.s('am_actlog',backup.actlog);
      if(backup.lvdone)LS.s('am_lvdone',backup.lvdone);
      if(backup.ctdata)LS.s('ctdata',backup.ctdata);
      if(backup.ctatt)LS.s('ctatt',backup.ctatt);
      // Pay slip data no longer saved in app - use Excel files from Google Drive
      if(backup.mddata){mdData=backup.mddata;LS.s('mddata',mdData);}
      if(backup.yratt){
        yrAtt=backup.yratt;
        // Save per-month
        const months=Object.keys(yrAtt);
        LS.s('yr_idx',months);
        months.forEach(m=>{try{LS.s('yr_'+m,yrAtt[m]);}catch{}});
        try{months.forEach(m=>{pS('yr_'+m,yrAtt[m]);});}catch{}
        try{pS('yr_idx',months);}catch{}
      }
      if(backup.otdata){otData=backup.otdata;LS.s('otdata',otData);}
      if(backup.todolist){todoList=backup.todolist;LS.s('todolist',todoList);}
      if(backup.amrdata){amrData=backup.amrdata;LS.s('amrdata',amrData);}

      if(backup.vwlog){vwLog=backup.vwlog;LS.s('vwlog',vwLog);}
      
      // Also save to persistent storage
      try{pS('e',S.emps);pS('a',S.att);pS('h',S.hols);}catch{}
      
      render();
      toast('Backup imported successfully! '+S.emps.length+' employees loaded.');

  };
  reader.readAsText(input.files[0]);
  input.value='';
}

function lvBuildDD(){
  const dd=document.getElementById('lv-dd');
  if(!dd)return;
  const ppf=document.getElementById('lv-ppf')?.value||'all';
  const sr=(document.getElementById('lv-search')?.value||'').trim().toLowerCase();
  
  let emps=S.emps.filter(e=>ppf==='all'||e.p===ppf);
  emps=emps.filter(e=>!lvDoneSet.has(e.i));
  if(sr){
    emps=emps.filter(e=>e.i.toLowerCase().includes(sr)||e.n.toLowerCase().includes(sr));
  }
  
  let h='<option value="">— Choose Employee ('+emps.length+' remaining) —</option>';
  emps.forEach(e=>{
    const sel=lvEmp&&lvEmp.i===e.i?'selected':'';
    h+=`<option value="${e.i}" ${sel}>${e.i} — ${e.n} (${ppN(e.p)})</option>`;
  });
  dd.innerHTML=h;
  lvUpdateDoneBar();
}

function lvSelectDD(){

function lvUpdateDoneBar(){
  const bar=document.getElementById('lv-done-bar');

function lvShowBlanks(){
  const el=document.getElementById('lv-blanks');
  if(!el||!lvKey)return;
  
  // Get current month's blank dates for this employee
  const now=new Date();
  const yr=now.getFullYear();
  const mon=now.getMonth();
  const today=now.getDate();
  const dim=dI(yr,mon);
  const blanks=[];
  
  for(let d=1;d<=Math.min(today,dim);d++){
    const ds=`${yr}-${String(mon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const code=gA(lvKey,ds);
    if(!code){
      const dt=new Date(yr,mon,d);
      blanks.push({date:ds,day:DA[dt.getDay()],d:d});
    }
  }
  
  if(!blanks.length){
    el.style.display='block';
    el.innerHTML=`<div style="font-size:11px;color:#16a34a;font-weight:600">✓ No blank dates this month — all days are marked (1 to ${today} ${MO[mon]})</div>`;
    return;
  }
  
  el.style.display='block';
  let h=`<div style="font-size:11px;font-weight:600;color:#f59e0b;margin-bottom:6px">⚠ ${blanks.length} Blank Date${blanks.length>1?'s':''} (${MO[mon]} ${yr}, up to ${today}th)</div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
  blanks.forEach(b=>{
    const isSun=new Date(b.date+'T00:00:00').getDay()===0;
    h+=`<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;background:${isSun?'rgba(99,102,241,.1)':'rgba(245,158,11,.08)'};color:${isSun?'#6366f1':'#f59e0b'};cursor:pointer" onclick="lvFillDate('${b.date}')" title="Tap to set date">${b.d} ${b.day}</span>`;
  });
  h+=`</div>`;
  h+=`<div style="font-size:9px;color:#4b5563;margin-top:4px">1st tap → From date, 2nd tap → To date</div>`;
  el.innerHTML=h;
}

function lvFillDate(ds){
  const fr=document.getElementById('lv-from');
  const to=document.getElementById('lv-to');
  if(!fr||!to)return;
  // If From is empty, or both are filled (start fresh), fill From
  if(!fr.value||( fr.value && to.value)){
    fr.value=ds;
    to.value='';
  }
  // If From is filled but To is empty, fill To
  else if(fr.value && !to.value){
    // Make sure To >= From
    if(ds>=fr.value){
      to.value=ds;
    } else {
      // User tapped an earlier date, swap: new becomes From, old From becomes To
      to.value=fr.value;
      fr.value=ds;
    }
  }
  lvValidate();
}

function lvValidate(){
  const frEl=document.getElementById('lv-from');
  const toEl=document.getElementById('lv-to');
  const btn=document.getElementById('lv-pub');
  const prev=document.getElementById('lv-preview');
  if(!btn)return;

  const hasEmp=!!lvKey;
  const hasCode=!!lvCode;
  const hasFr=frEl&&frEl.value;
  const hasTo=toEl&&toEl.value;
  const ok=hasEmp&&hasCode&&hasFr&&hasTo;

  btn.disabled=!ok;
  btn.style.opacity=ok?'1':'.4';
  btn.style.cursor=ok?'pointer':'not-allowed';

  if(ok&&prev){
    const f=new Date(frEl.value+'T00:00:00');
    const t=new Date(toEl.value+'T00:00:00');
    if(t<f){
      prev.style.display='block';prev.style.background='rgba(220,38,38,.06)';prev.style.border='1px solid rgba(220,38,38,.15)';
      prev.innerHTML='<div style="color:#f87171;font-size:12px">End date must be after start date!</div>';
      btn.disabled=true;btn.style.opacity='.4';return;
    }
    const days=Math.round((t-f)/(1000*60*60*24))+1;
    const cc=CC.find(x=>x.c===lvCode);
    prev.style.display='block';prev.style.background='rgba(99,102,241,.05)';prev.style.border='1px solid rgba(99,102,241,.12)';
    prev.innerHTML=`<div style="font-size:12px;font-weight:600;color:#a5b4fc;margin-bottom:3px">Preview</div>
      <div style="font-size:12px;color:#94a3b8"><b style="color:#e2e8f0">${lvEmp.n}</b> → <b style="color:${cc.cl}">${cc.c} (${cc.l})</b><br>
      <b style="color:#a5b4fc">${fX(f)}</b> to <b style="color:#a5b4fc">${fX(t)}</b> — <b style="color:#e2e8f0">${days} day${days>1?'s':''}</b></div>`;
  } else if(prev){prev.style.display='none';}
}

function lvPublish(){
  if(!lvKey||!lvCode||!lvEmp)return;
  const frEl=document.getElementById('lv-from');
  const toEl=document.getElementById('lv-to');
  if(!frEl||!toEl||!frEl.value||!toEl.value)return;

  const fv=frEl.value;const tv=toEl.value;
  const f=new Date(fv+'T00:00:00');
  const t=new Date(tv+'T00:00:00');
  if(t<f){alert('End date must be after start date!');return;}

  const days=Math.round((t-f)/(1000*60*60*24))+1;
  const cc=CC.find(x=>x.c===lvCode);

  // Apply dates
  const n={...S.att};
  let count=0;
  const d=new Date(f);
  while(d<=t){
    const dk=lvKey+'|'+fD(d);
    n[dk]=lvCode;
    count++;
    d.setDate(d.getDate()+1);
  }
  S.att=n;
  saveA();

  // Log
  lvLog.unshift({emp:lvEmp.n,eid:lvEmp.i,ek:lvKey,code:lvCode,label:cc.l,cl:cc.cl,bg:cc.bg,from:fv,to:tv,days:count,time:new Date().toLocaleTimeString()});
  if(lvLog.length>50)lvLog=lvLog.slice(0,50);
  LS.s('ll',lvLog);

  // Show success in preview area with Done button
  const prev=document.getElementById('lv-preview');
  const empName=lvEmp.n;
  const empId=lvEmp.i;
  if(prev){
    prev.style.display='block';prev.style.background='rgba(22,163,74,.08)';prev.style.border='1px solid rgba(22,163,74,.2)';
    prev.innerHTML=`<div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:2px">✓ Published Successfully!</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:8px"><b style="color:#e2e8f0">${empName}</b> marked as <b style="color:${cc.cl}">${cc.c}</b> for <b>${count} days</b> (${fv} to ${tv})</div>
      <div style="display:flex;gap:6px">
        <button class="btn bp" style="padding:6px 14px;font-size:11px;background:linear-gradient(135deg,#16a34a,#22c55e)" onclick="lvMarkDone()">✓ Done — Next Employee</button>
        <button class="btn bg2" style="padding:6px 14px;font-size:11px" onclick="document.getElementById('lv-preview').style.display='none'">Continue with ${empName}</button>
      </div>`;
  }

  // Reset code and dates (keep employee)
  lvCode='';
  document.querySelectorAll('.lvcb').forEach(btn=>{
    const bc=btn.getAttribute('data-lc');const bcs=gc(bc);
    btn.style.background=bcs.bg;btn.style.color=bcs.cl;btn.style.borderColor='transparent';
  });
  const clbl=document.getElementById('lv-clbl');if(clbl)clbl.innerHTML='';
  frEl.value='';toEl.value='';
  const btn2=document.getElementById('lv-pub');
  if(btn2){btn2.disabled=true;btn2.style.opacity='.4';btn2.style.cursor='not-allowed';}

  lvRenderLog();
  lvShowBlanks();
  addLog('Leave Apply',`${empName} (${empId}) → ${cc.c} from ${fv} to ${tv}`,`${count} days`);
  toast(`${cc.c} marked for ${empName} — ${count} days!`);
}

function lvRenderLog(){
  const el=document.getElementById('lv-log');
  if(!el)return;
  if(!lvLog.length){el.innerHTML='<div style="padding:16px;text-align:center;color:#4b5563;font-size:12px">No entries yet.</div>';return;}
  el.innerHTML=lvLog.map((l,idx)=>{
    const cs=gc(l.code);
    return`<div class="rw" style="gap:10px">
      <div style="width:30px;height:30px;border-radius:7px;background:${cs.bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:${cs.cl};font-family:'JetBrains Mono',monospace;flex-shrink:0">${l.code}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#e2e8f0">${l.emp} <span style="font-size:9px;color:#4b5563">(${l.eid})</span></div>
      <div style="font-size:10px;color:#94a3b8">${l.label} · ${l.from} → ${l.to} · <b>${l.days} days</b></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <div style="font-size:9px;color:#4b5563">${l.time}</div>
        <button class="btn bd" style="font-size:9px;padding:3px 8px" onclick="lvDeleteEntry(${idx})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function lvDeleteEntry(idx){
  if(idx<0||idx>=lvLog.length)return;
  const entry=lvLog[idx];
  if(!confirm('Delete this entry and remove '+entry.code+' marks for '+entry.emp+' from '+entry.from+' to '+entry.to+' ('+entry.days+' days)?'))return;

  // Find employee key - use stored ek, or reconstruct from eid
  let empKey=entry.ek||'';
  if(!empKey&&entry.eid){
    const emp=S.emps.find(e=>e.i===entry.eid);
    if(emp)empKey=ek(emp);
  }

  // Remove attendance marks for this entry's date range
  const n={...S.att};
  const f=new Date(entry.from+'T00:00:00');
  const t=new Date(entry.to+'T00:00:00');
  let removed=0;
  const d=new Date(f);

  while(d<=t){
    const k=empKey+'|'+fD(d);
    if(n[k]===entry.code){
      delete n[k];
      removed++;
    }
    d.setDate(d.getDate()+1);
  }
  S.att=n;
  saveA();

  // Remove from log
  lvLog.splice(idx,1);
  LS.s('ll',lvLog);
  lvRenderLog();
  addLog('Leave Delete',`${entry.emp} (${entry.eid}) — ${entry.code} from ${entry.from} to ${entry.to}`,`${removed} days cleared`);
  toast(entry.code+' removed for '+entry.emp+' — '+removed+' days cleared!',false);
}
