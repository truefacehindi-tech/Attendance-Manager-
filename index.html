function dlValidate(){
  const frEl=document.getElementById('dl-from');
  const toEl=document.getElementById('dl-to');
  const btn=document.getElementById('dl-pub');
  const prev=document.getElementById('dl-preview');
  if(!btn)return;
  const hasEmp=!!dlKey;
  const hasCode=!!dlCode;
  const hasFr=frEl&&frEl.value;
  const hasTo=toEl&&toEl.value;
  const ok=hasEmp&&hasCode&&hasFr&&hasTo;

  btn.disabled=!ok;btn.style.opacity=ok?'1':'.4';btn.style.cursor=ok?'pointer':'not-allowed';

  if(ok&&prev){
    const f=new Date(frEl.value+'T00:00:00');
    const t=new Date(toEl.value+'T00:00:00');
    if(t<f){prev.style.display='block';prev.style.background='rgba(220,38,38,.06)';prev.style.border='1px solid rgba(220,38,38,.15)';prev.innerHTML='<div style="color:#f87171;font-size:12px">End date must be after start date!</div>';btn.disabled=true;btn.style.opacity='.4';return;}
    const days=Math.round((t-f)/(1000*60*60*24))+1;
    // Count how many entries will be affected
    let affected=0;
    const d=new Date(f);
    while(d<=t){
      const k=dlKey+'|'+fD(d);
      if(dlCode==='ALL'){if(S.att[k])affected++;}
      else{if(S.att[k]===dlCode)affected++;}
      d.setDate(d.getDate()+1);
    }
    prev.style.display='block';prev.style.background='rgba(220,38,38,.05)';prev.style.border='1px solid rgba(220,38,38,.12)';
    prev.innerHTML=`<div style="font-size:12px;font-weight:600;color:#f87171;margin-bottom:3px">Delete Preview</div>
      <div style="font-size:12px;color:#94a3b8"><b style="color:#e2e8f0">${dlEmp.n}</b> — delete <b style="color:#f87171">${dlCode==='ALL'?'ALL codes':dlCode}</b><br>
      From <b style="color:#a5b4fc">${fX(f)}</b> to <b style="color:#a5b4fc">${fX(t)}</b> — <b style="color:#e2e8f0">${days} days</b><br>
      <b style="color:#f87171">${affected} entries</b> will be removed</div>`;
  } else if(prev){prev.style.display='none';}
}

function dlExecute(){
  if(!dlKey||!dlCode||!dlEmp)return;
  const frEl=document.getElementById('dl-from');
  const toEl=document.getElementById('dl-to');
  if(!frEl||!toEl||!frEl.value||!toEl.value)return;

  const fv=frEl.value;const tv=toEl.value;
  const f=new Date(fv+'T00:00:00');
  const t=new Date(tv+'T00:00:00');
  if(t<f){alert('End date must be after start date!');return;}

  const days=Math.round((t-f)/(1000*60*60*24))+1;

  // Delete attendance marks
  const n={...S.att};
  let removed=0;
  const d=new Date(f);
  while(d<=t){
    const k=dlKey+'|'+fD(d);
    if(dlCode==='ALL'){
      if(n[k]){delete n[k];removed++;}
    } else {
      if(n[k]===dlCode){delete n[k];removed++;}
    }
    d.setDate(d.getDate()+1);
  }
  S.att=n;
  saveA();

  // Log deletion
  dlLog.unshift({emp:dlEmp.n,eid:dlEmp.i,code:dlCode,from:fv,to:tv,days:days,removed:removed,time:new Date().toLocaleTimeString()});
  if(dlLog.length>50)dlLog=dlLog.slice(0,50);
  LS.s('dl',dlLog);

  // Show success
  const prev=document.getElementById('dl-preview');
  if(prev){
    prev.style.display='block';prev.style.background='rgba(22,163,74,.08)';prev.style.border='1px solid rgba(22,163,74,.2)';
    prev.innerHTML=`<div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:2px">✓ Deleted Successfully!</div>
      <div style="font-size:12px;color:#94a3b8"><b style="color:#e2e8f0">${dlEmp.n}</b> — <b>${removed} entries</b> of <b style="color:#f87171">${dlCode}</b> removed (${fv} to ${tv})</div>`;
  }

  // Reset code and dates
  dlCode='';
  document.querySelectorAll('.dlcb').forEach(btn=>{
    const bc=btn.getAttribute('data-dc');
    btn.style.background=bc==='ALL'?'#fee2e2':gc(bc).bg;
    btn.style.color=bc==='ALL'?'#dc2626':gc(bc).cl;
    btn.style.borderColor='transparent';
  });
  const clbl=document.getElementById('dl-clbl');if(clbl)clbl.innerHTML='';
  frEl.value='';toEl.value='';
  const btn2=document.getElementById('dl-pub');
  if(btn2){btn2.disabled=true;btn2.style.opacity='.4';btn2.style.cursor='not-allowed';}
  dlRenderLog();
  addLog('Delete Entry',`${dlEmp.n} (${dlEmp.i}) — code ${dlCode} from ${fv} to ${tv}`,`${removed} entries cleared`);
  toast(removed+' entries deleted for '+dlEmp.n+'!',false);
}

async function amrProcess(){
  const f1=document.getElementById('amr-file1');
  if(!f1||!f1.files||!f1.files[0]){alert('Select today\'s biometric file!');return;}
  if(!amrMonth){alert('Select a month first!');return;}
  
  const statusEl=document.getElementById('amr-status');
  statusEl.innerHTML='<div style="color:#f59e0b;font-size:11px">Processing...</div>';
  
  try{
    const mainRows=await readXLSX(f1.files[0]);
    const f2=document.getElementById('amr-file2');
    let nextRows=[];
    if(f2&&f2.files&&f2.files[0])nextRows=await readXLSX(f2.files[0]);
    
    // Index all entries by eid|date
    const allByEidDate={};
    function indexRows(rows){
      rows.forEach(row=>{
        const eid=String(row.EmployeeID||row['Employee ID']||'').trim();
        const dateRaw=row.Date||row.date||'';
        const inRaw=String(row.InTime||row['In Time']||'').trim();
        const outRaw=String(row.OutTime||row['Out Time']||'').trim();
        if(!eid||!dateRaw)return;
        const dateStr=parseDateFromRow(dateRaw);
        const key=eid+'|'+dateStr;
        if(!allByEidDate[key])allByEidDate[key]={inRaw,outRaw};
      });
    }
    indexRows(mainRows);
    indexRows(nextRows);
    
    // Detect date from main file (first file = the date we check)
    let bioDate='';
    mainRows.forEach(row=>{
      if(!bioDate){const d=row.Date||row.date||'';if(d)bioDate=parseDateFromRow(d);}
    });
    
    if(!bioDate){statusEl.innerHTML='<div style="color:#f87171">Could not detect date from file.</div>';return;}
    
    // Check if this date already processed
    const existing=amrData[amrMonth]||[];
    if(existing.some(e=>e.date===bioDate)){
      if(!confirm('Date '+bioDate+' already processed. Replace entries for this date?'))return;
      amrData[amrMonth]=existing.filter(e=>e.date!==bioDate);
    }
    
    const rosterMap={};
    S.emps.forEach(emp=>{rosterMap[emp.i.trim()]=emp;});
    
    // Build roster order map for sorting
    const rosterOrder={};
    S.emps.forEach((emp,idx)=>{rosterOrder[emp.i.trim()]=idx;});
    
    const newEntries=[];
    const seen=new Set();
    
    mainRows.forEach(row=>{
      const eid=String(row.EmployeeID||row['Employee ID']||'').trim();
      const dateRaw=row.Date||row.date||'';
      const inRaw=String(row.InTime||row['In Time']||'').trim();
      const outRaw=String(row.OutTime||row['Out Time']||'').trim();
      if(!eid||!dateRaw)return;
      const dateStr=parseDateFromRow(dateRaw);
      if(dateStr!==bioDate)return; // Only check the main date
      if(seen.has(eid))return;
      seen.add(eid);
      
      const emp=rosterMap[eid];
      if(!emp)return; // Roster only
      
      const inT=parseTimeStr(inRaw);
      const outT=parseTimeStr(outRaw);
      
      const isSingle=inRaw===outRaw||!inT||!outT;
      if(!isSingle)return;
      
      // Night/afternoon: check next day OUT
      if(inT&&inRaw===outRaw){
        const isNight=inT.h>=18;
        const isAfternoon=inT.h>=12&&inT.h<18;
        if(isNight||isAfternoon){
          const nd=new Date(dateStr+'T00:00:00');
          nd.setDate(nd.getDate()+1);
          const ndStr=fD(nd);
          const nextEntry=allByEidDate[eid+'|'+ndStr];
          if(nextEntry){
            const t=parseTimeStr(nextEntry.inRaw);
            if(t&&(t.h<4||(t.h>=5&&t.h<9)))return; // Resolved
          }
        }
      }
      
      const md=mdData.find(m=>m.pid===eid);
      const desig=md?.pos||emp.desig||'';
      
      newEntries.push({
        eid,
        name:emp.n,
        desig,
        date:bioDate,
        inTime:inT?inRaw:'',
        outTime:(!inT||inRaw===outRaw)?'':outRaw,
        rosterIdx:rosterOrder[eid]||999
      });
    });
    
    // Add to month data
    if(!amrData[amrMonth])amrData[amrMonth]=[];
    amrData[amrMonth]=amrData[amrMonth].concat(newEntries);
    
    // Sort: by date first, then by roster order
    amrData[amrMonth].sort((a,b)=>{
      const da=new Date(a.date),db=new Date(b.date);
      if(da-db!==0)return da-db;
      return (a.rosterIdx||999)-(b.rosterIdx||999);
    });
    
    amrSave();
    
    const total=amrData[amrMonth].length;
    statusEl.innerHTML='<div style="color:#22c55e;font-size:12px;font-weight:600">\u2705 '+bioDate+': '+newEntries.length+' anomalies added. Total this month: '+total+'</div>';
    
    amrRenderTable();
    
  }catch(err){
    statusEl.innerHTML='<div style="color:#f87171;font-size:11px">Error: '+err.message+'</div>';
  }
}

// ═══════ BIOMETRIC UPLOAD ═══════
function readXLSX(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws,{defval:''}));
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('File read failed'));
    reader.readAsArrayBuffer(file);
  });
}

function parseTimeStr(t){
  if(!t||t==='0'||t==='None'||t==='')return null;
  const s=String(t).trim();
  const parts=s.split(':');
  if(parts.length<2)return null;
  return{h:parseInt(parts[0]),m:parseInt(parts[1]),s:parseInt(parts[2]||0),raw:s};
}

function parseDateFromRow(dateRaw){
  if(!dateRaw)return '';
  // Handle Excel serial number
  if(typeof dateRaw==='number'){const d=new Date((dateRaw-25569)*86400000);return fD(d);}
  const s=String(dateRaw).trim();
  // Handle YYYY-MM-DD or YYYY-MM-DDTHH:mm:ss
  if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.substring(0,10);
  // Handle DD-MM-YYYY or DD/MM/YYYY
  const m1=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m1)return `${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  // Handle MM/DD/YYYY (US format)
  const m2=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m2){
    const a=parseInt(m2[1]),b=parseInt(m2[2]);
    if(a>12)return `${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`; // DD/MM
    return `${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`; // MM/DD
  }
  // Handle Date object
  if(dateRaw instanceof Date)return fD(dateRaw);
  // Try parsing as Date
  try{const d=new Date(s);if(!isNaN(d))return fD(d);}catch{}
  return s.substring(0,10);
}

      if(!eid||!dateRaw)return;
      const dateStr=parseDateFromRow(dateRaw);
      allEntries[eid+'|'+dateStr]={inRaw,outRaw};
    });
    
    // Also index next-day file entries (if uploaded separately)
    nextRows.forEach(row=>{
      const eid=String(row.EmployeeID||row['Employee ID']||'').trim();
      const dateRaw=row.Date||row.date||'';
      const inRaw=String(row.InTime||row['In Time']||'').trim();
      const outRaw=String(row.OutTime||row['Out Time']||'').trim();
      if(!eid||!dateRaw)return;
      const dateStr=parseDateFromRow(dateRaw);
      if(!allEntries[eid+'|'+dateStr]){
        allEntries[eid+'|'+dateStr]={inRaw,outRaw};
      }
    });
    
    // Helper: get next date string
    function nextDate(ds){
      const d=new Date(ds+'T00:00:00');
      d.setDate(d.getDate()+1);
      return fD(d);
    }
    
    // Helper: find night/OT OUT from next day entry
    function findNightOUT(eid,dateStr){
      const nd=nextDate(dateStr);
      const entry=allEntries[eid+'|'+nd];
      if(!entry)return null;
      const inT=parseTimeStr(entry.inRaw);
      if(!inT)return null;
      // Next day IN before 4AM = OT exit from previous day
      if(inT.h<4){
        return{time:entry.inRaw,parsed:inT};
      }
      // Next day IN between 5AM-9AM = night shift OUT (original logic)
      if(inT.h>=5&&inT.h<9){
        return{time:entry.inRaw,parsed:inT};
      }
      return null;
    }
    
    // Build roster map and roster-ordered list
    const rosterMap={};
    S.emps.forEach(emp=>{rosterMap[emp.i.trim()]=emp;});
    
    // Process main file
    const att={...S.att};
    let marked=0,night=0,short=0,skipped=0,noMatch=0,nightFixed=0;
    const results=[];
    const bioData={};
    
    mainRows.forEach(row=>{
      const eid=String(row.EmployeeID||row['Employee ID']||'').trim();
      const name=String(row.Name||row.name||'').trim();
      const dateRaw=row.Date||row.date||'';
      const inRaw=String(row.InTime||row['In Time']||'').trim();
      const outRaw=String(row.OutTime||row['Out Time']||'').trim();
      if(!eid||!dateRaw)return;
      
      const dateStr=parseDateFromRow(dateRaw);
      const emp=rosterMap[eid];
      if(!emp){noMatch++;results.push({eid,name,date:dateStr,inT:inRaw,outT:outRaw,status:'nomatch',reason:'ID not in roster'});return;}
      
      const empKey=ek(emp);
      const attKey=empKey+'|'+dateStr;
      const inT=parseTimeStr(inRaw);
      const outT=parseTimeStr(outRaw);
      
      if(!inT){skipped++;results.push({eid,name,date:dateStr,status:'skip',reason:'No IN time'});return;}
      
      // Check if IN = OUT (single punch)
      if(inRaw===outRaw){
        const isNight=inT.h>=18;
        const isAfternoon=inT.h>=12&&inT.h<18;
        
        // Night (IN>=6PM) or Afternoon (IN>=12PM): look for next day OUT
        const shouldCheckNextDay=isNight||isAfternoon;
        const nightOut=shouldCheckNextDay?findNightOUT(eid,dateStr):null;
        
        if(shouldCheckNextDay&&nightOut){
          const fixOutT=nightOut.parsed;
          const inMins=inT.h*60+inT.m+inT.s/60;
          const outMins=(fixOutT.h+24)*60+fixOutT.m+fixOutT.s/60;
          const workMins=outMins-inMins;
          const workHrs=Math.floor(workMins/60);
          const workMn=Math.floor(workMins%60);
          const workStr=workHrs+'h '+workMn+'m';
          
          if(workMins>=6*60+59+(1/60)){
            const code=isNight?'U':'P';
            att[attKey]=code;
            if(isNight)night++;
            marked++;nightFixed++;
            const reason=isNight?'Night shift \u2014 OUT from next day':'Afternoon+OT \u2014 OUT from next day ('+workStr+')';
            results.push({eid,name,date:dateStr,inT:inRaw,outT:nightOut.time+'(+1d)',work:workStr,status:code,reason});
            bioData[eid]={date:dateStr,inT:inRaw,outT:nightOut.time+'(+1d)',work:workStr,status:code,code};
          } else {
            short++;
            results.push({eid,name,date:dateStr,inT:inRaw,outT:nightOut.time+'(+1d)',work:workStr,status:'short',reason:'Shift < 7hrs ('+workStr+')'});
            bioData[eid]={date:dateStr,inT:inRaw,outT:nightOut.time+'(+1d)',work:workStr,status:'short',code:''};
          }
        } else {
          skipped++;
          const reason=isNight?'Night shift \u2014 no next day OUT found':isAfternoon?'Afternoon shift \u2014 no next day OUT found':'IN = OUT (single punch)';
          results.push({eid,name,date:dateStr,inT:inRaw,outT:outRaw,status:'skip',reason});
          bioData[eid]={date:dateStr,inT:inRaw,outT:'\u2014',work:'\u2014',status:'skip',code:''};
        }
        return;
      }
      
      // Normal: IN != OUT
      const inMins=inT.h*60+inT.m+inT.s/60;
      let outMins=outT.h*60+outT.m+outT.s/60;
      if(outMins<inMins)outMins+=24*60;
      const workMins=outMins-inMins;
      const workHrs=Math.floor(workMins/60);
      const workMn=Math.floor(workMins%60);
      const workStr=workHrs+'h '+workMn+'m';
      const isNight=inT.h>=18;
      
      if(workMins>=6*60+59+(1/60)){
        const code=isNight?'U':'P';
        att[attKey]=code;
        if(isNight)night++;
        marked++;
        results.push({eid,name,date:dateStr,inT:inRaw,outT:outRaw,work:workStr,status:code,reason:isNight?'Night shift':'Valid attendance'});
        bioData[eid]={date:dateStr,inT:inRaw,outT:outRaw,work:workStr,status:code,code};
      } else {
        short++;
        results.push({eid,name,date:dateStr,inT:inRaw,outT:outRaw,work:workStr,status:'short',reason:'Work < 7hrs ('+workStr+')'});
        bioData[eid]={date:dateStr,inT:inRaw,outT:outRaw,work:workStr,status:'short',code:''};
      }
    });
    
    S.att=att;
    saveA();
    
    // Show summary
    const debugEntryCount=Object.keys(allEntries).length;
    // Sample a night skip to show debug
    const nightSkips=results.filter(r=>r.status==='skip'&&r.reason&&r.reason.includes('Night'));
    const debugInfo=nightSkips.length>0?`<div style="margin-top:8px;font-size:10px;color:#4b5563;background:rgba(255,255,255,.02);padding:8px;border-radius:6px">
      <b>Debug:</b> allEntries indexed: ${debugEntryCount} | Night skips: ${nightSkips.length}<br>
      ${nightSkips.slice(0,3).map(r=>`${r.eid} | ${r.date} | IN:${r.inT} — ${r.reason}`).join('<br>')}
      ${mainRows.length>0?`<br><b>Sample raw date:</b> "${mainRows[0].Date}" (type:${typeof mainRows[0].Date}) → parsed: "${parseDateFromRow(mainRows[0].Date)}"`:''} 
    </div>`:'';
    statusEl.innerHTML=`<div class="cd" style="padding:14px">
      <div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:8px">✓ Biometric Processed!</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">
        <div class="sc" style="border-color:rgba(22,163,74,.2)"><div style="font-size:22px;font-weight:800;color:#16a34a;font-family:'JetBrains Mono',monospace">${marked}</div><div style="font-size:10px;color:#94a3b8">Marked</div></div>
        <div class="sc" style="border-color:rgba(245,158,11,.2)"><div style="font-size:22px;font-weight:800;color:#f59e0b;font-family:'JetBrains Mono',monospace">${night}</div><div style="font-size:10px;color:#94a3b8">Night (U)</div></div>
        <div class="sc" style="border-color:rgba(124,58,237,.2)"><div style="font-size:22px;font-weight:800;color:#7c3aed;font-family:'JetBrains Mono',monospace">${nightFixed}</div><div style="font-size:10px;color:#94a3b8">Night Fixed</div></div>
        <div class="sc" style="border-color:rgba(202,138,4,.2)"><div style="font-size:22px;font-weight:800;color:#ca8a04;font-family:'JetBrains Mono',monospace">${short}</div><div style="font-size:10px;color:#94a3b8">Short (&lt;7h)</div></div>
        <div class="sc" style="border-color:rgba(248,113,113,.2)"><div style="font-size:22px;font-weight:800;color:#f87171;font-family:'JetBrains Mono',monospace">${skipped}</div><div style="font-size:10px;color:#94a3b8">Skipped</div></div>
        <div class="sc" style="border-color:rgba(100,116,139,.2)"><div style="font-size:22px;font-weight:800;color:#64748b;font-family:'JetBrains Mono',monospace">${noMatch}</div><div style="font-size:10px;color:#94a3b8">No Match</div></div>
      </div>
      ${debugInfo}
    </div>`;
    
    // Store bioData for download later
    window._bioData=bioData;
    window._bioMarked=marked;window._bioNight=night;window._bioNightFixed=nightFixed;
    window._bioShort=short;window._bioSkipped=skipped;window._bioNoMatch=noMatch;
    window._bioResultsAll=results;
    
    // Save raw biometric data for entry system & SAP matcher
    // Detect the processing date from results
    const processDate=results.length?results[0].date:'';
    if(processDate){
      // Save per-employee bio details for this date
      const dayData={};
      // First: mark all roster employees as NO RECORD
      S.emps.forEach(emp=>{
        dayData[emp.i]={inT:'--',outT:'--',status:'norecord',work:'--',code:''};
      });
      // Then overlay actual bio data
      Object.entries(bioData).forEach(([eid,bd])=>{
        dayData[eid]={inT:bd.inT||'--',outT:bd.outT||'--',status:bd.status,work:bd.work||'--',code:bd.code||''};
      });
      bioRawData[processDate]=dayData;
      bioRawSave();
      
      // Show entry section
      const entSec=document.getElementById('bio-entry-section');
      if(entSec){
        entSec.style.display='block';
        // Update date dropdown
        const dateSel=document.getElementById('bio-entry-date');
        if(dateSel){
          dateSel.innerHTML=Object.keys(bioRawData).sort().map(d=>'<option value="'+d+'"'+(d===processDate?' selected':'')+'>'+d+'</option>').join('');
        }
        setTimeout(()=>bioEntryRender(),100);
      }
    }
    
    // Show download buttons
    const dlEl=document.getElementById('bio-downloads');
    if(dlEl){
      let ppOpts='<option value="all">All Pay Points</option>';
      const ppSet=new Set();S.emps.forEach(e=>ppSet.add(e.p));
      [...ppSet].sort().forEach(p=>{ppOpts+=`<option value="${p}">${ppN(p)}</option>`;});
      dlEl.style.display='block';
      dlEl.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 0">
        <button class="btn bp" style="font-size:11px;padding:6px 14px" onclick="bioDownloadRoster('all')">Download All</button>
        <select class="inp" id="bio-pp-dl" style="max-width:140px;font-size:11px">${ppOpts}</select>
        <button class="btn bp" style="font-size:11px;padding:6px 14px;background:linear-gradient(135deg,#0d9488,#14b8a6)" onclick="bioDownloadRoster(document.getElementById('bio-pp-dl').value)">Download Pay Point</button>
      </div>`;
    }
    
    // Show filterable detail
    const resEl=document.getElementById('bio-results');
    resEl.innerHTML=`<div class="cd">
      <div style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
        <span style="font-size:12px;font-weight:600;color:#a5b4fc">Results (${results.length})</span>
        <div style="display:flex;gap:4px">
          <button class="btn bg2" style="font-size:10px" onclick="bioFilter='all';bioShowResults()">All</button>
          <button class="btn bg2" style="font-size:10px;color:#16a34a" onclick="bioFilter='P';bioShowResults()">P</button>
          <button class="btn bg2" style="font-size:10px;color:#f59e0b" onclick="bioFilter='U';bioShowResults()">U</button>
          <button class="btn bg2" style="font-size:10px;color:#ca8a04" onclick="bioFilter='short';bioShowResults()">Short</button>
          <button class="btn bg2" style="font-size:10px;color:#f87171" onclick="bioFilter='skip';bioShowResults()">Skipped</button>
        </div>
      </div>
      <div id="bio-detail" style="max-height:45vh;overflow-y:auto"></div>
    </div>`;
    
    window._bioResults=results;
    window.bioFilter='all';
    bioShowResults();
    
    addLog('Biometric Upload',`P:${marked-night} U:${night} (${nightFixed} fixed) Short:${short} Skip:${skipped}`,`${marked} total marked`);
    toast(marked+' marked from biometric!');
  }catch(err){
    statusEl.innerHTML='<div class="cd" style="padding:14px;color:#f87171">Error: '+err.message+'</div>';
  }
}

function bioDownloadRoster(ppFilter){
  const bioData=window._bioData;
  const results=window._bioResultsAll;
  const marked=window._bioMarked;const night=window._bioNight;const nightFixed=window._bioNightFixed;
  const short=window._bioShort;const skipped=window._bioSkipped;const noMatch=window._bioNoMatch;
  if(!bioData||!results)return alert('No biometric data! Process files first.');
  
  // Filter employees by pay point
  const emps=ppFilter==='all'?S.emps:S.emps.filter(e=>e.p===ppFilter);
  const ppLabel=ppFilter==='all'?'All':ppN(ppFilter);
  
  const rosterRows=emps.map((emp,idx)=>{
    const bd=bioData[emp.i]||null;
    return{
      'SN':idx+1,
      'Employee ID':emp.i,
      'Employee Name':emp.n,
      'Pay Point':ppN(emp.p),
      'Date':bd?bd.date:'',
      'IN Time':bd?bd.inT:'',
      'OUT Time':bd?bd.outT:'',
      'Work Hours':bd?bd.work:'',
      'Status':bd?(bd.status==='P'?'PRESENT':bd.status==='U'?'UNDERGROUND (NIGHT)':bd.status==='short'?'SHORT DUTY':bd.status==='skip'?'SKIPPED':'NO RECORD'):'NO RECORD',
      'Marked As':bd?bd.code:'',
    };
  });
  
  // Count stats for this pay point
  const empIds=new Set(emps.map(e=>e.i));
  const ppResults=results.filter(r=>empIds.has(r.eid));
  const ppMarked=ppResults.filter(r=>r.status==='P'||r.status==='U').length;
  const ppNight=ppResults.filter(r=>r.status==='U').length;
  const ppShort=ppResults.filter(r=>r.status==='short').length;
  const ppSkipped=ppResults.filter(r=>r.status==='skip').length;
  
  const summary=[
    {Category:'Pay Point',Count:ppLabel},
    {Category:'Total Employees',Count:emps.length},
    {Category:'Marked Present (P)',Count:ppMarked-ppNight},
    {Category:'Night Shift (U)',Count:ppNight},
    {Category:'Night Fixed (from next day)',Count:ppResults.filter(r=>r.status==='U'&&r.reason&&r.reason.includes('next day')).length},
    {Category:'Short Duty (<7h)',Count:ppShort},
    {Category:'Skipped (Single Punch)',Count:ppSkipped},
    {Category:'No Record (absent)',Count:emps.filter(e=>!bioData[e.i]).length},
    {Category:'No Match (ID not in roster)',Count:results.filter(r=>r.status==='nomatch').length},
    {Category:'Total Auto-Marked',Count:ppMarked},
  ];
  
  const shortRows=ppResults.filter(r=>r.status==='short').map((r,i)=>({
    'SN':i+1,'Employee ID':r.eid,'Name':r.name,'Date':r.date,'IN':r.inT||'','OUT':r.outT||'','Work':r.work||'','Remarks':r.reason||''
  }));
  
  const skipRows=ppResults.filter(r=>r.status==='skip').map((r,i)=>({
    'SN':i+1,'Employee ID':r.eid,'Name':r.name,'Date':r.date,'IN':r.inT||'','OUT':r.outT||'','Remarks':r.reason||''
  }));
  
  // No Record — roster employees with no biometric data at all
  const noRecordRows=emps.filter(e=>!bioData[e.i]).map((e,i)=>({
    'SN':i+1,'Employee ID':e.i,'Employee Name':e.n,'Pay Point':ppN(e.p)
  }));
  
  // Night Fixed — results with status U and reason containing 'next day'
  const nightFixedRows=ppResults.filter(r=>r.status==='U'&&r.reason&&r.reason.includes('next day')).map((r,i)=>({
    'SN':i+1,'Employee ID':r.eid,'Name':r.name,'Date':r.date,'IN':r.inT||'','OUT':r.outT||'','Work':r.work||'','Remarks':r.reason||''
  }));
  
  // No Match — IDs in biometric but not in roster
  const noMatchRows=results.filter(r=>r.status==='nomatch').map((r,i)=>({
    'SN':i+1,'Employee ID':r.eid,'Name':r.name,'Date':r.date,'IN':r.inT||'','OUT':r.outT||''
  }));
  
  const wb=XLSX.utils.book_new();
  
  const ws1=XLSX.utils.json_to_sheet(summary);
  ws1['!cols']=[{wch:32},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Summary');
  
  const ws2=XLSX.utils.json_to_sheet(rosterRows);
  ws2['!cols']=[{wch:5},{wch:12},{wch:26},{wch:12},{wch:12},{wch:10},{wch:12},{wch:10},{wch:22},{wch:8}];
  // Color NO RECORD rows
  const colKeys=['A','B','C','D','E','F','G','H','I','J'];
  rosterRows.forEach((r,i)=>{
    const rowNum=i+2;
    const isNoRecord=r['Status']==='NO RECORD';
    const isShort=r['Status']==='SHORT DUTY';
    const isSkipped=r['Status']==='SKIPPED';
    if(isNoRecord||isShort||isSkipped){
      const rgb=isNoRecord?'FFFF0000':isShort?'FFFFFF00':'FF00FF00';
      colKeys.forEach(c=>{
        const ref=c+rowNum;
        if(!ws2[ref])ws2[ref]={v:'',t:'s'};
        ws2[ref].s={fill:{type:'pattern',patternType:'solid',fgColor:{rgb}}};
      });
    }
  });
  XLSX.utils.book_append_sheet(wb,ws2,'Roster Attendance');
  
  if(shortRows.length){
    const ws3=XLSX.utils.json_to_sheet(shortRows);
    ws3['!cols']=[{wch:4},{wch:12},{wch:24},{wch:12},{wch:10},{wch:10},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws3,'Short Duty');
  }
  
  if(skipRows.length){
    const ws4=XLSX.utils.json_to_sheet(skipRows);
    ws4['!cols']=[{wch:4},{wch:12},{wch:24},{wch:12},{wch:10},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws4,'Skipped');
  }
  
  if(noRecordRows.length){
    const ws5=XLSX.utils.json_to_sheet(noRecordRows);
    ws5['!cols']=[{wch:4},{wch:12},{wch:26},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws5,'No Record');
  }
  
  if(nightFixedRows.length){
    const ws6=XLSX.utils.json_to_sheet(nightFixedRows);
    ws6['!cols']=[{wch:4},{wch:12},{wch:24},{wch:12},{wch:10},{wch:10},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws6,'Night Fixed');
  }
  
  if(noMatchRows.length){
    const ws7=XLSX.utils.json_to_sheet(noMatchRows);
    ws7['!cols']=[{wch:4},{wch:12},{wch:24},{wch:12},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws7,'No Match');
  }
  
  // Contract Surface sheet
  const surfEmps=emps.filter(e=>e.ct==='S');
  if(surfEmps.length){
    const surfRows=surfEmps.map((emp,idx)=>{
      const bd=bioData[emp.i]||null;
      return{
        'SN':idx+1,'Employee ID':emp.i,'Employee Name':emp.n,'Pay Point':ppN(emp.p),
        'Date':bd?bd.date:'','IN Time':bd?bd.inT:'','OUT Time':bd?bd.outT:'',
        'Work Hours':bd?bd.work:'',
        'Status':bd?(bd.status==='P'?'PRESENT':bd.status==='U'?'NIGHT':bd.status==='short'?'SHORT':bd.status==='skip'?'SKIPPED':'NO RECORD'):'NO RECORD',
        'Marked As':bd?bd.code:''
      };
    });
    const wsS=XLSX.utils.json_to_sheet(surfRows);
    wsS['!cols']=[{wch:4},{wch:12},{wch:26},{wch:12},{wch:12},{wch:10},{wch:12},{wch:10},{wch:16},{wch:8}];
    surfRows.forEach((r,i)=>{
      if(r['Status']==='NO RECORD'||r['Status']==='SHORT'||r['Status']==='SKIPPED'){
        const rgb=r['Status']==='NO RECORD'?'FFFF0000':r['Status']==='SHORT'?'FFFFFF00':'FF00FF00';
        colKeys.forEach(c=>{const ref=c+(i+2);if(!wsS[ref])wsS[ref]={v:'',t:'s'};wsS[ref].s={fill:{type:'pattern',patternType:'solid',fgColor:{rgb}}};});
      }
    });
    XLSX.utils.book_append_sheet(wb,wsS,'Contract Surface');
  }
  
  // Contract Underground sheet (default — ct not 'S')
  const ugEmps=emps.filter(e=>e.ct!=='S');
  if(ugEmps.length){
    const ugRows=ugEmps.map((emp,idx)=>{
      const bd=bioData[emp.i]||null;
      return{
        'SN':idx+1,'Employee ID':emp.i,'Employee Name':emp.n,'Pay Point':ppN(emp.p),
        'Date':bd?bd.date:'','IN Time':bd?bd.inT:'','OUT Time':bd?bd.outT:'',
        'Work Hours':bd?bd.work:'',
        'Status':bd?(bd.status==='P'?'PRESENT':bd.status==='U'?'NIGHT':bd.status==='short'?'SHORT':bd.status==='skip'?'SKIPPED':'NO RECORD'):'NO RECORD',
        'Marked As':bd?bd.code:''
      };
    });
    const wsU=XLSX.utils.json_to_sheet(ugRows);
    wsU['!cols']=[{wch:4},{wch:12},{wch:26},{wch:12},{wch:12},{wch:10},{wch:12},{wch:10},{wch:16},{wch:8}];
    ugRows.forEach((r,i)=>{
      if(r['Status']==='NO RECORD'||r['Status']==='SHORT'||r['Status']==='SKIPPED'){
        const rgb=r['Status']==='NO RECORD'?'FFFF0000':r['Status']==='SHORT'?'FFFFFF00':'FF00FF00';
        colKeys.forEach(c=>{const ref=c+(i+2);if(!wsU[ref])wsU[ref]={v:'',t:'s'};wsU[ref].s={fill:{type:'pattern',patternType:'solid',fgColor:{rgb}}};});
      }
    });
    XLSX.utils.book_append_sheet(wb,wsU,'Contract Underground');
  }
  
  // Special Pay Point 8L0934NE separate sheet
  const neEmps=S.emps.filter(e=>e.p==='8L0934NE');
  if(neEmps.length&&(ppFilter==='all'||ppFilter==='8L0934NE')){
    let sn=0;
    const neRows=[];
    neEmps.forEach(e=>{
      const bio=window._bioData[e.i];
      const marked=window._bioMarked||{};
      const night=window._bioNight||{};
      let status='NO RECORD',inT='',outT='',workH='',markedAs='';
      
      if(bio){
        inT=bio.in||'';outT=bio.out||'';
        const wm=bio.workMins||0;
        workH=wm>0?(wm/60).toFixed(1)+'h':'';
        const r=(window._bioResultsAll||[]).find(x=>x.eid===e.i);
        if(r){
          if(r.status==='P')status='PRESENT';
          else if(r.status==='U')status='NIGHT';
          else if(r.status==='short')status='SHORT';
          else if(r.status==='skip')status='SKIPPED';
        }
        markedAs=marked[e.i]||'';
      }
      
      neRows.push({
        'SN':++sn,'Employee ID':e.i,'Employee Name':e.n,'Pay Point':ppN(e.p),
        'Contract':e.ct==='S'?'Surface':'Underground',
        'Date':window._bioDate||'','IN':inT,'OUT':outT,'Work Hours':workH,
        'Status':status,'Marked As':markedAs
      });
    });
    if(neRows.length){
      const wsNE=XLSX.utils.json_to_sheet(neRows);
      wsNE['!cols']=[{wch:4},{wch:12},{wch:26},{wch:12},{wch:12},{wch:12},{wch:10},{wch:12},{wch:10},{wch:12},{wch:8}];
      XLSX.utils.book_append_sheet(wb,wsNE,'8L0934NE');
    }
  }
  
  // Collect blanks (NO RECORD employees)
  const bioBlanks=emps.filter(e=>!bioData[e.i]).map(e=>({
    eid:e.i,name:e.n,pp:ppN(e.p),date:window._bioDate||''
  }));
  // Also add SHORT and SKIPPED
  const bioRes2=window._bioResultsAll||[];
  const empIdSet=new Set(emps.map(e=>e.i));
  bioRes2.filter(r=>empIdSet.has(r.eid)&&(r.status==='short'||r.status==='skip')).forEach(r=>{
    const emp=emps.find(e=>e.i===r.eid);
    bioBlanks.push({eid:r.eid,name:emp?emp.n:r.name,pp:emp?ppN(emp.p):'',date:r.date||window._bioDate||''});
  });
  addChangeLogSheets(wb,emps,bioBlanks);
  
  const today=fD(new Date());
  const fname=ppFilter==='all'?`Biometric_Report_${today}.xlsx`:`Biometric_${ppLabel}_${today}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast('Downloaded — '+ppLabel+'!');
}

function bioShowResults(){
  const el=document.getElementById('bio-detail');
  if(!el||!window._bioResults)return;
  const filter=window.bioFilter||'all';
  const data=filter==='all'?window._bioResults:window._bioResults.filter(r=>r.status===filter);

// ═══════ IMPORT MONTHLY REPORT ═══════
function impProcess(){
  const fileInput=document.getElementById('imp-file');
  const monEl=document.getElementById('imp-mon');
  const yrEl=document.getElementById('imp-yr');
  if(!fileInput||!fileInput.files||!fileInput.files.length){alert('Please select Excel file(s) first!');return;}
  
  const mon=parseInt(monEl.value);
  const yr=parseInt(yrEl.value);
  const dim=dI(yr,mon);
  const statusEl=document.getElementById('imp-status');
  const resEl=document.getElementById('imp-results');
  
  statusEl.innerHTML='<div class="cd" style="padding:14px;text-align:center;color:#a5b4fc;font-size:13px">Processing files...</div>';
  
  const rosterMap={};
  S.emps.forEach(emp=>{rosterMap[emp.i.trim()]=emp;});
  
  const validCodes={};CC.forEach(c=>validCodes[c.c]=true);
  
  const allFiles=Array.from(fileInput.files);
  let totalFed=0,totalSkipped=0,totalNoMatch=0,totalFiles=0;
  const allResults=[];
  let processed=0;
  
  allFiles.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        
        let fileFed=0,fileSkip=0,fileNoMatch=0;
        
        rows.forEach(row=>{
          const eid=String(row['Employee ID']||row['EmployeeID']||row['employee id']||row['Emp ID']||'').trim();
          if(!eid)return;
          
          const emp=rosterMap[eid];
          if(!emp){fileNoMatch++;return;}
          
          const empKey=ek(emp);
          
          for(let d=1;d<=dim;d++){
            const cellVal=String(row[String(d)]||row[d]||'').trim().toUpperCase();
            if(!cellVal)continue;
            
            let code=cellVal;
            if(!validCodes[code]){
              if(code==='P')code='P';
              else if(code==='P*'||code==='PM'||code==='P(M)')code='P*';
              else if(code==='U*'||code==='UM'||code==='U(M)')code='U*';
              else if(!validCodes[code]){fileSkip++;continue;}
            }
            
            const ds=`${yr}-${String(mon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const attKey=empKey+'|'+ds;
            
            // Always overwrite into S.att2
            S.att2[attKey]=code;
            fileFed++;
          }
        });
        
        totalFed+=fileFed;totalSkipped+=fileSkip;totalNoMatch+=fileNoMatch;totalFiles++;
        allResults.push({file:file.name,status:'done',fed:fileFed,noMatch:fileNoMatch,skipped:fileSkip});
        
      }catch(err){
        allResults.push({file:file.name,status:'error',reason:err.message});
        totalFiles++;
      }
      
      processed++;
      if(processed===allFiles.length){
        saveA2();
        
        statusEl.innerHTML=`<div class="cd" style="padding:14px">
          <div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:8px">✓ Updated Manual Report — ${totalFiles} file${totalFiles>1?'s':''} processed</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
            <div class="sc" style="border-color:rgba(22,163,74,.2)"><div style="font-size:24px;font-weight:800;color:#16a34a;font-family:'JetBrains Mono',monospace">${totalFed}</div><div style="font-size:10px;color:#94a3b8">Entries Updated</div></div>
            <div class="sc" style="border-color:rgba(100,116,139,.2)"><div style="font-size:24px;font-weight:800;color:#64748b;font-family:'JetBrains Mono',monospace">${totalNoMatch}</div><div style="font-size:10px;color:#94a3b8">ID Not Found</div></div>
            <div class="sc" style="border-color:rgba(248,113,113,.2)"><div style="font-size:24px;font-weight:800;color:#f87171;font-family:'JetBrains Mono',monospace">${totalSkipped}</div><div style="font-size:10px;color:#94a3b8">Invalid Codes</div></div>
          </div>
        </div>`;
        
        const fileResults=allResults.filter(r=>r.status==='done'||r.status==='error');
        if(fileResults.length){
          resEl.innerHTML=`<div class="cd">
            <div style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;font-weight:600;color:#a5b4fc">File-wise Details</span></div>
            <div style="max-height:40vh;overflow-y:auto">${fileResults.map(r=>{
              if(r.status==='error')return`<div class="rw" style="gap:10px"><div style="width:28px;height:28px;border-radius:7px;background:#fee2e2;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#dc2626;flex-shrink:0">✕</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:#f87171">${r.file}</div><div style="font-size:10px;color:#94a3b8">Error: ${r.reason}</div></div></div>`;
              return`<div class="rw" style="gap:10px">
                <div style="width:28px;height:28px;border-radius:7px;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#16a34a;flex-shrink:0">✓</div>
                <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#e2e8f0">${r.file}</div>
                <div style="font-size:10px;color:#94a3b8"><b style="color:#16a34a">${r.fed} updated</b> · <b style="color:#64748b">${r.noMatch} no-match</b></div></div>
              </div>`;
            }).join('')}</div>
          </div>`;
        }
        
        addLog('Import to Manual',`${totalFed} entries from ${totalFiles} file(s)`,`NoMatch:${totalNoMatch}`);
        toast(totalFed+' entries updated in Manual Report!');
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

// ═══════ ROSTER UPLOAD ═══════
function rosterUpload(){
  const fileInput=document.getElementById('roster-file');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){alert('Please select an Excel file!');return;}
  
  const statusEl=document.getElementById('roster-upload-status');
  statusEl.innerHTML='<div style="font-size:11px;color:#a5b4fc">Processing...</div>';
  
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      
      if(!rows.length){statusEl.innerHTML='<div style="color:#f87171;font-size:11px">No data found!</div>';return;}
      
      // Parse new roster from Excel
      const newEmps=[];
      rows.forEach((row,idx)=>{
        const sn=parseInt(row.SN||row.sn||row['S.N']||row['S.N.']||(idx+1));
        const eid=String(row['EMPLOYEE ID']||row['Employee ID']||row.EmployeeID||row['Emp ID']||row.employee_id||'').trim();
        const name=String(row['EMPLOYEE NAME']||row['Employee Name']||row.Name||row.name||row.employee_name||'').trim().toUpperCase();
        const pp=String(row['Pay_Point Name']||row['Pay Point']||row.PayPoint||row.pay_point||'').trim();
        if(!eid||!name)return;
        newEmps.push({s:sn,i:eid,n:name,p:pp});
      });
      
      if(!newEmps.length){statusEl.innerHTML='<div style="color:#f87171;font-size:11px">No valid employees found in file!</div>';return;}
      
      // Compare with existing roster
      const oldMap={};S.emps.forEach(emp=>{oldMap[emp.i]=emp;});
      const newMap={};newEmps.forEach(emp=>{newMap[emp.i]=emp;});
      
      let added=0,removed=0,updated=0,unchanged=0;
      const addedList=[];
      const removedList=[];
      
      // Find new employees (in new file but not in old roster)
      newEmps.forEach(emp=>{
        if(!oldMap[emp.i]){added++;addedList.push(emp);}
        else{
          const old=oldMap[emp.i];
          if(old.n!==emp.n||old.p!==emp.p){updated++;}
          else{unchanged++;}
        }
      });
      
      // Find removed employees (in old roster but not in new file)
      S.emps.forEach(emp=>{
        if(!newMap[emp.i]){removed++;removedList.push(emp);}
      });
      
      // Confirm before applying
      let msg=`Roster Update Summary:\n\n`;
      msg+=`Current roster: ${S.emps.length} employees\n`;
      msg+=`New file: ${newEmps.length} employees\n\n`;
      msg+=`+ ${added} new employees will be ADDED\n`;
      msg+=`- ${removed} employees will be REMOVED\n`;
      msg+=`~ ${updated} employees will be UPDATED (name/pay point changed)\n`;
      msg+=`= ${unchanged} unchanged\n`;
      if(removedList.length>0&&removedList.length<=10){
        msg+=`\nRemoving: ${removedList.map(e=>e.n+' ('+e.i+')').join(', ')}`;
      }
      msg+=`\nProceed?`;
      
      if(!confirm(msg))return;
      
      // Apply: replace roster with new file data
      S.emps=newEmps;
      saveE();pS('e',S.emps);
      
      statusEl.innerHTML=`<div style="background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.15);border-radius:8px;padding:10px;margin-top:4px">
        <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:4px">✓ Roster Updated!</div>
        <div style="font-size:11px;color:#94a3b8">
          <b style="color:#16a34a">+${added}</b> added · 
          <b style="color:#f87171">-${removed}</b> removed · 
          <b style="color:#a5b4fc">~${updated}</b> updated · 
          <b style="color:#64748b">=${unchanged}</b> same · 
          <b style="color:#e2e8f0">Total: ${S.emps.length}</b>
        </div>
        ${addedList.length>0&&addedList.length<=10?`<div style="font-size:10px;color:#16a34a;margin-top:3px">Added: ${addedList.map(e=>e.n).join(', ')}</div>`:''}
        ${removedList.length>0&&removedList.length<=10?`<div style="font-size:10px;color:#f87171;margin-top:3px">Removed: ${removedList.map(e=>e.n).join(', ')}</div>`:''}
      </div>`;
      
      S.page=0;
      renderRoster();
      addLog('Roster Upload',`+${added} added, -${removed} removed, ~${updated} updated`,`Total: ${S.emps.length}`);
      toast('Roster updated — '+S.emps.length+' employees!');
    }catch(err){
      statusEl.innerHTML='<div style="color:#f87171;font-size:11px">Error: '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
}

function addChangeLogSheets(wb,fil,blanks){
  // blanks = [{eid, name, pp, date, sheetName, cellRef}]
  if(!blanks.length)return;
  
  // Original sheet — snapshot of what was blank
  const origRows=blanks.map((b,i)=>({
    'SN':i+1,'Employee ID':b.eid,'Employee Name':b.name,'Pay Point':b.pp,'Date':b.date,'Original Code':'(BLANK)'
  }));
  const wsO=XLSX.utils.json_to_sheet(origRows);
  wsO['!cols']=[{wch:4},{wch:13},{wch:26},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsO,'Original (Blank List)');
  
  // Change Log sheet with FORMULAS that auto-pull from attendance sheet
  const clHeaders=['SN','Employee ID','Employee Name','Pay Point','Date','Code Entered'];
  const wsC=XLSX.utils.aoa_to_sheet([clHeaders]);
  
  blanks.forEach((b,i)=>{
    const row=i+1; // 0-indexed (row 0 = header)
    // Static cells
    wsC[XLSX.utils.encode_cell({r:row,c:0})]={v:i+1,t:'n'};
    wsC[XLSX.utils.encode_cell({r:row,c:1})]={v:b.eid,t:'s'};
    wsC[XLSX.utils.encode_cell({r:row,c:2})]={v:b.name,t:'s'};
    wsC[XLSX.utils.encode_cell({r:row,c:3})]={v:b.pp,t:'s'};
    wsC[XLSX.utils.encode_cell({r:row,c:4})]={v:b.date,t:'s'};
    
    // Formula cell — pulls value from attendance sheet
    if(b.sheetName&&b.cellRef){
      const sn=b.sheetName.replace(/'/g,"''");
      const formula="IF('"+sn+"'!"+b.cellRef+"<>\"\",'"+ sn+"'!"+b.cellRef+",\"\")";
      wsC[XLSX.utils.encode_cell({r:row,c:5})]={f:formula};
    } else {
      wsC[XLSX.utils.encode_cell({r:row,c:5})]={v:'',t:'s'};
    }
  });
  
  // Set range
  wsC['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:blanks.length,c:5}});
  wsC['!cols']=[{wch:4},{wch:13},{wch:26},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsC,'Change Log');
}

// ═══════ IMPORT VIEWER ═══════
let vwData=null; // {rows: [{eid,name,pp,days:{1:'P',2:'SL',...}}], mon, yr, dim}

function vwLoad(){
  const fileInput=document.getElementById('vw-file');
  if(!fileInput||!fileInput.files||!fileInput.files.length){alert('Please select an Excel file!');return;}
  
  const rosterMap={};
  S.emps.forEach(emp=>{rosterMap[emp.i.trim()]=emp;});
  
  const allFiles=Array.from(fileInput.files);
  const merged={}; // eid -> {emp, days}
  let filesRead=0;
  let detectedMon=S.mon,detectedYr=S.yr;
  
  allFiles.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        
        if(!rows.length){filesRead++;return;}
        
        // Detect column format from headers
        // Could be: "1","2","3" OR "01.02.2026","02.02.2026" OR "2026-02-01" etc.
        const firstRow=rows[0];
        const colMap={}; // dayNumber -> columnKey
        
        Object.keys(firstRow).forEach(key=>{
          // Try format: "01.02.2026" (DD.MM.YYYY)
          const m1=key.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
          if(m1){
            const day=parseInt(m1[1]);
            colMap[day]=key;
            detectedMon=parseInt(m1[2])-1;
            detectedYr=parseInt(m1[3]);
            return;
          }
          // Try format: "2026-02-01" (YYYY-MM-DD)
          const m2=key.match(/^(\d{4})-(\d{2})-(\d{2})/);
          if(m2){
            const day=parseInt(m2[3]);
            colMap[day]=key;
            detectedMon=parseInt(m2[2])-1;
            detectedYr=parseInt(m2[1]);
            return;
          }
          // Try format: "01/02/2026" (DD/MM/YYYY)
          const m3=key.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          if(m3){
            const day=parseInt(m3[1]);
            colMap[day]=key;
            detectedMon=parseInt(m3[2])-1;
            detectedYr=parseInt(m3[3]);
            return;
          }
          // Try simple number: "1","2"..."31"
          const num=parseInt(key);
          if(!isNaN(num)&&num>=1&&num<=31){
            colMap[num]=key;
          }
        });
        
        rows.forEach(row=>{
          // Handle float IDs (e.g. 22747992.0 → "22747992")
          let eidRaw=row['EMPLOYEE ID']||row['Employee ID']||row['EmployeeID']||row['employee id']||row['Emp ID']||'';
          let eid=String(eidRaw).trim();if(eid.endsWith('.0'))eid=eid.slice(0,-2);
          if(!eid)return;
          
          const emp=rosterMap[eid];
          if(!merged[eid]){
            let nameRaw=row['EMPLOYEE NAME']||row['Employee Name']||row['Name']||row['employee name']||'';
            merged[eid]={
              emp:emp||null,
              eid:eid,
              name:String(nameRaw).trim(),
              pp:emp?ppN(emp.p):String(row['Pay_Point Name']||row['Pay Point']||row['PayPoint']||'').trim(),
              sn:emp?emp.s:(parseInt(row['SN']||row['sn']||0)),
              days:{}
            };
          }
          
          // Read day columns using detected colMap
          for(let d=1;d<=31;d++){
            let val='';
            if(colMap[d]){
              val=String(row[colMap[d]]||'').trim();
            } else {
              // Fallback: try direct number keys
              val=String(row[String(d)]||row[d]||'').trim();
            }
            if(val)merged[eid].days[d]=val;
          }
        });
      }catch(err){
        alert('Error reading '+file.name+': '+err.message);
      }
      
      filesRead++;
      if(filesRead===allFiles.length){
        const sortedRows=Object.values(merged).sort((a,b)=>(a.sn||9999)-(b.sn||9999));
        
        vwData={rows:sortedRows,mon:detectedMon,yr:detectedYr,dim:dI(detectedYr,detectedMon)};
        
        document.getElementById('vw-controls').style.display='block';
        vwRender();
        toast(sortedRows.length+' employees loaded ('+MF[detectedMon]+' '+detectedYr+')!');
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function vwGetFiltered(){
  if(!vwData)return[];
  const ppF=document.getElementById('vw-pp')?.value||'all';
  const sr=(document.getElementById('vw-sr')?.value||'').toLowerCase();
  return vwData.rows.filter(r=>{
    const ppMatch=ppF==='all'||(r.emp&&r.emp.p===ppF);
    const srMatch=!sr||r.name.toLowerCase().includes(sr)||r.eid.toLowerCase().includes(sr);
    return ppMatch&&srMatch;
  });
}

// IMPORT VIEWER — Keyboard Shortcuts
// ══════════════════════════════════════════════════
let vwKbBuf = '';      // number buffer e.g. '1','11','25'
let vwKbCode = '';     // code buffer e.g. 'C','CL','SL'
let vwKbTimer = null;  // debounce timer

function vwKbInit() {
  // Remove old listener first
  document.removeEventListener('keydown', vwKbHandler);
  document.addEventListener('keydown', vwKbHandler);
}

function vwKbHandler(e) {
  // Only active when viewer tab is open and bulk panel visible
  if (S.tab !== 'viewer') return;
  const panel = document.getElementById('vw-bulk-panel');
  if (!panel || !panel.innerHTML.trim()) return;
  const eid = document.getElementById('vw-emp-sel')?.value;
  if (!eid) return;

  // Ignore if user is typing in an input/select
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'select' || tag === 'textarea') return;

  const key = e.key;

  // ── Enter → Apply current code to selected days + next ──
  if (key === 'Enter') {
    e.preventDefault();
    if (vwKbCode) {
      vwApplyCode(vwKbCode.toUpperCase(), eid);
      vwKbCode = ''; vwKbBuf = '';
      vwUpdateKbDisplay();
    } else {
      vwNextEmp();
    }
    return;
  }

  // ── Escape → clear selection ──
  if (key === 'Escape') {
    e.preventDefault();
    vwBlankChecked.clear();
    vwKbBuf = ''; vwKbCode = '';
    vwRenderBulkPanel(eid);
    return;
  }

  // ── Backspace → clear code buffer ──
  if (key === 'Backspace') {
    e.preventDefault();
    if (vwKbCode.length > 0) {
      vwKbCode = vwKbCode.slice(0, -1);
    } else {
      vwKbBuf = vwKbBuf.slice(0, -1);
    }
    vwUpdateKbDisplay();
    return;
  }

  // ── 'A' key → select all blanks ──
  if (key.toLowerCase() === 'a' && !vwKbCode && !vwKbBuf) {
    e.preventDefault();
    const row = vwData && vwData.rows.find(r => r.eid === eid);
    if (row) {
      for (let d = 1; d <= vwData.dim; d++) {
        if (!row.days[d]) vwBlankChecked.add(d);
      }
      vwRenderBulkPanel(eid);
    }
    return;
  }

  // ── Digit keys → number buffer (day selection) ──
  if (/^[0-9]$/.test(key) && !vwKbCode) {
    e.preventDefault();
    vwKbBuf += key;

    // Debounce: wait 600ms for second digit
    clearTimeout(vwKbTimer);
    vwKbTimer = setTimeout(function() {
      const day = parseInt(vwKbBuf);
      if (day >= 1 && day <= (vwData ? vwData.dim : 31)) {
        // Toggle day
        if (vwBlankChecked.has(day)) vwBlankChecked.delete(day);
        else vwBlankChecked.add(day);
        vwRenderBulkPanel(eid);
      }
      vwKbBuf = '';
      vwUpdateKbDisplay();
    }, 600);

    vwUpdateKbDisplay();
    return;
  }

  // ── Letter keys → code buffer ──
  if (/^[a-zA-Z]$/.test(key) && !vwKbBuf) {
    e.preventDefault();
    vwKbCode += key.toUpperCase();

    // Check if it's a valid complete code
    const validCodes = ['P','U','S','R','A','CL','SL','EL','OD','HD','HE','WE','LL','ML','CCL'];
    const exact = validCodes.find(c => c === vwKbCode);
    const partial = validCodes.some(c => c.startsWith(vwKbCode));

    if (exact && !validCodes.some(c => c !== vwKbCode && c.startsWith(vwKbCode))) {
      // Unique match — auto apply if days selected
      if (vwBlankChecked.size > 0) {
        setTimeout(function() {
          vwApplyCode(vwKbCode, eid);
          vwKbCode = '';
          vwUpdateKbDisplay();
        }, 300);
      }
    } else if (!partial) {
      // No match — clear
      vwKbCode = '';
    }

    vwUpdateKbDisplay();
    return;
  }
}

function vwUpdateKbDisplay() {
  // Show current keyboard buffer in a small overlay
  let el = document.getElementById('vw-kb-display');
  if (!el) {
    el = document.createElement('div');
    el.id = 'vw-kb-display';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:rgba(15,23,42,.95);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:8px 14px;font-size:13px;font-family:monospace;z-index:9999;color:#e2e8f0;min-width:80px;text-align:center;display:none';
    document.body.appendChild(el);
  }
  const buf = vwKbBuf || vwKbCode;
  if (buf) {
    el.style.display = 'block';
    el.innerHTML = '<span style="color:#64748b;font-size:10px">Input:</span><br><span style="color:#a5b4fc;font-weight:700;font-size:18px">' + buf + '</span>';
  } else {
    el.style.display = 'none';
  }
}


function vwUndo(logEntry, eid) {
  if (!vwData || !logEntry) return;
  const row = vwData.rows.find(r => r.eid === eid);
  if (!row) return;
  const day = logEntry.days && logEntry.days[0] ? logEntry.days[0] : null;
  if (!day) return;

  // Remove code from row
  delete row.days[day];

  // Remove from log
  const idx = vwLog.findIndex(function(l) {
    return l.eid === logEntry.eid && l.code === logEntry.code &&
           l.days && l.days[0] == day && l.dateTime === logEntry.dateTime;
  });
  if (idx >= 0) vwLog.splice(idx, 1);
  LS.s('vwlog', vwLog);

  toast('Undo: Day ' + day + ' → ' + logEntry.code + ' removed!');
  vwRenderBulkPanel(eid);
  vwRender();
}

function vwToggleBlank(d,checked,eid){
  if(checked)vwBlankChecked.add(d);else vwBlankChecked.delete(d);
  vwRenderBulkPanel(eid);
}
function vwCheckAllBlanks(days){
  days.forEach(d=>vwBlankChecked.add(d));
  const eid=document.getElementById('vw-emp-sel')?.value;
  if(eid)vwRenderBulkPanel(eid);
}
function vwUncheckAllBlanks(){
  vwBlankChecked.clear();
  const eid=document.getElementById('vw-emp-sel')?.value;
  if(eid)vwRenderBulkPanel(eid);
}

function vwApplyCode(code,eid){
  if(!vwBlankChecked.size){toast('Select dates first!',false);return;}
  if(!vwData)return;
  const row=vwData.rows.find(r=>r.eid===eid);
  if(!row)return;
  
  const now=new Date();
  const dateTimeStr=now.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const appliedDays=[...vwBlankChecked].sort((a,b)=>a-b);
  
  appliedDays.forEach(d=>{
    row.days[d]=code;
  });
  
  // Log entry — har din ki alag row
  const newEntries = appliedDays.map(function(d){
    return {
      dateTime:dateTimeStr,
      eid:eid,
      name:row.name,
      code:code,
      dates:String(d),
      days:[d],
      mon:vwData.mon,
      yr:vwData.yr
    };
  });
  vwLog=newEntries.concat(vwLog);
  // No limit — unlimited log
  LS.s('vwlog',vwLog);
  
  // Update log display
  vwUpdateLogDisplay();
  
  vwBlankChecked.clear();
  toast(code+' → '+row.name+' ('+appliedDays.join(',')+')');
  
  // Re-render panel (may have more blanks or auto-next)
  vwRenderBulkPanel(eid);
  
  // Also refresh grid
  vwRender();
}

function vwUpdateLogDisplay(){
  const logList=document.getElementById('vw-log-list');
  if(logList){
    logList.innerHTML=vwLog.slice(0,50).map(l=>{
      const code=l.code||l.action||'';
      const name=l.name||'';
      const eid=l.eid||'';
      const dates=l.dates||'';
      return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:6px;flex-wrap:wrap;font-size:9px">'
        +'<span style="color:#4b5563;min-width:110px">'+(l.dateTime||l.time||'')+'</span>'
        +'<span style="color:#94a3b8;min-width:65px">'+eid+'</span>'
        +'<span style="color:#e2e8f0;min-width:100px;font-weight:500">'+name+'</span>'
        +'<span style="color:#f59e0b;font-weight:700;min-width:24px">'+code+'</span>'
        +'<span style="color:#818cf8">Days: '+dates+'</span>'
        +'</div>';
    }).join('');
  }
}

let vwAmrReport=[];

function vwAmrCrossCheck2(){
  if(!vwData){toast('Load Import Viewer data first!',false);return;}
  const el=document.getElementById('vw-amr-results');
  if(!el)return;
  
  // Get AMR entries for matching month
  const monKey=MF[vwData.mon].slice(0,3).toUpperCase()+'-'+vwData.yr;
  const amrEntries=amrData[monKey]||[];
  
  if(!amrEntries.length){
    el.innerHTML='<div style="color:#f87171;padding:6px">No AMR data found for '+monKey+'. Process AMR first.</div>';
    return;
  }
  
  const searchVal=(document.getElementById('vw-amr-search')?.value||'').toLowerCase();
  const suspiciousCodes=new Set(['P','P*','S','U','U*','WE','HD','HE']);
  
  // Build AMR lookup: eid → [{date, inTime, outTime, issue}]
  const amrMap={};
  amrEntries.forEach(a=>{
    if(!amrMap[a.eid])amrMap[a.eid]=[];
    amrMap[a.eid].push({
      date:a.date,
      inTime:a.inTime||a.in_time||a.IN||'--',
      outTime:a.outTime||a.out_time||a.OUT||'--',
      issue:a.issue||a.reason||'Single Punch'
    });
  });
  
  // Build Viewer Activity Log lookup: eid → [{day, oldCode, newCode}]
  const logMap={};
  vwLog.forEach(l=>{
    if(!l.eid)return;
    if(!logMap[l.eid])logMap[l.eid]=[];
    const days=(l.dates||'').split(',').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d));
    days.forEach(d=>{
      logMap[l.eid].push({day:d, code:l.code||l.action||''});
    });
  });
  
  // Cross-check: for each AMR entry, match with Import Viewer + Log
  vwAmrReport=[];
  
  Object.keys(amrMap).forEach(eid=>{
    // Search filter
    if(searchVal){
      const vRow=vwData.rows.find(r=>r.eid===eid);
      const name=(vRow?.name||'').toLowerCase();
      if(!eid.toLowerCase().includes(searchVal)&&!name.includes(searchVal))return;
    }
    
    const amrList=amrMap[eid];
    const vRow=vwData.rows.find(r=>r.eid===eid);
    const emp=S.emps.find(e=>e.i===eid);
    const md=mdData.length?mdData.find(m=>m.pid===eid):null;
    const name=vRow?.name||emp?.n||eid;
    const desig=md?.pos||emp?.desig||'';
    
    amrList.forEach(amr=>{
      // Parse AMR date to get day number
      const dateParts=amr.date.split(/[.\/\-]/);
      const dayNum=parseInt(dateParts[0]);
      if(isNaN(dayNum)||dayNum<1||dayNum>vwData.dim)return;
      
      // Get Import Viewer code for this date
      const viewerCode=vRow?.days?.[dayNum]||'BLANK';
      
      // Get Activity Log changes for this date
      const logEntries=(logMap[eid]||[]).filter(l=>l.day===dayNum);
      const logChange=logEntries.length?logEntries.map(l=>'→'+l.code).join(', '):'--';
      
      // Determine status
      let status='ℹ️ CHECK';
      let statusColor='#94a3b8';
      
      if(suspiciousCodes.has(viewerCode)){
        if(logEntries.length){
          status='⚠️⚠️ ALERT';
          statusColor='#ef4444';
        } else {
          status='⚠️ SUSPECT';
          statusColor='#f59e0b';
        }
      }
      
      vwAmrReport.push({
        eid, name, desig,
        date:amr.date,
        dayNum,
        inTime:amr.inTime||'--',
        outTime:amr.outTime||'--',
        viewerCode,
        logChange,
        status,
        statusColor,
        hasLog:logEntries.length>0,
        isSuspicious:suspiciousCodes.has(viewerCode)
      });
    });
  });
  
  // Sort: ALERT first, then SUSPECT, then CHECK, within same status by date
  const statusOrder={'⚠️⚠️ ALERT':0,'⚠️ SUSPECT':1,'ℹ️ CHECK':2};
  vwAmrReport.sort((a,b)=>{
    const sa=statusOrder[a.status]||9;
    const sb=statusOrder[b.status]||9;
    if(sa!==sb)return sa-sb;
    return a.dayNum-b.dayNum;
  });
  
  // Render
  if(!vwAmrReport.length){
    el.innerHTML='<div style="color:#22c55e;padding:6px">✅ No matching entries found.</div>';
    return;
  }
  
  // Summary badges
  const alertCount=vwAmrReport.filter(r=>r.status==='⚠️⚠️ ALERT').length;
  const suspectCount=vwAmrReport.filter(r=>r.status==='⚠️ SUSPECT').length;
  const checkCount=vwAmrReport.filter(r=>r.status==='ℹ️ CHECK').length;
  
  let h='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">';
  if(alertCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;background:#ef4444">⚠️⚠️ ALERT: '+alertCount+'</span>';
  if(suspectCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;background:#f59e0b">⚠️ SUSPECT: '+suspectCount+'</span>';
  if(checkCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;color:#94a3b8;background:rgba(255,255,255,.05)">ℹ️ CHECK: '+checkCount+'</span>';
  h+='</div>';
  
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:8px;min-width:500px">';
  h+='<tr style="background:rgba(239,68,68,.1)"><th style="padding:4px;text-align:left;color:#f87171">SN</th><th style="padding:4px;text-align:left;color:#f87171">ID</th><th style="padding:4px;text-align:left;color:#f87171">Name</th><th style="padding:4px;text-align:left;color:#f87171">Desig</th><th style="padding:4px;text-align:left;color:#f87171">Date</th><th style="padding:4px;text-align:left;color:#f87171">IN</th><th style="padding:4px;text-align:left;color:#f87171">OUT</th><th style="padding:4px;text-align:left;color:#f87171">Viewer Code</th><th style="padding:4px;text-align:left;color:#f87171">Log Change</th><th style="padding:4px;text-align:left;color:#f87171">Status</th></tr>';
  
  vwAmrReport.forEach((r,i)=>{
    const rowBg=r.status==='⚠️⚠️ ALERT'?'rgba(239,68,68,.06)':r.status==='⚠️ SUSPECT'?'rgba(245,158,11,.04)':'';
    h+='<tr style="border-bottom:1px solid rgba(255,255,255,.03);background:'+rowBg+'">';
    h+='<td style="padding:3px">'+(i+1)+'</td>';
    h+='<td style="padding:3px;color:#94a3b8;font-family:\'JetBrains Mono\',monospace">'+r.eid+'</td>';
    h+='<td style="padding:3px;color:#e2e8f0;font-weight:500">'+r.name+'</td>';
    h+='<td style="padding:3px;color:#a5b4fc;font-size:7px">'+r.desig+'</td>';
    h+='<td style="padding:3px;color:#818cf8;font-weight:600">'+r.date+'</td>';
    h+='<td style="padding:3px;color:'+(r.inTime==='--'?'#f87171':'#22c55e')+'">'+r.inTime+'</td>';
    h+='<td style="padding:3px;color:'+(r.outTime==='--'?'#f87171':'#22c55e')+'">'+r.outTime+'</td>';

// ═══════ COMPARE TOOL ═══════
function cmpParseFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length){resolve({});return;}
        
        // Detect date columns
        const colMap={};
        let detMon=S.mon,detYr=S.yr;
        Object.keys(rows[0]).forEach(key=>{
          const m1=key.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
          if(m1){colMap[parseInt(m1[1])]=key;detMon=parseInt(m1[2])-1;detYr=parseInt(m1[3]);return;}
          const m2=key.match(/^(\d{4})-(\d{2})-(\d{2})/);
          if(m2){colMap[parseInt(m2[3])]=key;detMon=parseInt(m2[2])-1;detYr=parseInt(m2[1]);return;}
          const m3=key.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          if(m3){colMap[parseInt(m3[1])]=key;detMon=parseInt(m3[2])-1;detYr=parseInt(m3[3]);return;}
          const num=parseInt(key);
          if(!isNaN(num)&&num>=1&&num<=31)colMap[num]=key;
        });
        
        // Build eid -> {name, pp, days}
        const result={};
        rows.forEach(row=>{
          let eidRaw=row['EMPLOYEE ID']||row['Employee ID']||row['EmployeeID']||row['employee id']||row['Emp ID']||'';
          let eid=String(eidRaw).trim();if(eid.endsWith('.0'))eid=eid.slice(0,-2);
          if(!eid)return;
          const name=String(row['EMPLOYEE NAME']||row['Employee Name']||row['Name']||'').trim();
          const pp=String(row['Pay_Point Name']||row['Pay Point']||'').trim();
          if(!result[eid])result[eid]={name,pp,days:{}};
          for(let d=1;d<=31;d++){
            let val='';
            if(colMap[d])val=String(row[colMap[d]]||'').trim();
            else val=String(row[String(d)]||row[d]||'').trim();
            if(val)result[eid].days[d]=val;
          }
        });
        resolve({data:result,mon:detMon,yr:detYr});
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Read failed'));
    reader.readAsArrayBuffer(file);
  });
}

async function cmpCompare(){
  const origInput=document.getElementById('cmp-orig');
  const fillInput=document.getElementById('cmp-filled');
  if(!origInput||!origInput.files||!origInput.files[0]){alert('Select original file!');return;}
  if(!fillInput||!fillInput.files||!fillInput.files[0]){alert('Select filled file!');return;}
  
  const resEl=document.getElementById('cmp-results');
  resEl.innerHTML='<div style="padding:14px;text-align:center;color:#a5b4fc;font-size:13px">Comparing...</div>';
  
  try{
    const orig=await cmpParseFile(origInput.files[0]);
    const filled=await cmpParseFile(fillInput.files[0]);
    
    if(!orig||!orig.data){resEl.innerHTML='<div style="color:#f87171;padding:10px">Could not parse original file</div>';return;}
    if(!filled||!filled.data){resEl.innerHTML='<div style="color:#f87171;padding:10px">Could not parse filled file</div>';return;}
    
    const origData=orig.data;
    const fillData=filled.data;
    const mon=filled.mon;
    const yr=filled.yr;
    const dim=dI(yr,mon);
    
    const origCount=Object.keys(origData).length;
    const fillCount=Object.keys(fillData).length;
    
    // Find differences: cells blank in original but filled in new
    const changes=[];
    Object.keys(fillData).forEach(eid=>{
      const fRow=fillData[eid];
      const oRow=origData[eid]||{days:{}};
      
      for(let d=1;d<=dim;d++){
        const origVal=(oRow.days[d]||'').trim();
        const fillVal=(fRow.days[d]||'').trim();
        
        if(!origVal&&fillVal){
          changes.push({eid,name:fRow.name,pp:fRow.pp,day:d,code:fillVal});
        }
      }
    });
    
    // Show summary
    let h=`<div style="padding:14px;margin-bottom:10px;background:rgba(22,30,50,.65);border:1px solid rgba(99,102,241,.07);border-radius:12px">
      <div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:6px">✓ Comparison Done — ${MF[mon]} ${yr}</div>
      <div style="font-size:10px;color:#94a3b8;margin-bottom:8px">Original: ${origCount} employees · Filled: ${fillCount} employees</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
        <div class="sc" style="border-color:rgba(22,163,74,.2)"><div style="font-size:24px;font-weight:800;color:#16a34a;font-family:'JetBrains Mono',monospace">${changes.length}</div><div style="font-size:10px;color:#94a3b8">New Entries Filled</div></div>
        <div class="sc" style="border-color:rgba(99,102,241,.2)"><div style="font-size:24px;font-weight:800;color:#6366f1;font-family:'JetBrains Mono',monospace">${[...new Set(changes.map(c=>c.eid))].length}</div><div style="font-size:10px;color:#94a3b8">Employees Affected</div></div>
      </div>
      ${changes.length?`<button class="btn bp" style="margin-top:10px;padding:8px 16px;font-size:12px" onclick="cmpDownload()">Download Changes (Excel)</button>`:''}
    </div>`;
    
    // Show detail table
    if(changes.length){
      h+=`<div style="background:rgba(22,30,50,.65);border:1px solid rgba(99,102,241,.07);border-radius:12px;overflow:hidden">
        <div style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;font-weight:600;color:#a5b4fc">Filled Entries (${changes.length})</span></div>
        <div style="max-height:50vh;overflow-y:auto">`;
      changes.forEach(c=>{
        const cs=gc(c.code);
        h+=`<div class="rw" style="gap:8px">
          <div style="width:28px;height:28px;border-radius:7px;background:${cs.bg||'#dcfce7'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:${cs.cl||'#16a34a'};font-family:'JetBrains Mono',monospace;flex-shrink:0">${c.code}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
            <div style="font-size:9px;color:#4b5563">${c.eid} · ${c.pp}</div>
          </div>
          <div style="font-size:11px;color:#a5b4fc;font-weight:600;flex-shrink:0">Day ${c.day}</div>
        </div>`;
      });
      h+=`</div></div>`;
    } else {
      h+=`<div style="padding:20px;text-align:center;color:#4b5563;font-size:12px;background:rgba(22,30,50,.65);border:1px solid rgba(99,102,241,.07);border-radius:12px">No new entries found — both files have same filled cells.</div>`;
    }
    
    resEl.innerHTML=h;
    window._cmpChanges=changes;
    window._cmpMon=mon;
    window._cmpYr=yr;
    
  }catch(err){
    resEl.innerHTML='<div style="color:#f87171;padding:10px;font-size:12px">Error: '+err.message+'</div>';
    alert('Compare error: '+err.message);
  }
}

// Contractor attendance: ctAtt = {"YYYY-MM-DD": {"workerID": true/false}}
let ctAtt={};
try{const ca=LS.g('ctatt');if(ca&&typeof ca==='object')ctAtt=ca;}catch{}
function ctSaveAtt(){LS.s('ctatt',ctAtt);}

function ctGetDate(){return document.getElementById('ct-date')?.value||S.dt;}
function ctGetView(){return document.getElementById('ct-view')?.value||'manage';}

function ctToggleAtt(wid){
  const dt=ctGetDate();
  if(!ctAtt[dt])ctAtt[dt]={};
  ctAtt[dt][wid]=!ctAtt[dt][wid];
  ctSaveAtt();
  // Update just the checkbox UI without full re-render
  const el=document.getElementById('cta-'+wid);
  if(el){
    const isP=ctAtt[dt][wid];
    el.style.background=isP?'#16a34a':'rgba(255,255,255,.06)';
    el.style.borderColor=isP?'#16a34a':'rgba(255,255,255,.15)';
    el.innerHTML=isP?'✓':'';
  }
}

function ctMarkAllPresent(){
  const dt=ctGetDate();
  if(!ctAtt[dt])ctAtt[dt]={};
  ctData.forEach(c=>{
    (c.workers||[]).forEach(w=>{ctAtt[dt][w.id]=true;});
    c.sections.forEach(s=>{s.workers.forEach(w=>{ctAtt[dt][w.id]=true;});});
  });
  ctSaveAtt();ctRender();
  toast('All marked present!');
}

function ctClearAll(){
  const dt=ctGetDate();
  if(!confirm('Clear all attendance for '+dt+'?'))return;
  delete ctAtt[dt];
  ctSaveAtt();ctRender();
  toast('Attendance cleared!');
}

function ctRender(){
  const el=document.getElementById('ct-list');
  if(!el)return;
  
  if(!ctData.length){
    el.innerHTML='<div class="cd" style="padding:30px;text-align:center;color:#4b5563"><div style="font-size:32px;margin-bottom:8px">🏗️</div><p style="font-size:13px">No contractors added yet.</p></div>';
    return;
  }
  
  const dt=ctGetDate();
  const dayAtt=ctAtt[dt]||{};
  const isAttView=ctGetView()==='attend';
  
  let h='';
  ctData.forEach(c=>{
    const directWorkers=c.workers||[];
    const totalWorkers=c.sections.reduce((sum,s)=>sum+s.workers.length,0)+directWorkers.length;
    const presentWorkers=c.sections.reduce((sum,s)=>sum+s.workers.filter(w=>dayAtt[w.id]).length,0)+directWorkers.filter(w=>dayAtt[w.id]).length;
    
    h+=`<div class="cd" style="margin-bottom:12px">
      <div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">

        </div>
        <div style="display:flex;gap:4px">
          ${isAttView?'':`<button class="btn bp" style="font-size:9px;padding:4px 8px" onclick="ctShowAddDirectWorker(${c.id})">+ Worker</button>
          <button class="btn bp" style="font-size:9px;padding:4px 8px;background:linear-gradient(135deg,#7c3aed,#a855f7)" onclick="ctAddSection(${c.id})">+ Section</button>

function ctDownloadOnRoll(){
  if(!ctData.length)return alert('No contractor data!');

  var monName=(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'])[mon]+'-'+yr;

  // Collect all workers — contractor-level type decides Manpower vs Work
  var mpRows=[];
  var workRows=[];

  ctData.forEach(function(c){
    var isWork=(c.type||'Manpower')==='Work';
    var nameOfWork=c.nameOfWork||'';
    // Direct workers
    (c.workers||[]).forEach(function(w){
      var row={
        'SN':0,
        'Contractor':c.name,
        'Type':c.type||'Manpower',
        'Name of Work':nameOfWork,
        'Date of Commencement':c.dateOfCommencement||'',
        'Date of Completion':c.dateOfCompletion||'',
        'Total Days':c.totalDays||'',
        'Section':'(Direct)',
        'Worker Name':w.name,
        "Father's Name":w.father||'',
        'Aadhar Number':w.aadhar||'',
        'B Form No':w.bform||''
      };
      if(isWork) workRows.push(row);
      else mpRows.push(row);
    });
    // Section workers
    c.sections.forEach(function(s){
      s.workers.forEach(function(w){
        var row={
          'SN':0,
          'Contractor':c.name,
          'Type':c.type||'Manpower',
          'Name of Work':nameOfWork,
          'Date of Commencement':c.dateOfCommencement||'',
          'Date of Completion':c.dateOfCompletion||'',
          'Total Days':c.totalDays||'',
          'Section':s.name,
          'Worker Name':w.name,
          "Father's Name":w.father||'',
          'Aadhar Number':w.aadhar||'',
          'B Form No':w.bform||''
        };
        if(isWork) workRows.push(row);
        else mpRows.push(row);
      });
    });
  });

  // Add SN
  mpRows.forEach(function(r,i){r['SN']=i+1;});
  workRows.forEach(function(r,i){r['SN']=i+1;});

  var colW=[{wch:4},{wch:24},{wch:12},{wch:22},{wch:12},{wch:12},{wch:10},{wch:16},{wch:26},{wch:24},{wch:16},{wch:12}];

  // Sheet 1: Manpower
  if(mpRows.length){
    var ws1=XLSX.utils.json_to_sheet(mpRows);
    ws1['!cols']=colW;
    XLSX.utils.book_append_sheet(wb,ws1,'Manpower ('+mpRows.length+')');
  }

  // Sheet 2: Work
  if(workRows.length){
    var ws2=XLSX.utils.json_to_sheet(workRows);
    ws2['!cols']=colW;
    XLSX.utils.book_append_sheet(wb,ws2,'Work ('+workRows.length+')');
  }

  // Sheet 3: All combined
  var allRows=mpRows.concat(workRows).map(function(r,i){return Object.assign({},r,{'SN':i+1});});
  if(allRows.length){
    var ws3=XLSX.utils.json_to_sheet(allRows);
    ws3['!cols']=colW;
    XLSX.utils.book_append_sheet(wb,ws3,'All ('+allRows.length+')');
  }

  // Sheet 4: Summary by contractor
  var sumRows=[];
  ctData.forEach(function(c){
    var allW=[];
    (c.workers||[]).forEach(function(w){allW.push(w);});
    c.sections.forEach(function(s){s.workers.forEach(function(w){allW.push(w);});});
    var mpCnt=allW.filter(function(w){return !w.work||!w.work.trim();}).length;
    var wkCnt=allW.filter(function(w){return w.work&&w.work.trim();}).length;
    sumRows.push({'Contractor':c.name,'Manpower':mpCnt,'Work':wkCnt,'Total':allW.length});
  });
  sumRows.push({'Contractor':'TOTAL',
    'Manpower':sumRows.reduce(function(s,r){return s+r['Manpower'];},0),
    'Work':sumRows.reduce(function(s,r){return s+r['Work'];},0),
    'Total':sumRows.reduce(function(s,r){return s+r['Total'];},0)
  });
  var ws4=XLSX.utils.json_to_sheet(sumRows);
  ws4['!cols']=[{wch:26},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws4,'Summary');

  XLSX.writeFile(wb,'OnRoll_'+monName+'.xlsx');
  toast('On Roll downloaded! MP:'+mpRows.length+' Work:'+workRows.length);
}
