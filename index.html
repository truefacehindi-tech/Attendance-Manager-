let todoList=[];
try{const td=LS.g('todolist');if(td&&Array.isArray(td))todoList=td;}catch{}
function todoSave(){LS.s('todolist',todoList);try{pS('todolist',todoList);}catch{}}

function todoAdd(){
  const text=(document.getElementById('todo-text')?.value||'').trim();
  if(!text)return;
  const deadline=document.getElementById('todo-deadline')?.value||'';
  todoList.unshift({
    id:Date.now(),
    text,
    deadline,
    done:false,
    created:new Date().toISOString()
  });
  todoSave();
  document.getElementById('todo-text').value='';
  document.getElementById('todo-deadline').value='';
  render();
}

function todoToggle(id){
  const t=todoList.find(t=>t.id===id);
  if(t){t.done=!t.done;if(t.done)t.doneAt=new Date().toISOString();}
  todoSave();
  render();
}

function todoDelete(id){
  todoList=todoList.filter(t=>t.id!==id);
  todoSave();
  render();
}

function todoClearDone(){
  if(!confirm('Clear all completed tasks?'))return;
  todoList=todoList.filter(t=>!t.done);
  todoSave();
  render();
}

function todoRender(){
  const el=document.getElementById('todo-list');if(!el)return;
  const filter=window._todoFilter||'all';
  let items=todoList;
  if(filter==='pending')items=items.filter(t=>!t.done);
  if(filter==='done')items=items.filter(t=>t.done);
  
  if(!items.length){
    el.innerHTML='<div class="cd" style="padding:30px;text-align:center;color:#4b5563;font-size:12px">'+(filter==='done'?'No completed tasks yet.':filter==='pending'?'All done! 🎉':'Add your first task above.')+'</div>';
    return;
  }
  
  const now=new Date();
  let h='';
  items.forEach(t=>{
    const isOverdue=!t.done&&t.deadline&&new Date(t.deadline)<now;
    const isToday=t.deadline&&new Date(t.deadline).toDateString()===now.toDateString();
    const dlDate=t.deadline?new Date(t.deadline):null;
    const timeLeft=dlDate&&!t.done?function(){
      const diff=dlDate-now;
      if(diff<0)return'Overdue!';
      const hrs=Math.floor(diff/3600000);
      const mins=Math.floor((diff%3600000)/60000);
      if(hrs>24)return Math.floor(hrs/24)+'d '+hrs%24+'h left';
      if(hrs>0)return hrs+'h '+mins+'m left';
      return mins+'m left';
    }():'';
    
    h+=`<div class="cd" style="padding:12px;margin-bottom:6px;border-left:3px solid ${t.done?'#22c55e':isOverdue?'#ef4444':isToday?'#f59e0b':'#4f46e5'};opacity:${t.done?'.6':'1'}">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="padding-top:2px;cursor:pointer;font-size:18px" onclick="todoToggle(${t.id})">${t.done?'✅':'⬜'}</div>
        <div style="flex:1">
          <div style="font-size:13px;${t.done?'text-decoration:line-through;color:#64748b':'font-weight:600;color:#e2e8f0'}">${t.text}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
            ${t.deadline?`<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:${isOverdue?'rgba(239,68,68,.15)':isToday?'rgba(245,158,11,.15)':'rgba(99,102,241,.1)'};color:${isOverdue?'#f87171':isToday?'#f59e0b':'#818cf8'}">${dlDate.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} ${dlDate.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>`:''}
            ${timeLeft?`<span style="font-size:9px;color:${isOverdue?'#f87171':'#94a3b8'};font-weight:600">${timeLeft}</span>`:''}
            ${t.done&&t.doneAt?`<span style="font-size:8px;color:#22c55e">Done ${new Date(t.doneAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>`:''}
          </div>
        </div>
        <button style="background:none;border:none;color:#4b5563;cursor:pointer;font-size:14px;padding:2px" onclick="todoDelete(${t.id})">🗑️</button>
      </div>
    </div>`;
  });
  el.innerHTML=h;
}

function otDefaultCode(eid){
  if(OT_2200.includes(eid))return '2200';
  // Overman check from master data
  const md=mdData.find(m=>m.pid===eid);
  if(md&&(md.pos||'').toLowerCase().includes('overman'))return '2200';
  // Try from pay slip (current loaded data)
  if(psData&&psData.length){
    const slip=psData.find(s=>s.eid===eid);
    if(slip&&slip.otCode)return slip.otCode;
  }
  return '2190';
}

function otGetCategory(eid){
  const md=mdData.find(m=>m.pid===eid);
  if(md){
    const cat=md.empCat||'';
    if(cat.toLowerCase().includes('monthly'))return 'MR';
    if(cat.toLowerCase().includes('daily'))return 'DR';
  }
  return '';
}

      <td style="padding:4px;text-align:center"><input class="inp" style="width:48px;font-size:10px;text-align:center;padding:2px;color:${otCode==='2200'?'#22c55e':'#818cf8'};font-weight:700" value="${otCode}" onchange="otSaveEntry('${emp.i}','otCode',this.value)"></td>
      <td style="padding:2px;text-align:center">
        <div style="font-size:14px;font-weight:800;color:${hasHours?'#22c55e':'#374151'}">${totalHrs}</div>
        <div style="display:flex;gap:2px;justify-content:center;margin-top:2px">
          <input class="inp" id="ot-add-${emp.i}" style="width:32px;font-size:9px;text-align:center;padding:1px" type="number" min="0" placeholder="+" onkeydown="if(event.key==='Enter')otAddHours('${emp.i}')">
          <button style="background:rgba(34,197,94,.2);border:none;color:#22c55e;font-size:9px;padding:1px 5px;border-radius:4px;cursor:pointer;font-weight:700" onclick="otAddHours('${emp.i}')">+</button>
          ${hasHours?'<button style="background:rgba(239,68,68,.15);border:none;color:#f87171;font-size:8px;padding:1px 4px;border-radius:4px;cursor:pointer" onclick="otResetHours(\''+emp.i+'\')">↺</button>':''}
        </div>
      </td>
    </tr>`;
  });
  h+='</tbody></table></div></div>';
  el.innerHTML=h;
}

function otSaveEntry(eid,field,value){
  if(!otMonth)return;
  if(!otData[otMonth])otData[otMonth]={};
  if(!otData[otMonth][eid])otData[otMonth][eid]={otCode:otDefaultCode(eid),hours:0,entries:[]};
  otData[otMonth][eid][field]=value;
  otSave();
}

function otAddHours(eid){
  if(!otMonth)return;
  const inp=document.getElementById('ot-add-'+eid);
  if(!inp)return;
  const addVal=parseFloat(inp.value);
  if(!addVal||addVal<=0)return;
  
  if(!otData[otMonth])otData[otMonth]={};
  if(!otData[otMonth][eid])otData[otMonth][eid]={otCode:otDefaultCode(eid),hours:0,entries:[]};
  
  const entry=otData[otMonth][eid];
  if(!entry.entries)entry.entries=[];
  
  // Add with today's date
  const today=new Date();
  const dateStr=String(today.getDate()).padStart(2,'0')+'.'+String(today.getMonth()+1).padStart(2,'0');
  entry.entries.push({date:dateStr,hrs:addVal});
  entry.hours=parseFloat(entry.hours||0)+addVal;
  
  otSave();
  inp.value='';
  otRenderList();
  toast('+'+addVal+'h added → Total: '+entry.hours+'h');
}

function otResetHours(eid){
  if(!otMonth||!otData[otMonth]?.[eid])return;
  if(!confirm('Reset all OT hours for this employee?'))return;
  otData[otMonth][eid].hours=0;
  otData[otMonth][eid].entries=[];
  otSave();
  otRenderList();
}

function otBulkHours(hrs){
  if(!otMonth)return;
  if(!confirm('Set '+hrs+' hours for all visible employees?'))return;
  const search=(document.getElementById('ot-search')?.value||'').toLowerCase();
  const postFilter=document.getElementById('ot-post-filter')?.value||'all';
  const showOnly=document.getElementById('ot-show-filter')?.value||'all';
  
  let emps=S.emps.filter(e=>{
    const sm=!search||e.i.includes(search)||e.n.toLowerCase().includes(search);
    const pm=postFilter==='all'||e.posting===postFilter||(postFilter===''&&!e.posting);
    return sm&&pm;
  });
  if(showOnly==='entered')emps=emps.filter(e=>(otData[otMonth]||{})[e.i]?.hours>0);
  if(showOnly==='empty')emps=emps.filter(e=>!(otData[otMonth]||{})[e.i]?.hours);
  
  if(!otData[otMonth])otData[otMonth]={};
  emps.forEach(e=>{
    if(!otData[otMonth][e.i])otData[otMonth][e.i]={otCode:otDefaultCode(e.i),hours:0,entries:[]};
    otData[otMonth][e.i].hours=hrs;
    otData[otMonth][e.i].entries=[{date:'Bulk',hrs}];
  });
  otSave();otRenderList();
  toast(emps.length+' employees set to '+hrs+' hours');
}

function otClearAll(){
  if(!otMonth)return;
  if(!confirm('Clear all OT hours for '+otMonth+'?'))return;
  otData[otMonth]={};
  otSave();otRenderList();
  toast('All OT cleared for '+otMonth);
}

function otCopyPrev(){
  if(!otMonth)return;
  const all=Object.keys(otData).sort(yrSortMonths);
  const curIdx=all.indexOf(otMonth);
  if(curIdx<=0)return alert('No previous month data found!');
  const prev=all[curIdx-1];
  const prevData=otData[prev];
  if(!prevData||!Object.keys(prevData).length)return alert('No OT data in '+prev);
  if(!confirm('Copy OT hours from '+prev+' to '+otMonth+'?'))return;
  otData[otMonth]={...JSON.parse(JSON.stringify(prevData))};
  otSave();otRenderList();
  toast('Copied '+Object.keys(prevData).length+' entries from '+prev);
}


function otUploadEdited(){
  var input=document.getElementById('ot-upload');
  if(!input||!input.files[0])return alert('Edited Excel file select karo!');
  var month=otMonth||'';
  if(!month)return alert('Pehle OT month select karo!');

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',raw:false});

      if(!otData[month])otData[month]={};
      var updated=0,notFound=0,noHours=0;

      // Helper: extract EID from a row given headers
      function extractEid(row,headers){
        // Priority: exact column name match
        var exactNames=['Employee Code','Emp Code','EmpCode','EmpID','Employee ID','Code','ID'];
        for(var en of exactNames){
          if(row[en]!==undefined){var v=String(row[en]||'').trim();if(v)return v;}
        }
        // Fuzzy: header contains 'code' or 'id' but not 'ot code'
        for(var h of headers){
          var hl=h.toLowerCase().replace(/\s/g,'');
          if((hl.includes('empcode')||hl.includes('empid')||hl==='id'||hl==='code')&&!hl.includes('otcode')){
            var v=String(row[h]||'').trim();if(v)return v;
          }
        }
        // Fallback: first 7-12 digit numeric value in row
        for(var h of headers){
          var v=String(row[h]||'').trim();
          if(/^\d{7,12}$/.test(v))return v;
        }
        return '';
      }

      // Helper: extract OT Hours from row
      function extractHours(row,headers,eid){
        // Priority: column named OT Hours / Hours / OT Hrs
        var exactH=['OT Hours','OT Hrs','Hours','Overtime','OT'];
        for(var en of exactH){
          if(row[en]!==undefined){var v=parseFloat(row[en]);if(!isNaN(v))return v;}
        }
        // Fuzzy
        for(var h of headers){
          var hl=h.toLowerCase().replace(/\s/g,'');
          if(hl==='othours'||hl==='othrs'||hl==='hours'||hl==='overtime'){
            var v=parseFloat(row[h]);if(!isNaN(v))return v;
          }
        }
        // Last resort: sum all numeric columns that aren't SN/name/code/posted/position/category
        var skipWords=['name','sn','serial','posted','position','category','code','id'];
        var sum=0;
        headers.forEach(function(h){
          var hl=h.toLowerCase();
          if(skipWords.some(function(w){return hl.includes(w);}))return;
          var v=parseFloat(row[h]);
          if(!isNaN(v)&&v>0&&String(row[h]).trim()!==eid)sum+=v;
        });
        return sum;
      }

      // Helper: extract OT Code from row
      function extractOtCode(row,headers){
        var exactC=['OT Code','OT code','Overtime Code'];
        for(var en of exactC){
          if(row[en]!==undefined){var v=String(row[en]||'').trim();if(v&&/\d{4}/.test(v))return v;}
        }
        for(var h of headers){
          var hl=h.toLowerCase().replace(/\s/g,'');
          if(hl==='otcode'||hl==='overtimecode'){
            var v=String(row[h]||'').trim();if(v&&/\d{4}/.test(v))return v;
          }
        }
        return '';
      }

      // Process ALL sheets
      wb.SheetNames.forEach(function(sheetName){
        var ws=wb.Sheets[sheetName];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length)return;
        var headers=Object.keys(rows[0]);

        rows.forEach(function(row){
          var eid=extractEid(row,headers);
          if(!eid)return;

          // Verify this employee exists in our master list
          var empExists=S.emps.some(function(e){return e.i===eid;});
          if(!empExists){notFound++;return;}

          var newHours=extractHours(row,headers,eid);
          var newCode=extractOtCode(row,headers);
          var existing=otData[month][eid]||{};

          otData[month][eid]={
            otCode: newCode || existing.otCode || otDefaultCode(eid),
            hours: newHours,
            entries: newHours>0?[{date:'Upload',hrs:newHours}]:(existing.entries||[])
          };

          if(newHours>0)updated++;
          else noHours++;
        });
      });

      // Save to IndexedDB + localStorage
      otSave();

      var msg=updated+' employees OT saved!';
      if(noHours)msg+=' | '+noHours+' with 0 hrs';
      if(notFound)msg+=' | '+notFound+' EID not found';
      toast(msg);
      otRenderList();

    }catch(err){alert('Upload Error: '+err.message+'\n'+err.stack);}
  };
  reader.readAsArrayBuffer(input.files[0]);
}

const YMN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function yrSortMonths(a,b){
  const pa=a.split('-'),pb=b.split('-');
  const ya=parseInt(pa[1]),yb=parseInt(pb[1]);
  if(ya!==yb)return ya-yb;
  return YMN.indexOf(pa[0])-YMN.indexOf(pb[0]);
}

// 7 attendance codes
const YR_ATT_CODES=['P','U','S','O/T','HD','HE','WE'];

function yrUpload(){
  const input=document.getElementById('yr-files');
  if(!input?.files?.length)return alert('Select files first!');
  const files=Array.from(input.files);
  const statusEl=document.getElementById('yr-status');
  if(statusEl)statusEl.innerHTML='<div style="color:#f59e0b;font-size:11px">Processing '+files.length+' files...</div>';
  
  let processed=0,totalRecords=0,newMonths=[];
  
  function processFile(file){
    return new Promise((resolve)=>{
      const reader=new FileReader();
      reader.onload=function(e){
        try{
          const data=new Uint8Array(e.target.result);
          const wb=XLSX.read(data,{type:'array',cellDates:false});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:true});
          if(!rows.length){resolve();return;}
          
          const headers=Object.keys(rows[0]);
          let monthKey='';
          for(const h of headers){
            const dm=String(h).match(/(\d{2})\.(\d{2})\.(\d{4})/);
            if(dm){monthKey=YMN[parseInt(dm[2])-1]+'-'+dm[3];break;}
          }
          if(!monthKey){
            // Try from sheet name
            const snm=wb.SheetNames[0]||'';
            const sm=snm.toUpperCase().match(/(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\w*[_\s-]*(\d{4})/);
            if(sm)monthKey=sm[1].substring(0,3)+'-'+sm[2];
          }
          if(!monthKey){
            // Try from filename
            const fm=file.name.toUpperCase().match(/(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\w*[_\s-]*(\d{4})/);
            if(fm)monthKey=fm[1].substring(0,3)+'-'+fm[2];
          }
          if(!monthKey){
            // Try year-month pattern like 2026-01 or 01-2026
            const ym=file.name.match(/(\d{4})[_\s-](\d{1,2})/)||(file.name.match(/(\d{1,2})[_\s-](\d{4})/));
            if(ym){
              const yr=ym[1].length===4?ym[1]:ym[2];
              const mn=ym[1].length===4?parseInt(ym[2]):parseInt(ym[1]);
              if(mn>=1&&mn<=12)monthKey=YMN[mn-1]+'-'+yr;
            }
          }
          if(!monthKey){resolve();return;}
          
          const monthData={};
          rows.forEach(row=>{
            const vals=Object.values(row);
            const eid=String(vals[1]||'').trim();
            const name=String(vals[2]||'').trim();
            if(!eid||!name)return;
            
            const days={};
            const dateHeaders=headers.filter(h=>String(h).match(/\d{2}\.\d{2}\.\d{4}/));
            dateHeaders.forEach(h=>{
              const dm=String(h).match(/(\d{2})\.(\d{2})\.(\d{4})/);
              if(dm){
                const day=parseInt(dm[1]);
                const mon=parseInt(dm[2]);
                const yr=parseInt(dm[3]);
                const dateKey=String(day).padStart(2,'0')+'.'+String(mon).padStart(2,'0')+'.'+yr;
                const code=String(row[h]||'').trim();
                if(code)days[dateKey]=code;
              }
            });
            
            var extraInfo={};
            // Save all non-date columns as employee info
            headers.forEach(function(h,hi){
              var hl=String(h).toLowerCase();
              if(hl.match(/\d{2}\.\d{2}\.\d{4}/))return; // skip date columns
              var val=String(vals[hi]||'').trim();
              if(!val)return;
              if(hl.includes('sub') && hl.includes('group'))extraInfo.subGroup=val;
              else if(hl.includes('category')||hl.includes('emp')&&hl.includes('cat'))extraInfo.category=val;
              else if(hl.includes('personnel')&&hl.includes('sub'))extraInfo.psa=val;
              else if(hl.includes('position')||hl.includes('desig'))extraInfo.position=val;
              else if(hl.includes('department')||hl.includes('dept'))extraInfo.dept=val;
              else if(hl.includes('gender')||hl.includes('sex'))extraInfo.gender=val;
              else if(hl.includes('group')&&!hl.includes('sub'))extraInfo.group=val;
            });
            monthData[eid]={name:name,days:days,info:extraInfo};
            totalRecords++;
          });
          
          const isNew=!yrAtt[monthKey];
          yrAtt[monthKey]=monthData;
          // Save this month immediately (per-month storage)
          yrSaveMonth(monthKey);
          if(isNew)newMonths.push(monthKey);
          processed++;
          if(statusEl)statusEl.innerHTML='<div style="color:#f59e0b;font-size:11px">Processing... '+processed+'/'+files.length+' → '+monthKey+' ('+Object.keys(monthData).length+' employees)</div>';
        }catch(err){processed++;console.log('MM parse error:',err.message);}
        resolve();
      };
      reader.readAsArrayBuffer(file);
    });
  }
  
  (async()=>{
    for(const f of files)await processFile(f);
    if(statusEl){
      let msg='<div style="color:#16a34a;font-size:12px;font-weight:600">\u2713 '+processed+' files processed!</div>';
      if(newMonths.length)msg+='<div style="font-size:10px;color:#a5b4fc;margin-top:2px">Months: '+newMonths.join(', ')+'</div>';
      msg+='<div style="font-size:10px;color:#64748b;margin-top:2px">'+totalRecords+' total employee records</div>';
      statusEl.innerHTML=msg;
    }
    setTimeout(()=>render(),500);
  })();
}

function yrParseFlexDate(val){
  if(!val)return null;
  let m=val.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  m=val.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}

function yrSearch(){
  const el=document.getElementById('yr-view');if(!el)return;
  const empInput=(document.getElementById('yr-emp')?.value||'').trim();
  let fromVal=document.getElementById('yr-date-from')?.value;
  let toVal=document.getElementById('yr-date-to')?.value;
  
  if(!empInput){el.innerHTML='<div class="cd" style="padding:16px;text-align:center;color:#f87171;font-size:12px">Enter Employee ID or Name first.</div>';return;}
  
  // Auto-fill dates if empty - use earliest to latest uploaded month
  if(!fromVal||!toVal){
    const sorted=Object.keys(yrAtt).sort(yrSortMonths);
    if(sorted.length){
      if(!fromVal){
        const first=sorted[0].split('-');
        const mi=YMN.indexOf(first[0]);
        fromVal='01-'+String(mi+1).padStart(2,'0')+'-'+first[1];
        const fromEl=document.getElementById('yr-date-from');
        if(fromEl)fromEl.value=fromVal;
      }
      if(!toVal){
        const last=sorted[sorted.length-1].split('-');
        const mi=YMN.indexOf(last[0]);
        const lastDay=new Date(parseInt(last[1]),mi+1,0).getDate();
        toVal=lastDay+'-'+String(mi+1).padStart(2,'0')+'-'+last[1];
        const toEl=document.getElementById('yr-date-to');
        if(toEl)toEl.value=toVal;
      }
    } else {
      el.innerHTML='<div class="cd" style="padding:16px;text-align:center;color:#f87171;font-size:12px">Enter From and To dates, or upload attendance data first.</div>';return;
    }
  }
  
  const dFrom=yrParseFlexDate(fromVal);
  const dTo=yrParseFlexDate(toVal);
  if(!dFrom||!dTo){el.innerHTML='<div class="cd" style="padding:16px;text-align:center;color:#f87171;font-size:12px">Invalid date format. Use DD-MM-YYYY (e.g. 01-03-2022)</div>';return;}
  
  // Find employee across all months
  let eid='',empName='';
  const search=empInput.toLowerCase();
  Object.values(yrAtt).forEach(monthData=>{
    Object.entries(monthData).forEach(([id,d])=>{
      if(id===empInput||(id.toLowerCase().includes(search)||d.name?.toLowerCase().includes(search))){
        if(!eid){eid=id;empName=d.name;}
      }
    });
  });
  
  if(!eid){el.innerHTML='<div class="cd" style="padding:16px;text-align:center;color:#f87171;font-size:12px">Employee "'+empInput+'" not found in any uploaded month.</div>';return;}
  
  if(dFrom>dTo){el.innerHTML='<div class="cd" style="padding:16px;text-align:center;color:#f87171">From date must be before To date.</div>';return;}
  
  // Collect all days in range for this employee
  const allDays=[];
  const monthlySummary={};
  const allMonths=Object.keys(yrAtt).sort(yrSortMonths);
  let debugMonths=[];
  
  allMonths.forEach(monthKey=>{
    const emp=yrAtt[monthKey]?.[eid];
    if(!emp){return;}
    
    // Detect month/year from monthKey (e.g. "JAN-2025")
    const mkParts=monthKey.split('-');
    const mkMonIdx=YMN.indexOf(mkParts[0]);
    const mkYear=parseInt(mkParts[1]);
    
    const mc={att:0,CL:0,SL:0,EL:0,A:0,R:0,LL:0,CCL:0,IOD:0,other:0};
    let hasAny=false;
    let dayCount=Object.keys(emp.days).length;
    
    Object.entries(emp.days).forEach(([dateKey,code])=>{
      let d=null;
      
      // Format 1: "01.04.2022" or "01/04/2022" or "01-04-2022"
      const p=dateKey.split(/[.\/\-]/);
      if(p.length===3){
        const dd=parseInt(p[0]),mm=parseInt(p[1]),yy=parseInt(p[2]);
        if(yy>100){
          d=new Date(yy,mm-1,dd);
        } else if(dd>100){
          // Format: YYYY.MM.DD
          d=new Date(dd,mm-1,yy);
        }
      }
      
      // Format 2: numeric key (1, 2, 3... = day of month)
      if(!d&&/^\d{1,2}$/.test(dateKey)){
        const dayNum=parseInt(dateKey);
        if(dayNum>=1&&dayNum<=31&&mkMonIdx>=0&&mkYear){
          d=new Date(mkYear,mkMonIdx,dayNum);
        }
      }
      
      if(!d||isNaN(d.getTime()))return;
      
      if(d>=dFrom&&d<=dTo){
        hasAny=true;
        const dateStr=String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
        allDays.push({date:d,dateStr,code});
        if(YR_ATT_CODES.includes(code))mc.att++;
        else if(code==='CL'||code==='CLH')mc.CL++;
        else if(code==='SL')mc.SL++;
        else if(code==='EL')mc.EL++;
        else if(code==='A')mc.A++;
        else if(code==='R')mc.R++;
        else if(code==='LL')mc.LL++;
        else if(code==='CCL')mc.CCL++;
        else if(code==='IOD')mc.IOD++;
        else mc.other++;
      }
    });
    debugMonths.push({month:monthKey,found:!!emp,days:dayCount,inRange:hasAny});
    if(hasAny)monthlySummary[monthKey]=mc;
  });
  
  allDays.sort((a,b)=>a.date-b.date);
  
  // Grand totals
  const grand={att:0,CL:0,SL:0,EL:0,A:0,R:0,LL:0,CCL:0,IOD:0,other:0};
  Object.values(monthlySummary).forEach(mc=>{

  const fromLabel=dFrom.getDate()+'-'+(dFrom.getMonth()+1)+'-'+dFrom.getFullYear();

  // Store for download
  window._yrResult={eid,empName,fromDate:fromLabel,toDate:toLabel,allDays,monthlySummary,grand};
  
  // RENDER
  const monthsWithData=debugMonths.filter(d=>d.found);

  let h='<div class="cd" style="padding:0;overflow:hidden;margin-top:8px">';

  h+='</div>';
  
  // Summary Cards

  cards.forEach(c=>{h+='<div class="sc" style="border-color:'+c.c+'33"><div style="font-size:20px;font-weight:800;color:'+c.c+'">'+c.v+'</div><div style="font-size:8px;color:#94a3b8">'+c.l+'</div></div>';});

// ── Download attendance for a specific date ──
function yrDateDownload(){
  const dateVal = document.getElementById('yr-spec-date')?.value;
  if(!dateVal){alert('Date select karo!');return;}
  const dt = new Date(dateVal+'T00:00:00');
  const day = dt.getDate();
  const mon = dt.getMonth(); // 0-indexed
  const yr  = dt.getFullYear();
  const mi  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const monKey = mi[mon]+'-'+yr;

  if(!yrAtt[monKey]){alert('Data nahi mila: '+monKey+'\nPehle ye month upload karo!');return;}

  // Days stored as 'DD.MM.YYYY' key
  const monData = yrAtt[monKey];
  const dateKey = String(day).padStart(2,'0')+'.'+String(mon+1).padStart(2,'0')+'.'+yr;

  const rows = [];
  // yrAtt[monKey] = { eid: { name, days: {'01.03.2026':'P',...}, info:{} } }
  Object.entries(monData).forEach(function([eid, empObj]){
    const days = empObj.days || empObj; // support both formats
    const code = days[dateKey] || '';
    const name = empObj.name || '';
    // Find pay point from S.emps
    const emp = S.emps.find(function(e){return e.i===eid||e.s===eid;});
    rows.push({
      'Employee ID': eid,
      'Employee Name': name || (emp?emp.n:''),
      'Pay Point': emp?ppN(emp.p):'',
      'Date': dateKey,
      'Code': code
    });
  });

  if(!rows.length){toast('Koi data nahi mila!',false);return;}
  // Sort by Employee ID
  rows.sort(function(a,b){return String(a['Employee ID']).localeCompare(String(b['Employee ID']));});
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:13},{wch:26},{wch:14},{wch:12},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, dateKey.replace(/\./g,'-'));
  XLSX.writeFile(wb, 'Attendance_'+dateKey+'.xlsx');
  toast('Downloaded: '+dateKey+' ('+rows.length+' employees)');
}

// ── Load dates for a code into dropdown ──
function yrLoadCodeDates(code){
  if(!code){toast('Code enter karo!',false);return;}
  const allM = Object.keys(yrAtt).sort(yrSortMonths);
  if(!allM.length){toast('Yearly data upload karo pehle!',false);return;}

  // Collect all unique dates having this code
  const dateSet = new Set();
  allM.forEach(function(monKey){
    const monData = yrAtt[monKey];
    Object.values(monData).forEach(function(empObj){
      const days = empObj.days || empObj;
      Object.entries(days).forEach(function([dateKey, c]){
        if(String(c).toUpperCase() === code.toUpperCase()){
          dateSet.add(dateKey);
        }
      });
    });
  });

  if(!dateSet.size){toast(code+' code ka koi din nahi mila!',false);return;}

  // Sort dates DD.MM.YYYY
  const sortedDates = Array.from(dateSet).sort(function(a,b){
    function p(s){var x=s.split('.');return new Date(x[2],x[1]-1,x[0]);}
    return p(a)-p(b);
  });

  // Fill dropdown
  const sel = document.getElementById('yr-code-dates');
  const lbl = document.getElementById('yr-code-lbl');
  if(!sel||!lbl)return;
  lbl.textContent = code + ' ('+sortedDates.length+' dates)';
  sel.innerHTML = '<option value="all">All Dates ('+sortedDates.length+')</option>';
  sortedDates.forEach(function(d){
    var o = document.createElement('option');
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });

  document.getElementById('yr-code-date-wrap').style.display = 'block';
  // Store current code
  sel.dataset.code = code;
  toast(code+' ke '+sortedDates.length+' dates load hue!');
}

        if(String(c).toUpperCase() !== code.toUpperCase()) return;
        if(selectedDate !== 'all' && dateKey !== selectedDate) return;
        rows.push({
          'Employee ID': eid,
          'Employee Name': name||(emp?emp.n:''),
          'Pay Point': emp?ppN(emp.p):'',
          'Date': dateKey,
          'Code': c
        });
      });
    });
  });

  if(!rows.length){toast('Koi data nahi mila!',false);return;}

  // Sort by date then EID
  rows.sort(function(a,b){
    function p(s){var x=s.split('.');return new Date(x[2],x[1]-1,x[0]);}
    return p(a.Date)-p(b.Date)||String(a['Employee ID']).localeCompare(String(b['Employee ID']));
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:13},{wch:26},{wch:14},{wch:12},{wch:8}];
  const wb = XLSX.utils.book_new();
  const sname = code+(selectedDate!=='all'?'_'+selectedDate.replace(/\./g,'-'):'_All');
  XLSX.utils.book_append_sheet(wb, ws, sname.substring(0,31));
  XLSX.writeFile(wb, 'Code_'+sname+'.xlsx');
  toast(code+': '+rows.length+' entries downloaded!');
}

function yrAttDownload(){
  var allM=Object.keys(yrAtt).sort(yrSortMonths);
  if(!allM.length)return alert('Yearly attendance data upload karo pehle!');
  
  // Get filters
  var ppF=document.getElementById('yr-dl-pp')?.value||'all';
  var desigF=document.getElementById('yr-dl-desig')?.value||'all';
  var genderF=document.getElementById('yr-dl-gender')?.value||'all';
  var catF=document.getElementById('yr-dl-cat')?.value||'all';
  
  // Month range
  var mi=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var fromRaw=document.getElementById('yr-dl-from')?.value||'';
  var toRaw=document.getElementById('yr-dl-to')?.value||'';
  function toMK(v){if(!v)return '';var m=v.match(/(\d{4})-(\d{2})/);return m?mi[parseInt(m[2])-1]+'-'+m[1]:'';}
  var fromM=toMK(fromRaw);var toM=toMK(toRaw);
  var months=allM;
  if(fromM||toM){
    var fi=fromM?allM.indexOf(fromM):0;
    var ti=toM?allM.indexOf(toM):allM.length-1;
    if(fi<0)fi=0;if(ti<0)ti=allM.length-1;
    months=allM.slice(fi,ti+1);
  }
  if(!months.length)return alert('Selected range mein koi month nahi!');
  
  // Get all employees from attendance
  var allEids=new Set();
  months.forEach(function(m){Object.keys(yrAtt[m]||{}).forEach(function(eid){allEids.add(eid);});});
  
  // Filter using roster
  var emps=[];
  allEids.forEach(function(eid){
    var re=S.emps.find(function(e){return e.i===eid;});
    if(!re)return;
    if(ppF!=='all'&&ppN(re.p)!==ppF)return;
    if(desigF!=='all'&&re.desig!==desigF)return;
    if(genderF!=='all'){var eg=(re.gender||'').toLowerCase();if(genderF.toLowerCase()==='male'&&eg==='female')return;if(genderF.toLowerCase()==='female'&&eg!=='female')return;}
    // Contract filter - skip if no data
    emps.push({eid:eid,name:re.n,desig:re.desig||'',pp:ppN(re.p),gender:re.gender||'',contract:re.contract||'',dept:re.dept||'',phone:re.phone||'',posting:re.posting||ppN(re.p)});
  });
  
  // Sort by roster order
  emps.sort(function(a,b){
    var ra=S.emps.findIndex(function(e){return e.i===a.eid;});
    var rb=S.emps.findIndex(function(e){return e.i===b.eid;});
    return (ra<0?9999:ra)-(rb<0?9999:rb);
  });
  
  if(!emps.length)return alert('Koi employee nahi mila! Filter check karo.');
  
  // ── Category detection ──
  function getEmpCategory(eid){
    var emp2=S.emps.find(function(e){return e.i===eid;});
    // 1. From roster empCat (set by Sync Master Data)
    if(emp2&&emp2.empCat) return emp2.empCat;
    // 2. From mdData
    var md=mdData.length?mdData.find(function(m){return String(m.pid).trim()===String(eid).trim();}):null;
    if(md){
      var eg=(md.egText||md.egc||'').toUpperCase();
      var esg=(md.esgText||md.esgCode||'').toUpperCase();
      var cat=(md.empCat||'').toUpperCase();
      var egText2=(md.egText||'').trim();
      if(egText2==='Executives') return 'Executive';
      if(cat.startsWith('MONTHLY RATED')) return 'Monthly Rated';
      if(cat.startsWith('DAILY RATED')) return 'Daily Rated';
      if(egText2==='Apprentice') return 'Daily Rated';
      if(esg.includes('T&S')||esg.includes('CLERK')) return 'Monthly Rated';
      if((esg.indexOf('CAT I')>=0||esg.indexOf('CAT II')>=0||esg.indexOf('CAT III')>=0||esg.indexOf('CAT IV')>=0||esg.indexOf('CAT V')>=0||esg.indexOf('CAT VI')>=0)||esg.includes('TRAINEE')) return 'Daily Rated';
      if(esg.match(/^E-?[0-9]/)) return 'Executive';
    }
    return 'Daily Rated';
  }

  function isUGEmp(eid){
    var emp2=S.emps.find(function(e){return e.i===eid;});
    return !emp2||!emp2.ct||emp2.ct==='U';
  }

  // ── Build attendance rows for each emp ──
  var PRESENT_CODES=['P','S','U','O/T','WE','HD','HE','OD','CL','SL','EL'];
  var hdr=['SN','Employee ID','Name','Pay Point','Designation','Posting','Gender','Category','UG/Surface'];
  months.forEach(function(m){hdr.push(m);});
  hdr.push('TOTAL');

  var colW=[{wch:4},{wch:12},{wch:26},{wch:14},{wch:22},{wch:12},{wch:8},{wch:16},{wch:10}];
  months.forEach(function(){colW.push({wch:8});});
  colW.push({wch:8});

  // Group employees
  var mrEmps=[], drUGEmps=[], drSurfEmps=[], execEmps=[];

  emps.forEach(function(emp){
    var cat=getEmpCategory(emp.eid);
    var ugSurf=isUGEmp(emp.eid)?'Underground':'Surface';
    emp._cat=cat; emp._ugsurf=ugSurf;
    if(cat==='Executive') execEmps.push(emp);
    else if(cat==='Monthly Rated') mrEmps.push(emp);
    else if(ugSurf==='Underground') drUGEmps.push(emp);
    else drSurfEmps.push(emp);
  });

  function buildRows(empList){
    var rows=[];
    empList.forEach(function(emp,i){
      var row=[i+1,emp.eid,emp.name,emp.pp,emp.desig,emp.posting,emp.gender,emp._cat,emp._ugsurf];
      var total=0;
      months.forEach(function(month){
        var empRaw=(yrAtt[month]||{})[emp.eid]||{};
        var empAtt=empRaw.days||empRaw||{};
        var pd=0;
        Object.values(empAtt).forEach(function(code){
          var c=(code||'').toUpperCase().replace('*','');
          if(PRESENT_CODES.indexOf(c)>=0) pd++;
        });
        row.push(pd); total+=pd;
      });
      row.push(total);
      rows.push(row);
    });
    // Total row
    if(rows.length){
      var totRow=['','','','','','','','','TOTAL'];
      for(var ci=9;ci<hdr.length-1;ci++){
        var s=rows.reduce(function(acc,r){return acc+(r[ci]||0);},0);
        totRow.push(s);
      }
      totRow.push(rows.reduce(function(acc,r){return acc+(r[r.length-1]||0);},0));
      rows.push(totRow);
    }
    return rows;
  }

  function addSheet(wb,empList,sheetName){
    if(!empList.length) return;
    var rows=buildRows(empList);
    var ws=XLSX.utils.aoa_to_sheet([hdr].concat(rows));
    ws['!cols']=colW;
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  }

  var wb=XLSX.utils.book_new();

  // Sheet 1: Monthly Rated
  addSheet(wb, mrEmps, 'Monthly Rated ('+mrEmps.length+')');

  // Sheet 2: Daily Rated - Underground
  addSheet(wb, drUGEmps, 'DR Underground ('+drUGEmps.length+')');

  // Sheet 3: Daily Rated - Surface
  addSheet(wb, drSurfEmps, 'DR Surface ('+drSurfEmps.length+')');

  // Sheet 4: Executive
  addSheet(wb, execEmps, 'Executive ('+execEmps.length+')');

  // Sheet 5: ALL (combined)
  addSheet(wb, emps, 'All ('+emps.length+')');

  // Sheet 6: Summary
  var sumData=[
    ['Yearly Attendance Report'],
    ['Months: '+months.join(', ')],
    [''],
    ['Category','Employees'],
    ['Monthly Rated', mrEmps.length],
    ['Daily Rated - Underground', drUGEmps.length],
    ['Daily Rated - Surface', drSurfEmps.length],
    ['Executive', execEmps.length],
    ['TOTAL', emps.length]
  ];
  var wsSumm=XLSX.utils.aoa_to_sheet(sumData);
  wsSumm['!cols']=[{wch:28},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsSumm,'Summary');

  var label=[ppF!=='all'?ppF:'',desigF!=='all'?desigF:'',genderF!=='all'?genderF:''].filter(Boolean).join('_')||'All';
  XLSX.writeFile(wb,'Yearly_Attendance_'+label+'_'+months[0]+'_to_'+months[months.length-1]+'.xlsx');
  toast(emps.length+' employees | MR:'+mrEmps.length+' DR-UG:'+drUGEmps.length+' DR-Surf:'+drSurfEmps.length+' Exec:'+execEmps.length);
}


// ═══════ 190+ DAYS ATTENDANCE REPORT ═══════
function yr190Report(){
  var allM=Object.keys(yrAtt).sort(yrSortMonths);
  if(!allM.length)return alert('Yearly attendance data upload karo pehle!');

  // Date range from UI (month pickers)
  var mi=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var fromRaw=document.getElementById('yr-dl-from')?.value||'';
  var toRaw=document.getElementById('yr-dl-to')?.value||'';
  function toMK(v){if(!v)return '';var m=v.match(/(\d{4})-(\d{2})/);return m?mi[parseInt(m[2])-1]+'-'+m[1]:'';}
  var fromM=toMK(fromRaw); var toM=toMK(toRaw);
  var months=allM;
  if(fromM||toM){
    var fi=fromM?allM.indexOf(fromM):0;
    var ti=toM?allM.indexOf(toM):allM.length-1;
    if(fi<0)fi=0; if(ti<0)ti=allM.length-1;
    months=allM.slice(fi,ti+1);
  }
  if(!months.length)return alert('Selected range mein koi month nahi!');

  // Default: if no range, use APR-2025 to MAR-2026
  var rangeLabel=(fromRaw&&toRaw)?(fromRaw+' to '+toRaw):'Full Range';

  // Present codes — jo attendance mein count ho
  var PRESENT=['P','U','S','O/T','HD','HE','WE','P*','U*','S*'];

  // Build employee total attendance map
  var empTotals={}; // eid -> total att days
  var allEids=new Set();
  months.forEach(function(m){
    Object.keys(yrAtt[m]||{}).forEach(function(eid){ allEids.add(eid); });
  });

  allEids.forEach(function(eid){
    var total=0;
    months.forEach(function(m){
      var empRaw=(yrAtt[m]||{})[eid]||{};
      var days=empRaw.days||empRaw||{};
      Object.values(days).forEach(function(code){
        var c=(code||'').toUpperCase().replace('*','');
        if(PRESENT.includes(c)||PRESENT.includes(code))total++;
      });
    });
    empTotals[eid]=total;
  });

  // Get employee details + category
  // Category logic matching getEmpCat in the report section
  function getCategory(emp){
    var md=null;
    if(typeof mdData!=='undefined'&&mdData.length){
      md=mdData.find(function(m){return String(m.pid).trim()===String(emp.i).trim();});
    }
    // First check roster empCat (already synced)
    if(emp.empCat) return emp.empCat;
    if(!md) return 'Daily Rated';

    var egText=(md.egText||'').trim();
    var empCat=(md.empCat||'').trim().toUpperCase();
    var esg=(md.esgText||md.esgCode||'').toUpperCase();

    if(egText==='Executives'||esg.match(/^E-?[0-9]/)) return 'Executive';
    if(empCat.indexOf('MONTHLY RATED')===0) return 'Monthly Rated';
    if(empCat.indexOf('DAILY RATED')===0) return 'Daily Rated';
    if(egText==='Apprentice') return 'Daily Rated';
    if(esg.indexOf('T&S')>=0||esg.indexOf('CLERK')>=0) return 'Monthly Rated';
    if((esg.indexOf('CAT I')>=0||esg.indexOf('CAT II')>=0||esg.indexOf('CAT III')>=0||esg.indexOf('CAT IV')>=0||esg.indexOf('CAT V')>=0||esg.indexOf('CAT VI')>=0)||esg.indexOf('TRAINEE')>=0) return 'Daily Rated';
    return 'Daily Rated';
  }

  // UG/Surface from emp.ct
  function isUG(emp){ return !emp.ct||emp.ct==='U'; }

  // Build rows for each category
  var mrRows=[];     // Monthly Rated
  var drUGRows=[];   // Daily Rated Underground
  var drSurfRows=[]; // Daily Rated Surface
  var execRows=[];   // Executive

  allEids.forEach(function(eid){
    var total=empTotals[eid]||0;
    if(total<190)return; // Only 190+

    var emp=S.emps.find(function(e){return e.i===eid;});
    if(!emp)return;

    var cat=getCategory(emp);
    var attPP=ppN(emp.p)||emp.p||'';
    var row={
      'Employee ID':eid,
      'Employee Name':emp.n,
      'Designation':emp.desig||'',
      'Pay Point':attPP,
      'Posting':emp.posting||'',
      'UG/Surface':isUG(emp)?'Underground':'Surface',
      'Total Attendance':total
    };
    // Add month wise
    months.forEach(function(m){
      var empRaw=(yrAtt[m]||{})[eid]||{};
      var days=empRaw.days||empRaw||{};
      var pd=0;
      Object.values(days).forEach(function(code){
        var c=(code||'').toUpperCase().replace('*','');
        if(PRESENT.includes(c)||PRESENT.includes(code))pd++;
      });
      row[m]=pd;
    });

    if(cat==='Executive') execRows.push(row);
    else if(cat==='Monthly Rated') mrRows.push(row);
    else if(cat==='Daily Rated'){
      if(isUG(emp)) drUGRows.push(row);
      else drSurfRows.push(row);
    }
  });

  // Sort each sheet by Total Attendance descending
  function sortRows(arr){ return arr.sort(function(a,b){return b['Total Attendance']-a['Total Attendance'];}); }
  mrRows=sortRows(mrRows);
  drUGRows=sortRows(drUGRows);
  drSurfRows=sortRows(drSurfRows);
  execRows=sortRows(execRows);

  if(!mrRows.length&&!drUGRows.length&&!drSurfRows.length&&!execRows.length){
    return alert('Koi employee nahi mila jiska 190+ days attendance ho selected range mein!');
  }

  // Build Excel
  var wb=XLSX.utils.book_new();
  var baseHdr=['SN','Employee ID','Employee Name','Designation','Pay Point','Posting','UG/Surface'];
  months.forEach(function(m){baseHdr.push(m);});
  baseHdr.push('Total Attendance');

  var colW=[{wch:4},{wch:12},{wch:26},{wch:22},{wch:14},{wch:12},{wch:12}];
  months.forEach(function(){colW.push({wch:8});});
  colW.push({wch:16});

  function makeSheet(rows, sheetName){
    if(!rows.length)return;
    var data=[baseHdr];
    rows.forEach(function(r,i){
      var row=[i+1,r['Employee ID'],r['Employee Name'],r['Designation'],r['Pay Point'],r['Posting'],r['UG/Surface']];
      months.forEach(function(m){row.push(r[m]||0);});
      row.push(r['Total Attendance']);
      data.push(row);
    });
    // Total row
    var totRow=['','','','','','','TOTAL'];
    months.forEach(function(m){
      var s=rows.reduce(function(acc,r){return acc+(r[m]||0);},0);
      totRow.push(s);
    });
    totRow.push(rows.reduce(function(acc,r){return acc+r['Total Attendance'];},0));
    data.push(totRow);

    var ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=colW;
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  }

  makeSheet(mrRows,'Monthly Rated ('+mrRows.length+')');
  makeSheet(drUGRows,'DR Underground ('+drUGRows.length+')');
  makeSheet(drSurfRows,'DR Surface ('+drSurfRows.length+')');
  makeSheet(execRows,'Executive ('+execRows.length+')');

  // Summary sheet
  var sumData=[
    ['190+ Days Attendance Report'],
    ['Range: '+rangeLabel],
    ['Months covered: '+months.join(', ')],
    [''],
    ['Category','Count','Min 190 Days'],
    ['Monthly Rated',mrRows.length,mrRows.length],
    ['Daily Rated - Underground',drUGRows.length,drUGRows.length],
    ['Daily Rated - Surface',drSurfRows.length,drSurfRows.length],
    ['Executive',execRows.length,execRows.length],
    ['TOTAL',mrRows.length+drUGRows.length+drSurfRows.length+execRows.length,'']
  ];
  var wsSumm=XLSX.utils.aoa_to_sheet(sumData);
  wsSumm['!cols']=[{wch:28},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsSumm,'Summary');

  var fname='Attendance_190Plus_'+months[0]+'_to_'+months[months.length-1]+'.xlsx';
  XLSX.writeFile(wb,fname);
  var total=mrRows.length+drUGRows.length+drSurfRows.length+execRows.length;
  toast('190+ Report downloaded! '+total+' employees — MR:'+mrRows.length+' DR-UG:'+drUGRows.length+' DR-Surf:'+drSurfRows.length+' Exec:'+execRows.length);
}

function yrBulkDownload(){
  var bulkSel=document.getElementById('yr-bulk');
  var jobSel=document.getElementById('yr-jobtext');
  var category=bulkSel?bulkSel.value:'';
  var jobTexts=[];
  if(jobSel){for(var ji=0;ji<jobSel.options.length;ji++){if(jobSel.options[ji].selected)jobTexts.push(jobSel.options[ji].value);}}
  var jobText=jobTexts.length?jobTexts.join(','):'';
  
  if(!category&&!jobText)return alert('Category ya Job Text select karo!');
  
  var allYrMonths=Object.keys(yrAtt).sort(yrSortMonths);
  if(!allYrMonths.length)return alert('Koi attendance data nahi hai!');
  var fromRaw=document.getElementById('yr-bulk-from')?.value||'';
  var toRaw=document.getElementById('yr-bulk-to')?.value||'';
  var mi=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  
  function toMonthKey(val){
    if(!val)return '';
    // Handle type="month" format: 2026-02 → FEB-2026
    var m=val.match(/(\d{4})-(\d{2})/);
    if(m)return mi[parseInt(m[2])-1]+'-'+m[1];
    return val.toUpperCase();
  }
  
  var fromM=toMonthKey(fromRaw);
  var toM=toMonthKey(toRaw);
  var yrMonths=allYrMonths;
  
  if(fromM||toM){
    var fi=fromM?allYrMonths.indexOf(fromM):0;
    var ti=toM?allYrMonths.indexOf(toM):allYrMonths.length-1;
    if(fi<0){
      // Fuzzy match
      for(var x=0;x<allYrMonths.length;x++){if(allYrMonths[x].includes(fromM))fi=x;}
    }
    if(ti<0){
      for(var x=0;x<allYrMonths.length;x++){if(allYrMonths[x].includes(toM))ti=x;}
    }
    if(fi<0)fi=0;if(ti<0)ti=allYrMonths.length-1;
    yrMonths=allYrMonths.slice(fi,ti+1);
  }
  if(!yrMonths.length)return alert('Selected range mein koi month nahi!');
  
  // Get all employees from attendance
  var allEids=new Set();
  yrMonths.forEach(function(month){
    Object.keys(yrAtt[month]||{}).forEach(function(eid){allEids.add(eid);});
  });
  
  // Filter employees
  var filtered=[];
  var catLabel='All';
  
  if(jobTexts.length){
    catLabel=jobTexts.join(', ');
    var jobMds=mdData.filter(function(m){return jobTexts.indexOf(m.jobText)>=0;});
    var jobEids=new Set();
    jobMds.forEach(function(m){
      if(m.pid)jobEids.add(String(m.pid).trim());
      if(m.sn)jobEids.add(String(m.sn).trim());
      // Also match by S.emps serial number
      var emp=S.emps.find(function(e){return String(e.s)===String(m.sn);});
      if(emp)jobEids.add(emp.i);
    });
    allEids.forEach(function(eid){
      if(jobEids.has(eid)){
        var md=mdData.find(function(m){return String(m.pid).trim()===eid||String(m.sn).trim()===eid;});
        if(!md){var emp2=S.emps.find(function(e){return e.i===eid;});if(emp2)md=mdData.find(function(m){return String(m.sn)===String(emp2.s);});}
        var emp=S.emps.find(function(e){return e.i===eid;});
        filtered.push({eid:eid,name:md?md.name:(emp?emp.n:''),desig:(md&&md.jobText)?md.jobText:(emp?emp.desig:''),posting:emp?ppN(emp.p):''});
      }
    });
  } else if(category==='all'){
    catLabel='All';
    // Treat as all job texts selected
    jobTexts=[...new Set(mdData.map(function(m){return m.jobText;}).filter(Boolean))];
    allEids.forEach(function(eid){
      var emp=S.emps.find(function(e){return e.i===eid;});
      var md=mdData.find(function(m){return m.pid===eid||String(m.sn)===String(emp?emp.s:'');});
      filtered.push({eid:eid,name:md?md.name:(emp?emp.n:''),desig:(md&&md.jobText)?md.jobText:(emp?emp.desig:''),posting:emp?ppN(emp.p):''});
    });
  } else {
    // Category filter
    var catKey=category.replace('cat_','');
    catLabel=bulkSel.options[bulkSel.selectedIndex].textContent;
    allEids.forEach(function(eid){
      var emp=S.emps.find(function(e){return e.i===eid;});
      var md=mdData.find(function(m){return m.pid===eid;});
      var egText=(md?md.egText||md.egc||'':'').toUpperCase();
      var esgText=(md?md.esgText||md.esgCode||'':'').toUpperCase();
      var deptText=(md?md.deptText||'':'').toUpperCase();
      var jobText=(md?md.jobText||'':'').toUpperCase();
      var empCat=(md?md.empCat||'':'').toUpperCase();
      var posting=(emp?ppN(emp.p):'').toUpperCase();
      var match=false;
      switch(catKey){
        case 'executive':
          match=egText.includes('EXEC')||esgText.match(/^E-?\d/)||empCat.includes('EXEC');
          break;
        case 'monthly':
          match=esgText.includes('T&S')||esgText.includes('EXCV')||esgText.includes('CLERK')||empCat.includes('MONTHLY')||empCat.includes('MR');
          break;
        case 'daily':
          match=esgText.match(/CAT\s*(I|II|III|IV|V|VI|[1-6])/)||esgText.includes('TRAINEE')||empCat.includes('DAILY')||empCat.includes('DR');
          break;
        case 'contract':
          match=egText.includes('CONTRACT')||empCat.includes('CONTRACT')||posting.includes('CONTRACT');
          break;
        case 'em':
          match=deptText.includes('E&M')||deptText.includes('ELECT')||deptText.includes('MECH')||jobText.includes('ELECT')||jobText.includes('MECH')||jobText.includes('FITTER')||jobText.includes('WINDER')||jobText.includes('PUMP');
          break;
        case 'mining':
          match=deptText.includes('MINING')||deptText.includes('PRODUCTION')||jobText.includes('SDL')||jobText.includes('LHD')||jobText.includes('DRILL')||jobText.includes('BLAST')||jobText.includes('MINING')||jobText.includes('LOADER');
          break;
        case 'surface':
          match=deptText.includes('SURFACE')||posting.includes('SURFACE')||esgText.includes('SURFACE');
          break;
        case 'underground':
          match=deptText.includes('UG')||deptText.includes('UNDERGROUND')||posting.includes('UG');
          break;
      }
      if(match)filtered.push({eid:eid,name:md?md.name:(emp?emp.n:''),desig:(md&&md.jobText)?md.jobText:(emp?emp.desig:''),posting:emp?ppN(emp.p):''});
    });
  }
  
  if(!filtered.length)return alert('Koi employee nahi mila!');
  
  // HORIZONTAL FORMAT: Each month = columns (1,2,3...28/31)
  var wb=XLSX.utils.book_new();
  
  // If Job Text selected → designation-wise sheets
  // Each sheet = 1 designation, rows = employees, cols = months (attendance count)
  if(jobTexts.length){
    // Group filtered employees by Job Text
    var byDesig={};
    filtered.forEach(function(emp){
      var md=mdData.find(function(m){return String(m.pid).trim()===emp.eid||String(m.sn).trim()===emp.eid;});
      var yrInfo=null;
        // Get info from yearly attendance data
        for(var ym in yrAtt){
          var yrEmp=(yrAtt[ym]||{})[emp.eid];
          if(yrEmp&&yrEmp.info){yrInfo=yrEmp.info;break;}
        }
        var jt=(md&&md.jobText)?md.jobText:(yrInfo&&yrInfo.position)?yrInfo.position:(emp.desig||'Other');
      var gender='Male';
        if(md&&md.gender)gender=md.gender.toUpperCase().charAt(0)==='F'?'Female':'Male';
        else if(yrInfo&&yrInfo.gender)gender=yrInfo.gender.toUpperCase().charAt(0)==='F'?'Female':'Male';
      var eg=md?(md.egText||'').toUpperCase():'';
      var empType='Regular';
        if(eg.includes('CONTRACT'))empType='Contract';
        else if(yrInfo&&yrInfo.category&&yrInfo.category.toUpperCase().includes('CONTRACT'))empType='Contract';
        else if(yrInfo&&yrInfo.group&&yrInfo.group.toUpperCase().includes('CONTRACT'))empType='Contract';
      if(!byDesig[jt])byDesig[jt]=[];
      byDesig[jt].push({eid:emp.eid,name:emp.name,desig:jt,posting:emp.posting,gender:gender,empType:empType});
    });
    
    // Sort months JAN-DEC order
    var sortedMonths=yrMonths.slice();
    
    Object.entries(byDesig).forEach(function(entry){
      var desig=entry[0],emps=entry[1];
      // Sort: Male first, then Female, then Contract
      emps.sort(function(a,b){
        var order={'Male-Regular':0,'Female-Regular':1,'Male-Contract':2,'Female-Contract':3};
        var oa=order[a.gender+'-'+a.empType]||0;
        var ob=order[b.gender+'-'+b.empType]||0;
        return oa-ob;
      });
      
      // Header: SN, ID, Name, Gender, Type, Posting, JAN, FEB, ..., TOTAL
      var header=['SN','Name','Employee ID','Designation','Type','UG/Surface','Gender'];
      sortedMonths.forEach(function(m){header.push(m);});
      header.push('TOTAL');
      
      var rows=[];
      var maleCount=0,femaleCount=0,contractCount=0;
      
      emps.forEach(function(emp,i){
        var ugSurf='';
        var mdE=mdData.find(function(m){return String(m.pid).trim()===emp.eid;});
        if(mdE){var uga=(mdE.ugaCode||mdE.disc||'').toUpperCase();ugSurf=uga.includes('UG')?'Underground':'Surface';}
        else{var posting2=(emp.posting||'').toUpperCase();ugSurf=posting2.includes('UG')?'Underground':'Surface';}
        var row=[i+1,emp.name,emp.eid,emp.desig,emp.empType,ugSurf,emp.gender];
        var total=0;
        
        sortedMonths.forEach(function(month){
          var empRaw=(yrAtt[month]||{})[emp.eid]||{};
          var empAtt=empRaw.days||empRaw||{};
          var present=0;
          Object.values(empAtt).forEach(function(code){
            var c=(code||'').toUpperCase().replace('*','');
            if(c==='P'||c==='S'||c==='U'||c==='O/T'||c==='WE'||c==='HD'||c==='HE'||c==='OD'||c==='CL'||c==='SL'||c==='EL')present++;
          });
          row.push(present);
          total+=present;
        });
        
        row.push(total);
        rows.push(row);
        
        if(emp.gender==='Male')maleCount++;
        if(emp.gender==='Female')femaleCount++;
        if(emp.empType==='Contract')contractCount++;
      });
      
      // Summary row
      var sumRow=['','TOTAL ('+emps.length+')','','','C:'+contractCount,'','M:'+maleCount+' F:'+femaleCount];
      sortedMonths.forEach(function(m,mi){
        var colTotal=rows.reduce(function(s,r){return s+(r[7+mi]||0);},0);
        sumRow.push(colTotal);
      });
      sumRow.push(rows.reduce(function(s,r){return s+r[r.length-1];},0));
      rows.push(sumRow);
      
      var ws=XLSX.utils.aoa_to_sheet([header].concat(rows));
      var cols=[{wch:4},{wch:24},{wch:12},{wch:20},{wch:8},{wch:12},{wch:7}];
      sortedMonths.forEach(function(){cols.push({wch:8});});
      cols.push({wch:8});
      ws['!cols']=cols;
      
      var sheetName=desig.substring(0,31).replace(/[\/\\?*\[\]]/g,'');
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
    });
    
    // Summary sheet - all designations count
    var sumHeader=['SN','Designation','Male','Female','Contract','Total'];
    var sumRows=[];
    var tm=0,tf=0,tc=0,tt=0;
    Object.entries(byDesig).forEach(function(entry,i){
      var emps=entry[1];
      var m=emps.filter(function(e){return e.gender==='Male';}).length;
      var f=emps.filter(function(e){return e.gender==='Female';}).length;
      var c=emps.filter(function(e){return e.empType==='Contract';}).length;
      sumRows.push([i+1,entry[0],m,f,c,emps.length]);
      tm+=m;tf+=f;tc+=c;tt+=emps.length;
    });
    sumRows.push(['','TOTAL',tm,tf,tc,tt]);
    var sumWs=XLSX.utils.aoa_to_sheet([sumHeader].concat(sumRows));
    sumWs['!cols']=[{wch:4},{wch:30},{wch:6},{wch:7},{wch:8},{wch:6}];
    XLSX.utils.book_append_sheet(wb,sumWs,'Summary');
    
  } else {
    // Category based - single sheet, roster data only
    var header=['SN','Employee ID','Name','Pay Point','Designation','Posting','Contract','Gender','Department','Phone','Category'];
    yrMonths.forEach(function(m){header.push(m);});
    header.push('TOTAL');
    
    var rows=[];
    filtered.forEach(function(emp,i){
      var re=S.emps.find(function(e){return e.i===emp.eid;});
      var row=[i+1,emp.eid,re?re.n:emp.name,re?ppN(re.p):'',re?re.desig||'':'',re?re.posting||ppN(re.p):'',re?re.contract||'':'',re?re.gender||'':'',re?re.dept||'':'',re?re.phone||'':'',catLabel];
      var total=0;
      yrMonths.forEach(function(month){
        var empRaw=(yrAtt[month]||{})[emp.eid]||{};
        var empAtt=empRaw.days||empRaw||{};
        var present=0;
        Object.values(empAtt).forEach(function(code){
          var c=(code||'').toUpperCase().replace('*','');
          if(c==='P'||c==='S'||c==='U'||c==='O/T'||c==='WE'||c==='HD'||c==='HE'||c==='OD'||c==='CL'||c==='SL'||c==='EL')present++;
        });
        row.push(present);
        total+=present;
      });
      row.push(total);
      rows.push(row);
    });
    
    var ws=XLSX.utils.aoa_to_sheet([header].concat(rows));
    var cols=[{wch:4},{wch:24},{wch:12},{wch:20},{wch:8},{wch:12},{wch:7}];
    yrMonths.forEach(function(){cols.push({wch:8});});
    cols.push({wch:8});
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,catLabel.substring(0,31));
  }
  
  XLSX.writeFile(wb,'Attendance_'+catLabel.replace(/[^a-zA-Z0-9]/g,'_').substring(0,50)+'_'+filtered.length+'emps.xlsx');
  toast(filtered.length+' employees downloaded!');
}

    if(eg.includes('EXEC'))cat='Executive';

    empRows.push([i+1,m.pid,m.name,m.gender||'',cat,m.esgText||'',m.jobText||'',m.deptText||'',m.psaText||'']);
  });
  var ws5=XLSX.utils.aoa_to_sheet(empRows);

function mdUpload(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){alert('No data found!');return;}
      const headers=Object.keys(rows[0]);
      mdData=rows.map(row=>{
        const vals=Object.values(row);
        const rec={};
        mdKeys.forEach((k,i)=>{rec[k]=String(vals[i]||'').trim();});
        return rec;
      });
      mdSave();
      toast(mdData.length+' employees loaded!');
      render();
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsArrayBuffer(input.files[0]);
  input.value='';
}

function mdIsRetiringSoon(e){
  if(!e.dor)return false;
  const p=e.dor.split('.');
  if(p.length!==3)return false;
  const d=new Date(p[2],p[1]-1,p[0]);
  const now=new Date();
  const diff=(d-now)/(1000*60*60*24);
  return diff>=0&&diff<=365;
}

function mdShowDetail(idx){
  const e=mdData[idx];if(!e)return;

  const fv=v=>v||'\u2014';
  
  // Compute live stats
  const now=new Date();
  let liveAge='',serviceYrs='',retCountdown='',retStatus='',nextBday='';
  
  // Live age from DOB
  if(e.dob){
    const p=e.dob.split('.');
    if(p.length===3){
      const dob=new Date(p[2],p[1]-1,p[0]);
      const ageY=now.getFullYear()-dob.getFullYear();
      const ageM=now.getMonth()-dob.getMonth();
      const adj=(ageM<0||(ageM===0&&now.getDate()<dob.getDate()))?1:0;
      const finalY=ageY-adj;
      const finalM=ageM<0?ageM+12:ageM;
      liveAge=finalY+' yrs '+finalM+' mths';
      // Next birthday
      let nextBd=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
      if(nextBd<now)nextBd=new Date(now.getFullYear()+1,dob.getMonth(),dob.getDate());
      const bdDiff=Math.ceil((nextBd-now)/(1000*60*60*24));
      nextBday=bdDiff===0?'Today! \ud83c\udf82':bdDiff<=30?'In '+bdDiff+' days \ud83c\udf82':'In '+bdDiff+' days';
    }

  // Service years from DOA
  if(e.doa){

      const sY=now.getFullYear()-doa.getFullYear();

let mdChatResults=[];

// Smart local query engine
function pd(s){if(!s)return null;const p=s.split('.');if(p.length!==3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function ageOf(dob){const d=pd(dob);if(!d)return -1;return Math.floor((new Date()-d)/(365.25*24*60*60*1000));}

function mdAiQuery(){
  const q=(document.getElementById('md-chat')?.value||'').trim();
  if(!q)return;
  if(!mdData.length)return alert('Upload master data first!');
  
  const histEl=document.getElementById('md-chat-history');
  if(!histEl)return;
  
  // Show user message
  histEl.innerHTML+='<div style="text-align:right;margin-bottom:6px"><span style="display:inline-block;background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:6px 12px;border-radius:12px 12px 2px 12px;font-size:11px;color:#fff;max-width:80%">'+q+'</span></div>';
  document.getElementById('md-chat').value='';
  
  const ql=q.toLowerCase().replace(/[?.,!]/g,'');
  const now=new Date();
  const MN=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const MS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  
  // Parse helpers
  function findMonth(){for(let i=0;i<12;i++){if(ql.includes(MN[i])||ql.match(new RegExp('\\b'+MS[i]+'\\b')))return i;}return -1;}
  function findYear(){const m=ql.match(/\b(19\d{2}|20\d{2})\b/);return m?parseInt(m[1]):-1;}
  function findNum(){const nums=ql.match(/\b(\d+)\b/g);if(!nums)return -1;for(const n of nums){const v=parseInt(n);if(v<200)return v;}return -1;}
  function hasWord(...words){return words.some(w=>ql.includes(w));}
  function findName(){
    // Extract name after keywords
    const patterns=[/(?:of|for|about|named?)\s+([a-z\s.]+?)(?:\s+(?:with|in|from|who|and|$))/,/(?:show|find|search|list|get|display)\s+([a-z\s.]+?)(?:\s+(?:with|phone|address|detail|info|$))/];
    for(const p of patterns){const m=ql.match(p);if(m)return m[1].trim();}
    return '';
  }
  
  const yr=findYear();
  const mn=findMonth();
  const num=findNum();
  
  let results=[];
  let title='';
  let cols=[];
  let isAggregate=false;
  let aggData=[];
  
  // ═══ AGGREGATES / COUNTS ═══
  if(hasWord('count','total','how many','kitne','number of','summary','stats','statistics')){
    isAggregate=true;
    let field='',fieldLabel='';
    if(hasWord('department','dept'))        {field='deptText';fieldLabel='Department';}
    else if(hasWord('position','designation','post')){field='pos';fieldLabel='Position';}
    else if(hasWord('religion'))            {field='religion';fieldLabel='Religion';}
    else if(hasWord('cast','caste'))        {field='cast';fieldLabel='Cast';}
    else if(hasWord('gender','male','female')){field='gender';fieldLabel='Gender';}
    else if(hasWord('category','cat'))      {field='empCat';fieldLabel='Category';}

  });

}

// ═══════ PAY SLIP ═══════
let psData=[]; // current loaded slips from Excel
let psSheetNames=[]; // Excel sheet names for dropdown

// ① TXT → Excel Converter
function psTxtToExcel(){
  const fileInput=document.getElementById('ps-txt-file');
  if(!fileInput||!fileInput.files[0])return alert('Select a TXT file!');
  const statusEl=document.getElementById('ps-convert-status');
  statusEl.innerHTML='<span style="color:#f59e0b;font-size:11px">⏳ Parsing TXT file...</span>';
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      const slips=psParseFile(text);
      if(!slips.length){statusEl.innerHTML='<span style="color:#f87171;font-size:11px">No slips found!</span>';return;}
      statusEl.innerHTML='<span style="color:#f59e0b;font-size:11px">⏳ '+slips.length+' slips found, generating Excel...</span>';
      setTimeout(()=>{
        try{
          const month=slips[0]?.monthYr||'UNKNOWN';
          const xlData=psGenerateSlipExcel(slips,month);
          const blob=new Blob([xlData],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download='PaySlips_'+month+'.xlsx';a.click();
          URL.revokeObjectURL(url);
          statusEl.innerHTML='<span style="color:#16a34a;font-size:11px">✅ '+slips.length+' slips → Excel downloaded! Save to Google Drive for later use.</span>';
          toast(slips.length+' slips → Excel downloaded!');
        }catch(err){statusEl.innerHTML='<span style="color:#f87171;font-size:11px">Error: '+err.message+'</span>';}
      },50);
    }catch(err){statusEl.innerHTML='<span style="color:#f87171;font-size:11px">Error: '+err.message+'</span>';}
  };
  reader.readAsText(file);
}

// ② Load Excel → Dropdown → View
function psLoadExcel(){
  const fileInput=document.getElementById('ps-excel-file');
  if(!fileInput||!fileInput.files[0])return alert('Select an Excel file!');
  const statusEl=document.getElementById('ps-excel-status');
  statusEl.innerHTML='<span style="color:#a5b4fc;font-size:11px">⏳ Loading Excel...</span>';
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const slips=psReadSlipExcel(wb);
      if(!slips.length){statusEl.innerHTML='<span style="color:#f87171;font-size:11px">No valid slip sheets found in Excel!</span>';return;}
      psData=slips;
      psSheetNames=wb.SheetNames;
      statusEl.innerHTML='<span style="color:#16a34a;font-size:11px">✅ '+slips.length+' employees loaded!</span>';
      // Show dropdown
      document.getElementById('ps-emp-select').style.display='block';
      document.getElementById('ps-qr-section').style.display='block';
      psBuildQRDropdown();
      psPopulateDropdown(slips);
      psRenderEmpList(slips);
      document.getElementById('ps-view').innerHTML='';
      toast(slips.length+' slips loaded from Excel!');
    }catch(err){statusEl.innerHTML='<span style="color:#f87171;font-size:11px">Error: '+err.message+'</span>';}
  };
  reader.readAsArrayBuffer(file);
}

function psPopulateDropdown(slips,filter){
  const dd=document.getElementById('ps-emp-dropdown');
  const countEl=document.getElementById('ps-emp-count');
  if(!dd)return;
  const search=(filter||'').toLowerCase();
  let opts='<option value="">-- Select Employee ('+slips.length+') --</option>';
  let count=0;
  slips.forEach((s,i)=>{
    const label=(s.eid||'')+ ' — '+(s.name||'Unknown');
    if(search&&!label.toLowerCase().includes(search))return;
    opts+='<option value="'+i+'">'+label+'</option>';
    count++;
  });
  dd.innerHTML=opts;
  if(countEl)countEl.textContent=count<slips.length?count+'/'+slips.length:'';
}

function psFilterDropdown(val){
  psPopulateDropdown(psData,val);
  psRenderEmpList(psData,val);
}


function psRenderEmpList(slips,filter){
  const el=document.getElementById('ps-emp-list');
  if(!el)return;
  if(!slips||!slips.length){el.innerHTML='';return;}
  const search=(filter||'').toLowerCase();
  const filtered=slips.map((s,i)=>({s,i})).filter(o=>{
    if(!search)return true;
    return((o.s.eid||'')+' '+(o.s.name||'')).toLowerCase().includes(search);
  });
  let h='<div class="cd" style="padding:0;overflow:hidden">';
  h+='<div style="padding:8px 12px;background:rgba(99,102,241,.1);display:flex;justify-content:space-between;align-items:center">';
  h+='<span style="font-size:11px;font-weight:600;color:#a5b4fc">Employees</span>';
  h+='<span style="font-size:10px;color:#64748b">'+filtered.length+' of '+slips.length+'</span></div>';
  h+='<div class="sa" style="max-height:40vh">';
  filtered.forEach(function(o){
    var s=o.s,i=o.i;
    var net=s.netPay?String.fromCharCode(8377)+parseFloat(String(s.netPay).replace(/,/g,'')).toLocaleString('en-IN'):'';

    h+='</div>';
  });
  h+='</div></div>';
  el.innerHTML=h;
}

function psBuildQRDropdown(){
  const dd=document.getElementById('ps-report-field');
  if(!dd||!psData.length)return;
  // Scan ALL slips to find every unique field key
  const skip=new Set(['eid','name','monthYr','_origLines']);
  const fieldMap={}; // key -> {label, group, count}
  
  // Predefined groups for known fields
  const knownGroups={
    'otCode':['OT Info','OT Code'],'designation':['Employee Info','Designation'],'department':['Employee Info','Department'],
    'grade':['Employee Info','Grade'],'empType':['Employee Info','Emp Type'],'ugaCode':['Employee Info','UGA Code'],
    'bank':['Employee Info','Bank'],'bankAc':['Employee Info','Bank A/c'],'aadhar':['Employee Info','Aadhar No'],
    'pan':['Employee Info','PAN No'],'cmpf':['Employee Info','CMPF No'],'basic':['Employee Info','Basic Rate'],
    'tsRate':['Employee Info','TS Rate'],'vdaCurr':['Employee Info','VDA Curr'],'vdaPrev':['Employee Info','VDA Prev'],
    'incrDate':['Dates','Increment Date'],'ltcDate':['Dates','LTC Date'],'bharatBhraman':['Dates','Bharat Bhraman'],
    'leaveEncash':['Dates','Leave Encash'],'blockStDt':['Dates','Block Start'],'blockEnDt':['Dates','Block End'],'dob':['Dates','DOB'],
    'elDue':['Leave Balance','EL Due'],'clDue':['Leave Balance','CL Due'],'slDue':['Leave Balance','SL/HPL Due'],
    'totalGross':['Pay','Total Gross'],'totalDed':['Pay','Total Deduction'],'netPay':['Pay','Net Pay'],
    'pfGross':['Pay','PF Gross'],'taxGross':['Pay','Tax Gross'],'yearlyGross':['Pay','Yearly Gross'],
    'yearlyPF':['Pay','Yearly PF'],'pfCumulative':['Pay','PF Cumulative'],'yearlyTaxGross':['Pay','Yearly Tax Gross'],
    'yearlyLIC':['Pay','Yearly LIC'],'yearlyPension':['Pay','Yearly Pension'],'qtrBonBas':['Pay','Qtr Bon Bas'],
    'qtrBonDay':['Pay','Qtr Bon Day'],'qtrBonus':['Pay','Qtr Bonus'],'cprmsneGrs':['Pay','CPRMSNE GRS'],
    'area':['Employee Info','Area'],'unit':['Employee Info','Unit'],'payArea':['Employee Info','Pay Area'],
    'payPoint':['Employee Info','Pay Point']
  };
  
  psData.forEach(s=>{
    // Direct fields
    Object.keys(s).forEach(k=>{
      if(skip.has(k)||k==='earnings'||k==='deductions'||k==='form16'||k==='attendance')return;
      if(!fieldMap[k]){
        const kg=knownGroups[k];
        fieldMap[k]={label:kg?kg[1]:k,group:kg?kg[0]:'Other Info',count:0};
      }
      if(s[k])fieldMap[k].count++;
    });
    // Attendance fields
    const a=s.attendance||{};
    Object.keys(a).forEach(k=>{
      const fk='att_'+k;
      if(!fieldMap[fk]){
        const labels={attd:'ATTD Days',woDay:'WO Days',hoDay:'HO Days',el:'EL',cl:'CL',sl:'SL',
          hpl:'HPL',spl:'SPL',cml:'CML',other:'Other',absDays:'ABS Days',ugDays:'UG Days',
          nsDays:'NS Days',lvEnc:'LV Enc',chgHr:'Chg Hr',sunSingle:'Sunday Single',sunDouble:'Sunday Double',
          holSingle:'Holi Single',holDouble:'Holi Double',otPaid:'OT Paid',otDue:'OT Due',paidDays:'Paid Days'};
        fieldMap[fk]={label:labels[k]||k,group:'Attendance',count:0};
      }
      if(a[k])fieldMap[fk].count++;
    });
    // Earnings names
    (s.earnings||[]).forEach(e=>{
      const fk='earn_'+e.name;
      if(!fieldMap[fk])fieldMap[fk]={label:e.name,group:'Earnings',count:0};
      fieldMap[fk].count++;
    });
    // Deductions names
    (s.deductions||[]).forEach(d=>{
      const fk='ded_'+d.name;
      if(!fieldMap[fk])fieldMap[fk]={label:d.name,group:'Deductions',count:0};
      fieldMap[fk].count++;
    });
    // Form16 names
    (s.form16||[]).forEach(f=>{
      const fk='f16_'+f.name;
      if(!fieldMap[fk])fieldMap[fk]={label:f.name,group:'Form 16',count:0};
      fieldMap[fk].count++;
    });
  });
  
  // Group and sort
  const groups={};
  Object.entries(fieldMap).forEach(([k,v])=>{
    if(!v.count)return; // skip fields with no data
    if(!groups[v.group])groups[v.group]=[];
    groups[v.group].push({key:k,label:v.label+' ('+v.count+')',count:v.count});
  });
  
  // Preferred group order
  const order=['OT Info','Employee Info','Dates','Leave Balance','Attendance','Earnings','Deductions','Pay','Form 16','Other Info'];
  let opts='';
  order.forEach(g=>{
    const items=groups[g];
    if(!items||!items.length)return;
    items.sort((a,b)=>b.count-a.count);
    opts+='<optgroup label="'+g+' ('+items.length+')">';
    items.forEach(item=>{
      opts+='<option value="'+item.key+'">'+item.label+'</option>';
    });
    opts+='</optgroup>';
  });
  // Any remaining groups
  Object.keys(groups).forEach(g=>{
    if(order.includes(g))return;
    const items=groups[g];
    items.sort((a,b)=>b.count-a.count);
    opts+='<optgroup label="'+g+' ('+items.length+')">';
    items.forEach(item=>{
      opts+='<option value="'+item.key+'">'+item.label+'</option>';
    });
    opts+='</optgroup>';
  });
  
  dd.innerHTML=opts;
}

      val=f?f.amount:'';
    } else {
      val=s[field]||'';
    }
    return{'SN':i+1,'Employee Code':s.eid||'','Employee Name':s.name||'','Designation':s.designation||'','OT Code':s.otCode||'',[fieldLabel]:val};
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:14},{wch:26},{wch:24},{wch:22},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,'PaySlip_'+fieldLabel.replace(/\s+/g,'_')+'_Report.xlsx');
  toast(fieldLabel+' report downloaded!');
}





// ═══════ REAL-TIME MONITOR ═══════
let rtData={today:[],yesterday:[],nightEids:new Set()};

function rtProcess(){
  var todayInput=document.getElementById('rt-today');
  var yesterdayInput=document.getElementById('rt-yesterday');
  var statusEl=document.getElementById('rt-status');
  
  if(!todayInput||!todayInput.files[0])return alert('Today ki file upload karo!');
  if(statusEl)statusEl.innerHTML='<span style="color:#06b6d4">Processing...</span>';
  
  var promises=[];
  
  promises.push(new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(e){
      try{rtData.today=rtParseBio(e.target.result);}catch(ex){alert('Today parse fail: '+ex.message);rtData.today=[];}
      resolve();
    };
    reader.onerror=function(){alert('Today file read error');resolve();};
    reader.readAsArrayBuffer(todayInput.files[0]);
  }));
  
  if(yesterdayInput&&yesterdayInput.files[0]){
    promises.push(new Promise(function(resolve){
      var reader=new FileReader();
      reader.onload=function(e){
        try{rtData.yesterday=rtParseBio(e.target.result);}catch(ex){alert('Yesterday parse fail: '+ex.message);rtData.yesterday=[];}
        resolve();
      };
      reader.onerror=function(){alert('Yesterday file read error');resolve();};
      reader.readAsArrayBuffer(yesterdayInput.files[0]);
    }));
  }
  
  Promise.all(promises).then(function(){
    try{
    alert('Parsed! Yesterday: '+rtData.yesterday.length+' rows, Today: '+rtData.today.length+' rows');
    // STEP 1: Yesterday se SIRF night shift nikalo (IN=OUT same + 9PM+)
    rtData.nightShiftData=[];
    rtData.nightEids=new Set();
    
    rtData.yesterday.forEach(function(r){
      if(!r.sameInOut)return; // IN ≠ OUT → SKIP
      var hr=parseInt(r.inTime.split(':')[0]);
      if(hr<21)return; // Before 9PM → SKIP
      // Night shift employee!
      rtData.nightEids.add(r.eid);
    });
    
    // STEP 2: Today se night shift ka OUT match karo
    var todayMap={};
    rtData.today.forEach(function(r){todayMap[r.eid]=r;});
    
    rtData.yesterday.forEach(function(r){
      if(!rtData.nightEids.has(r.eid))return;
      var todayR=todayMap[r.eid];
      var outTime='NO OUT';
      if(todayR&&todayR.sameInOut){
        outTime=todayR.inTime; // Today's early punch = their OUT
      }
      var emp=S.emps.find(function(e){return e.i===r.eid;});
      rtData.nightShiftData.push({
        eid:r.eid,
        name:r.name||(emp?emp.n:''),
        desig:emp?emp.desig:'',
        posting:emp?ppN(emp.p):'',
        inTime:r.inTime,
        outTime:outTime
      });
    });
    
    // Sort night shift by roster
    rtData.nightShiftData.sort(function(a,b){
      var ra=S.emps.findIndex(function(e){return e.i===a.eid;});
      var rb=S.emps.findIndex(function(e){return e.i===b.eid;});
      if(ra<0)ra=9999;if(rb<0)rb=9999;
      return ra-rb;
    });
    
    // STEP 3: Today's real attendance (exclude night shift employees)
    rtData.realToday=[];
    rtData.today.forEach(function(r){
      if(rtData.nightEids.has(r.eid))return; // Night shift → exclude
      var emp=S.emps.find(function(e){return e.i===r.eid;});
      rtData.realToday.push({
        eid:r.eid,
        name:r.name||(emp?emp.n:''),
        desig:emp?emp.desig:'',
        posting:emp?ppN(emp.p):'',
        inTime:r.inTime,
        outTime:r.sameInOut?'':r.outTime,
        hasOut:!r.sameInOut&&r.outTime!==r.inTime
      });
    });
    
    // Sort by roster
    rtData.realToday.sort(function(a,b){
      var ra=S.emps.findIndex(function(e){return e.i===a.eid;});
      var rb=S.emps.findIndex(function(e){return e.i===b.eid;});
      if(ra<0)ra=9999;if(rb<0)rb=9999;
      return ra-rb;
    });
    
    // Categorize by shift time
    rtData.shift6=[];rtData.shift8=[];rtData.shift10=[];rtData.noOut=[];
    rtData.realToday.forEach(function(r){
      var hr=parseInt(r.inTime.split(':')[0]);
      if(hr<8)rtData.shift6.push(r);
      else if(hr<10)rtData.shift8.push(r);
      else rtData.shift10.push(r);
      if(!r.hasOut)rtData.noOut.push(r);
    });
    
    var hasOut=rtData.realToday.filter(function(r){return r.hasOut;});
    
    if(statusEl)statusEl.innerHTML='<span style="color:#22c55e">\u2705 Night: '+rtData.nightShiftData.length+' | Today Real: '+rtData.realToday.length+' | IN+OUT: '+hasOut.length+' | No OUT: '+rtData.noOut.length+'</span>';
    
    rtRenderDashboard();
    rtRenderTable();
    }catch(innerErr){alert('Inner error: '+innerErr.message);}
  }).catch(function(err){alert('Promise error: '+err.message);});
}

let mmAllSlips={}; // {month: [slips]} - saved in IndexedDB
// Load saved payslip months on startup
try{

  if(mmIdx&&Array.isArray(mmIdx)){
    // Will be loaded async from IDB
  }
}catch{}

function mmUploadExcel(){
  var input=document.getElementById('mm-files');
  if(!input||!input.files.length)return alert('Excel files select karo!');
  var files=Array.from(input.files);
  var statusEl=document.getElementById('mm-status');
  statusEl.innerHTML='<span style="color:#a855f7">Processing '+files.length+' files...</span>';
  
  var processed=0;
  
  function processFile(file){
    return new Promise(function(resolve){
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var data=new Uint8Array(e.target.result);
          var wb=XLSX.read(data,{type:'array'});
          var slips=psReadSlipExcel(wb);
          console.log('MM: '+file.name+' -> '+slips.length+' slips, sheets: '+wb.SheetNames.length);
          if(slips.length){
            var month=slips[0].monthYr||'UNKNOWN';
            mmAllSlips[month]=slips;
            // Save to IndexedDB
            if(IDB.db)IDB.set('mm_'+month,slips);
          }
          processed++;
          statusEl.innerHTML='<span style="color:#a855f7">Processing... '+processed+'/'+files.length+'</span>';
        }catch(err){processed++;}
        resolve();
      };
      reader.readAsArrayBuffer(file);
    });
  }
  
  (async function(){
    for(var i=0;i<files.length;i++){
      await processFile(files[i]);
    }
    // Save month index
    var months=Object.keys(mmAllSlips);
    LS.s('mm_idx',months);
    
    mmMonths=months.sort(yrSortMonths);
    statusEl.innerHTML='<span style="color:#22c55e">\u2705 '+mmMonths.length+' months saved! ('+Object.values(mmAllSlips).reduce(function(s,a){return s+a.length;},0)+' total slips)</span>';
    
    mmShowMonths();
    mmBuildFieldDD();
    document.getElementById('mm-controls').style.display='block';
    render();
    toast(mmMonths.length+' months saved permanently!');
  })();
}
