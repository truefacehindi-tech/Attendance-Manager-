function mmBuildFieldDD(){
  var dd=document.getElementById('mm-field');if(!dd)return;
  
  // Scan all slips for available fields
  var fieldSet={};
  
  // Predefined important fields
  var predef=[
    ['att_otPaid','OT Paid','Attendance'],
    ['att_otDue','OT Due','Attendance'],
    ['att_attd','ATTD Days','Attendance'],
    ['att_paidDays','Paid Days','Attendance'],
    ['att_absDays','ABS Days','Attendance'],
    ['att_ugDays','UG Days','Attendance'],
    ['att_nsDays','NS Days','Attendance'],
    ['att_sunSingle','Sunday Single','Attendance'],
    ['att_sunDouble','Sunday Double','Attendance'],
    ['att_chgHr','Chg Hr','Attendance'],
    ['att_woDay','WO Days','Attendance'],
    ['att_cl','CL','Attendance'],
    ['att_sl','SL','Attendance'],
    ['att_el','EL','Attendance'],
    ['netPay','Net Pay','Pay'],
    ['totalGross','Total Gross','Pay'],
    ['totalDed','Total Deduction','Pay'],
    ['pfGross','PF Gross','Pay'],
    ['taxGross','Tax Gross','Pay']
  ];
  
  predef.forEach(function(p){fieldSet[p[0]]={label:p[1],group:p[2]};});
  
  // Scan earnings/deductions from first month
  var firstSlips=mmAllSlips[mmMonths[0]]||[];
  if(firstSlips.length){
    var s=firstSlips[0];
    (s.earnings||[]).forEach(function(e){
      if(e.name)fieldSet['earn_'+e.name]={label:e.name,group:'Earnings'};
    });
    (s.deductions||[]).forEach(function(d){
      if(d.name)fieldSet['ded_'+d.name]={label:d.name,group:'Deductions'};
    });
    // Direct fields
    ['basic','otCode','designation','department','grade','empType'].forEach(function(k){
      if(s[k])fieldSet[k]={label:k,group:'Info'};
    });
  }
  
  // Group and build options
  var groups={};
  Object.entries(fieldSet).forEach(function(entry){
    var g=entry[1].group;
    if(!groups[g])groups[g]=[];
    groups[g].push({key:entry[0],label:entry[1].label});
  });
  
  var opts='';
  ['Attendance','Pay','Earnings','Deductions','Info'].forEach(function(g){
    var items=groups[g];
    if(!items)return;
    opts+='<optgroup label="'+g+'">';
    items.forEach(function(item){
      opts+='<option value="'+item.key+'"'+(item.key==='att_otPaid'?' selected':'')+'>'+item.label+'</option>';
    });
    opts+='</optgroup>';
  });
  dd.innerHTML=opts;
}

function mmGetValue(slip,field){
  if(!slip||!field)return '';
  
  if(field.startsWith('att_')){
    var key=field.replace('att_','');
    return (slip.attendance||{})[key]||'';
  }
  if(field.startsWith('earn_')){
    var name=field.replace('earn_','');
    var e=(slip.earnings||[]).find(function(e){return e.name===name;});
    return e?e.amount:'';
  }
  if(field.startsWith('ded_')){
    var name=field.replace('ded_','');
    var d=(slip.deductions||[]).find(function(d){return d.name===name;});
    return d?d.amount:'';
  }
  return slip[field]||'';
}

function mmGenerate(){
  var fromM=document.getElementById('mm-from')?.value;
  var toM=document.getElementById('mm-to')?.value;
  if(!Object.keys(mmAllSlips).length)return alert('Pehle Excel files upload karo!');
  // Filter months by range
  var allM=Object.keys(mmAllSlips).sort(yrSortMonths);
  var fromIdx=fromM?allM.indexOf(fromM):0;
  var toIdx=toM?allM.indexOf(toM):allM.length-1;
  if(fromIdx<0)fromIdx=0;
  if(toIdx<0)toIdx=allM.length-1;
  mmMonths=allM.slice(fromIdx,toIdx+1);
  if(!mmMonths.length)return alert('Selected range mein koi month nahi!');
  var field=document.getElementById('mm-field')?.value;
  if(!field)return;
  mmField=field;
  var fieldLabel=document.getElementById('mm-field')?.selectedOptions[0]?.textContent||field;
  
  // Collect all unique employees across all months
  var empMap={};
  var empOrder=[];
  
  mmMonths.forEach(function(month){
    var slips=mmAllSlips[month]||[];
    slips.forEach(function(s){
      if(!s.eid)return;
      if(!empMap[s.eid]){
        empMap[s.eid]={eid:s.eid,name:s.name||'',desig:s.designation||'',months:{}};
        empOrder.push(s.eid);
      }
      var val=mmGetValue(s,field);
      var num=parseFloat(String(val).replace(/,/g,''));
      empMap[s.eid].months[month]=isNaN(num)?val:num;
    });
  });
  
  // Build report with totals
  mmReport=empOrder.map(function(eid){
    var emp=empMap[eid];
    var total=0;
    mmMonths.forEach(function(m){
      var v=emp.months[m];
      if(typeof v==='number')total+=v;
    });
    return {eid:emp.eid,name:emp.name,desig:emp.desig,months:emp.months,total:total};
  });
  
  mmRenderReport(fieldLabel);
}

function psParseFile(text){
  // Normalize: replace tabs with spaces, collapse multiple spaces
  text=text.replace(/\t/g,' ');
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'').replace(/ {2,}/g,' '));
  const slips=[];
  let block=[];
  
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    // Match separator lines: ====, ════, or lines with many = or ─ or -
    const stripped=line.replace(/[!|]/g,'').trim();
    const isSep=stripped.match(/^[=]{8,}/)||stripped.match(/^[═]{8,}/)||stripped.match(/^[-]{8,}/)||stripped.match(/^[─]{8,}/)||(stripped.length>10&&stripped.replace(/[=─\-]/g,'').length<3);
    
    // Also detect new slip by "Employee Code" or "South Eastern Coalfields"
    const isNewSlip=line.includes('Employee Code')&&line.includes('Name');
    
    if(isNewSlip&&block.length>5){
      // Previous block is complete
      const slip=psParseBlock(block);
      if(slip&&slip.eid)slips.push(slip);
      block=[line];
    } else if(isSep&&block.length>15){
      // Check if this block has employee data
      const hasEmp=block.some(l=>l.includes('Employee Code'));
      const hasEarnings=block.some(l=>l.includes('BASIC')||l.includes('Basic'));
      if(hasEmp&&hasEarnings){
        block.push(line);
        const slip=psParseBlock(block);
        if(slip&&slip.eid)slips.push(slip);
        block=[];
      } else {
        block.push(line);
      }
    } else if(isSep&&block.length<=2){
      block=[line];
    } else {
      block.push(line);
    }
  }
  // Process remaining block
  if(block.length>5){
    const slip=psParseBlock(block);
    if(slip&&slip.eid)slips.push(slip);
  }
  return slips;
}

function psExtract(line,label){
  // Try multiple spacing patterns for PDF text
  const patterns=[label, label.replace(/\s+/g,'\\s*')];
  let idx=line.indexOf(label);
  if(idx===-1){
    // Try regex match for flexible spacing
    const re=new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'\\s*'));
    const m=line.match(re);
    if(m)idx=m.index;
  }
  if(idx===-1)return '';
  let start=idx+label.length;
  // Skip forward to find the label in original line
  while(start<line.length&&line[start]!==':')start++;
  start++; // skip ':'
  while(start<line.length&&line[start]===' ')start++;
  let end=start;
  while(end<line.length&&line[end]!=='!'&&line[end]!=='\r')end++;
  return line.substring(start,end).trim();
}

function psExtractVal(line,label){
  // Simpler extraction - find label then grab value after colon
  const idx=line.indexOf(label);
  if(idx===-1)return '';
  const afterLabel=line.substring(idx);
  const m=afterLabel.match(/:\s*([^!]+)/);
  return m?m[1].trim():'';
}

function psParseBlock(lines){
  const slip={};
  const v=(line,label)=>{
    const idx=line.indexOf(label);
    if(idx===-1)return '';
    const after=line.substring(idx+label.length);
    const m=after.match(/:\s*([^!]*)/);
    return m?m[1].trim():'';
  };
  
  // Join all lines to also do full-text search
  const fullText=lines.join('\n');
  
  for(const line of lines){
    // Clean line — remove leading ! for matching
    const cl=line.replace(/^[!\s]+/,'');
    if(line.includes('Employee Code')&&!slip.eid)slip.eid=v(line,'Employee Code');
    if(line.includes('Name')&&line.includes(':')&&!slip.name){const m=line.match(/Name\s*:([^!]*)/);if(m)slip.name=m[1].trim().replace(/\s+/g,' ');}
    if((line.includes('BASIC')||line.includes('Basic'))&&!line.includes('Qtr. Bon Bas')){
      // Prefer BASIC (earnings, higher value) over Basic (header, daily rate)
      const val=v(line,'BASIC')||v(line,'Basic');
      if(val){
        const num=parseFloat(val.replace(/,/g,''));
        const existing=parseFloat((slip.basic||'0').replace(/,/g,''));
        if(num>existing)slip.basic=val;
      }
    }
    if(line.includes('Leave Encas'))slip.leaveEncash=v(line,'Leave Encas');
    if(line.includes('South Eastern'))slip.company='South Eastern Coalfields';
    if(line.includes('Area')&&line.includes(':')&&!slip.area&&!line.includes('Pay Area'))slip.area=v(line,'Area');
    if(line.includes('Designation')&&!slip.designation)slip.designation=v(line,'Designation');
    if(line.includes('VDA Rate(Prev)'))slip.vdaPrev=v(line,'VDA Rate(Prev)');
    if(line.includes('VDA')&&line.includes(':')&&!slip.vda&&!line.includes('VDA Rate')){
      slip.vda=v(line,'VDA');
    }
    if(line.includes('Bank A/c'))slip.bankAc=v(line,'Bank A/c');
    if(line.includes('Aadhar No'))slip.aadhar=v(line,'Aadhar No');
    if(line.includes('Unit')&&line.includes(':')&&!slip.unit)slip.unit=v(line,'Unit');
    if(line.includes('Department')&&!slip.department)slip.department=v(line,'Department');
    if(line.includes('VDA Rate(Curr)'))slip.vdaCurr=v(line,'VDA Rate(Curr)');
    if(line.includes('Emp. Type')||line.includes('Emp.Type')){if(!slip.empType)slip.empType=v(line,'Emp. Type')||v(line,'Emp.Type');}
    if(line.includes('CMPF No'))slip.cmpf=v(line,'CMPF No');
    if(line.includes('Pay Area')&&!slip.payArea)slip.payArea=v(line,'Pay Area');
    if(line.includes('Grade')&&!slip.grade)slip.grade=v(line,'Grade');
    if(line.includes('UGA Code'))slip.ugaCode=v(line,'UGA Code');
    if(line.includes('Incr. Date')||line.includes('Incr.Date'))slip.incrDate=v(line,'Incr. Date')||v(line,'Incr.Date');
    if(line.includes('PAN No'))slip.pan=v(line,'PAN No');
    if(line.includes('Month-Yr')&&line.includes(':')&&!slip.monthYr)slip.monthYr=v(line,'Month-Yr');
    if(line.includes('Month-Yr')&&!slip.monthYr){const m=line.match(/Month-Yr\s*:([^!]*)/);if(m)slip.monthYr=m[1].trim();}
    if(line.includes('Bank')&&line.includes(':')&&!line.includes('Bank A/c')&&!slip.bank)slip.bank=v(line,'Bank');
    if(line.includes('OT Code'))slip.otCode=v(line,'OT Code');
    if(line.includes('OT CODE'))slip.otCode=v(line,'OT CODE');
    if(line.includes('TS Rate'))slip.tsRate=v(line,'TS Rate');
    if(line.includes('Union Name'))slip.union=v(line,'Union Name');
    if(line.includes('LTC Date'))slip.ltcDate=v(line,'LTC Date');
    if(line.includes('Bharat Bhraman'))slip.bharatBhraman=v(line,'Bharat Bhraman');
    if(line.includes('EL Due'))slip.elDue=v(line,'EL Due');
    if(line.includes('CL Due')&&!line.includes('CL Du'))slip.clDue=v(line,'CL Due');
    if((line.includes('CL Du')&&!slip.clDue))slip.clDue=v(line,'CL Du');
    if(line.includes('SL/HPL Due'))slip.slDue=v(line,'SL/HPL Due');
    if(line.includes('Prov. DOB'))slip.dob=v(line,'Prov. DOB');
    if(line.includes('Daily Rated'))slip.dailyRated=v(line,'Daily Rated Empl');
    // Earnings fields
    if(line.includes('SDA')&&!slip.sda)slip.sda=v(line,'SDA');
    if(line.includes('TRNS.SUB'))slip.transSub=v(line,'TRNS.SUB.');
    if(line.includes('WASH. ALLW'))slip.washAllw=v(line,'WASH. ALLW');
    if(line.includes('NIGHT ALLW'))slip.nightAllw=v(line,'NIGHT ALLW');
    if(line.includes('WEEK OFF'))slip.weekOff=v(line,'WEEK OFF');
    if(line.includes('OVERTIME')&&!slip.overtime)slip.overtime=v(line,'OVERTIME');
    if(line.includes('SPL ALLW')||line.includes('SPL  ALLW'))slip.splAllw=v(line,'SPL ALLW')||v(line,'SPL  ALLW');
    if(line.includes('GAS CYLINDE'))slip.gasCyl=v(line,'GAS CYLINDE');
    if(line.includes('UG ALLW'))slip.ugAllw=v(line,'UG ALLW');
    if(line.includes('Gross Sal'))slip.grossSal=v(line,'Gross Sal');
    if(line.includes('Total Sal'))slip.totalSal=v(line,'Total Sal');
    if(line.includes('Total Inc'))slip.totalInc=v(line,'Total Inc');
    if(line.includes('Tax Payable'))slip.taxPayable=v(line,'Tax Payable');
    if(line.includes('Cess+Surchrg'))slip.cess=v(line,'Cess+Surchrg');
    if(line.includes('TaxDed SoFar'))slip.taxDedSoFar=v(line,'TaxDed SoFar');
    // Deduction fields
    if(line.includes('CMPF')&&line.includes(':')&&!line.includes('CMPF No')&&!slip.cmpfDed)slip.cmpfDed=v(line,'CMPF');
    if(line.includes('CMPS')&&!slip.cmps)slip.cmps=v(line,'CMPS');
    if(line.includes('LIC PREMIUM'))slip.licPremium=v(line,'LIC PREMIUM');
    if(line.includes('INC TAX'))slip.incTax=v(line,'INC TAX');
    if(line.includes('ELEC CHRG'))slip.elecChrg=v(line,'ELEC CHRG');
    if(line.includes('MANDIR DEDN'))slip.mandirDedn=v(line,'MANDIR DEDN');
    if(line.includes('MISC DEDU'))slip.miscDedu=v(line,'MISC DEDU');
    // Bottom summaries
    if(line.includes('Total Gross')&&line.includes('PF Gross')){
      slip.totalGross=v(line,'Total Gross');slip.pfGross=v(line,'PF Gross');
      slip.pfCumulative=v(line,'PF Cumulative');slip.taxGross=v(line,'Tax Gross');
      slip.qtrBonBas=v(line,'Qtr. Bon Bas');
      if(line.includes('CPRMSNE'))slip.cprmsneGrs=v(line,'CPRMSNE GRS');
    }
    if(line.includes('Total Deduction')&&line.includes('Yearly Gross')){
      slip.totalDed=v(line,'Total Deduction');slip.yearlyGross=v(line,'Yearly Gross');
      slip.yearlyTaxGross=v(line,'Yearly Tax Gross');slip.yearlyPF=v(line,'Yearly PF');
      slip.qtrBonDay=v(line,'Qtr. Bon Day');
      if(line.includes('Block St'))slip.blockStDt=v(line,'Block St.Dt.');
    }
    if(line.includes('Net Pay')){
      slip.netPay=v(line,'Net Pay');
      if(line.includes('Yearly LIC'))slip.yearlyLIC=v(line,'Yearly LIC');
      if(line.includes('Yearly Pension'))slip.yearlyPension=v(line,'Yearly Pension');
      if(line.includes('Yearly VPF'))slip.yearlyVPF=v(line,'Yearly VPF');
      if(line.includes('Qtr. Bonus'))slip.qtrBonus=v(line,'Qtr. Bonus');
      if(line.includes('Block En'))slip.blockEnDt=v(line,'Block En.Dt.');
    }
  }
  // Attendance - keep ALL parts including empty ones for correct column mapping
  slip.attendance={};
  // Find ORIGINAL attendance header and Curr line (before tab normalization)
  // We stored original block lines, but they're already tab-normalized
  // Use character-position mapping: header ! positions define column boundaries
  // Then map Curr line values to nearest header column
  
  let hdrLine='',currLine='',subLine='';
  for(let li=0;li<lines.length;li++){
    if(lines[li].includes('ATTD')&&lines[li].includes('Off Days')){
      hdrLine=lines[li]; subLine=lines[li+1]||'';
      for(let j=li+2;j<Math.min(li+8,lines.length);j++){
        if(lines[j].includes('Curr')&&!lines[j].includes('VDA Rate')){currLine=lines[j];break;}
      }
      break;
    }
  }
  if(hdrLine&&currLine){
    // Extract column names from header by splitting between ! marks
    const hParts=hdrLine.split('!');
    const cParts=currLine.split('!');
    
    // Build sub-header labels too
    const sParts=subLine?subLine.split('!'):[];
    
    // Build combined column names: header + sub-header
    // Headers: [empty, Month-Yr, ATTD, Off Days, EL, CL, SL, HPL, SPL, CML, Other, ABS, UG, NS, LV, Chg, Sunday, Sunday, Holi, Holi, OT, OT, Paid Days]
    // Sub-hdr: [empty, empty, empty, WO/HO, empty, empty, ...]
    const colNames=[];
    for(let i=0;i<hParts.length;i++){
      let name=hParts[i].replace(/\t/g,' ').trim();
      let sub=sParts[i]?sParts[i].replace(/\t/g,' ').trim():'';
      if(sub&&!name)name=sub;
      colNames.push(name.toUpperCase());
    }
    
    // Curr line always has 1 extra column (Off Days → WO + HO)
    // Map curr parts to attendance fields using known order
    // Approach: The right side (from PaidDays backwards) is always aligned
    // So map from the RIGHT side
    
    // Known column order from RIGHT: Paid Days, OT Due, OT Paid, Holi Double, Holi Single, Sunday Double, Sunday Single, Chg, LV, NS, UG, ABS, Other, CML, SPL, HPL, SL, CL, EL, HO, WO, ATTD, Curr/Month-Yr
    const rightOrder=['paidDays','otDue','otPaid','holDouble','holSingle','sunDouble','sunSingle','chgHr','lvEnc','nsDays','ugDays','absDays','other','cml','spl','hpl','sl','cl','el','hoDay','woDay','attd'];
    
    const att={};
    const vals=cParts.map(p=>p.replace(/\t/g,' ').trim());
    // Remove trailing empty
    while(vals.length&&!vals[vals.length-1])vals.pop();
    // Remove leading empty and 'Curr'
    // Map from end
    for(let ri=0;ri<rightOrder.length&&ri<vals.length;ri++){
      att[rightOrder[ri]]=vals[vals.length-1-ri]||'';
    }
    slip.attendance=att;
  }
  // Earnings, Deductions, Form16
  slip.earnings=[];slip.deductions=[];slip.form16=[];
  let inED=false;
  for(const line of lines){
    if(line.includes('E A R N I N G S')||line.includes('EARNINGS'))inED=true;
    if(line.includes('Total Gross')&&line.includes('PF Gross'))inED=false;
    if(inED&&(line.startsWith('!')||line.match(/^[A-Z]/))){
      const parts=line.split('!').filter(p=>p.length>1);
      const f16Names=/Ann Reg Inc|Ann Irr Inc|Prev Inc|Annual Perk|Gross Sal|Exem U\/S|Total Sal|Aggrg|Ded S24|Total Inc|Tax Payable|Cess|TaxDed|Net Pay|NIGHT ALLW/i;
      if(parts.length>=1){const em=parts[0].trim().match(/^(\S[\s\S]*?)\s*:\s*([\d,.-]+)\s*([\d,.-]+)?/);if(em&&parseFloat(em[2].replace(/,/g,''))!==0&&!f16Names.test(em[1])){const arrear=em[3]&&parseFloat(em[3].replace(/,/g,''))!==0?em[3].trim():'';slip.earnings.push({name:em[1].trim(),amount:em[2].trim(),arrear:arrear});}}
      for(let pi=1;pi<parts.length;pi++){
        const dp=parts[pi].trim();const dm=dp.match(/^(\S[\s\S]*?)\s*:\s*([\d,.-]+)/);
        if(dm&&parseFloat(dm[2].replace(/,/g,''))!==0){
          const dn=dm[1].trim();
          if(dn.match(/CMPF|CMPS|LIC|TAX|DEDN|DEDU|COURT|CINEMA|ELEC|CLUB|BOND|HRR|CMOAI|MTBOND|MANDIR|MISC|ITAX|CPRMSNE|CHRG/i))slip.deductions.push({name:dn,amount:dm[2].trim()});
        }
      }
      const f16m=line.match(/(Ann Reg Inc|Ann Irr Inc|Prev Inc|Annual Perk|Gross Sal|Exem U\/S 10|Total Sal|Aggrg Ded|Ded S24 Int|Aggrg Ch VI|Total Inc|Tax Payable|Cess\+Surchrg|TaxDed SoFar)\s*:\s*([\d,.-]+)/);
      if(f16m)slip.form16.push({name:f16m[1].trim(),amount:f16m[2].trim()});
    }
  }
  // Pay point
  for(const line of lines){const m=line.match(/Pay_point:\s*(\S+)/);if(m)slip.payPoint=m[1];}
  // Also check last line for Pay point
  for(const line of lines){const m=line.match(/Pay\s*point:\s*(\S+)/);if(m)slip.payPoint=m[1];}
  if(!slip.payPoint&&slip.eid){const emp=S.emps.find(e=>e.i===slip.eid);if(emp)slip.payPoint=emp.p;}
  
  // Build earnings from individual fields if earnings array is sparse
  const earningsMap={};
  (slip.earnings||[]).forEach(e=>{earningsMap[e.name]=e.amount;});
  const earningsFields=[
    ['BASIC',slip.basic],['VDA',slip.vda],['SDA',slip.sda],
    ['TRNS.SUB.',slip.transSub],['WASH. ALLW',slip.washAllw],['NIGHT ALLW',slip.nightAllw],
    ['WEEK OFF',slip.weekOff],['OVERTIME',slip.overtime],['SPL ALLW',slip.splAllw],
    ['GAS CYLINDE',slip.gasCyl],['UG ALLW',slip.ugAllw]
  ];
  earningsFields.forEach(([name,val])=>{
    if(val&&!earningsMap[name]){
      const num=parseFloat(val.replace(/,/g,''));
      if(num>0){slip.earnings.push({name,amount:val});earningsMap[name]=val;}
    }
  });
  
  // Build deductions from individual fields
  const dedMap={};
  (slip.deductions||[]).forEach(d=>{dedMap[d.name]=d.amount;});
  const dedFields=[
    ['CMPF',slip.cmpfDed],['CMPS',slip.cmps],['LIC PREMIUM',slip.licPremium],
    ['INC TAX',slip.incTax],['ELEC CHRG',slip.elecChrg],
    ['MANDIR DEDN',slip.mandirDedn],['MISC DEDU',slip.miscDedu]
  ];
  dedFields.forEach(([name,val])=>{
    if(val&&!dedMap[name]){
      const num=parseFloat(val.replace(/,/g,''));
      if(num>0){slip.deductions.push({name,amount:val});dedMap[name]=val;}
    }
  });
  
  return slip;
}

function psReadSlipExcel(wb){
  const slips=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<10)return;
    const slip={earnings:[],deductions:[],form16:[],attendance:{}};
    let section='details';
    
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      const c0=String(r[0]||'').trim();
      const c1=String(r[1]||'').trim();
      const c2=String(r[2]||'').trim();
      const c3=String(r[3]||'').trim();
      const c4=String(r[4]||'').trim();
      const c5=String(r[5]||'').trim();
      const c6=String(r[6]||'').trim();
      const c7=String(r[7]||'').trim();
      
      // Skip empty rows
      if(!c0&&!c1&&!c2&&!c3)continue;
      
      // Section markers
      if(c0==='ATTENDANCE'){section='attendance';continue;}
      if(c0==='SUMMARY'){section='summary';continue;}
      // Earnings section header (row with just "EARNINGS" padded with spaces)
      if(c0.startsWith('EARNINGS')&&!c1&&!c3){continue;}
      // Earnings column header: EARNINGS|Amount|''|DEDUCTIONS|Amount
      if(c0==='EARNINGS'&&c1==='Amount'){section='earnings';continue;}
      
      // Header: "South Eastern Coalfields — FEB-2026"
      if(c0.includes('South Eastern')||c0.includes('SOUTH EASTERN')){
        const mm=c0.match(/(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[\s\-]*(\d{4})/i);
        if(mm)slip.monthYr=mm[1].toUpperCase()+'-'+mm[2];
        else if(c3)slip.monthYr=c3;
        continue;
      }
      
      // Name+EID row: "FEKU LAL . (22497747)"
      if(c0.match(/\(\d{8}\)/)&&!c1){
        const em=c0.match(/(.+?)\s*\((\d{8})\)/);
        if(em){slip.name=em[1].trim();slip.eid=em[2];}
        continue;
      }
      
      if(section==='details'){
        // 8-col: [Label,Value,'',Label,Value,'',Label,Value]
        const pairs=[];
        if(c0&&c1!==undefined)pairs.push([c0,c1]);
        if(c2&&c3!==undefined)pairs.push([c2,c3]);
        if(c4&&c5!==undefined)pairs.push([c4,c5]);
        if(c6&&c7!==undefined)pairs.push([c6,c7]);
        
        const map={'Employee Code':'eid','Name':'name','Area':'area','Designation':'designation',
          'Unit':'unit','Department':'department','Pay Area':'payArea','Grade':'grade',
          'Month-Yr':'monthYr','Bank':'bank','LTC Date':'ltcDate','Bharat Bhraman':'bharatBhraman',
          'Basic':'basic','Basic (Daily)':'basic','Leave Encash':'leaveEncash','Leave Encas':'leaveEncash',
          'VDA Rate(Prev)':'vdaPrev','Bank A/c':'bankAc','VDA Rate(Curr)':'vdaCurr',
          'Aadhar No':'aadhar','Emp. Type':'empType','CMPF No':'cmpfNo',
          'UGA Code':'ugaCode','Incr. Date':'incrDate','OT Code':'otCode','TS Rate':'tsRate',
          'PAN No':'pan','Prov. DOB':'dob','EL Due':'elDue','CL Due':'clDue','SL/HPL Due':'slDue',
          'Pay Point':'payPoint'};
        
        pairs.forEach(p=>{if(map[p[0]])slip[map[p[0]]]=p[1];});
      }
      else if(section==='attendance'){
        // 8-col pairs: [c0,c1], [c2,c3], [c4,c5], [c6,c7]
        const aMap={'ATTD':'attd','Off Days (WO)':'woDay','Off Days (HO)':'hoDay',
          'EL':'el','CL':'cl','SL':'sl','HPL':'hpl','SPL':'spl','CML':'cml',
          'Other':'other','ABS':'absDays','UG Days':'ugDays','NS Days':'nsDays',
          'LV Enc':'lvEnc','Chg Hr':'chgHr','Sunday Single':'sunSingle',
          'Sunday Double':'sunDouble','Holi Single':'holSingle','Holi Double':'holDouble',
          'OT Paid':'otPaid','OT Due':'otDue','Paid Days':'paidDays'};
        
        for(let pi=0;pi<8;pi+=2){
          const label=String(r[pi]||'').trim();
          const val=String(r[pi+1]||'').trim();
          if(label&&aMap[label])slip.attendance[aMap[label]]=val;
        }
      }
      else if(section==='earnings'){
        // c0=earning name, c1=amount, c2=arrear, c3=deduction name, c4=amount, c5=f16 name, c6=f16 amount
        if(c0&&c1)slip.earnings.push({name:c0,amount:c1,arrear:c2||''});
        if(c3&&c4)slip.deductions.push({name:c3,amount:c4});
        if(c5&&c6)slip.form16.push({name:c5,amount:c6});
      }
      else if(section==='summary'){
        const sMap={'Total Gross':'totalGross','PF Gross':'pfGross','PF Cumulative':'pfCumulative',
          'Tax Gross':'taxGross','Net Pay':'netPay','Total Deduction':'totalDed',
          'Yearly Gross':'yearlyGross','Yearly Tax Gross':'yearlyTaxGross',
          'Yearly PF':'yearlyPF','Yearly LIC':'yearlyLIC','Yearly Pension':'yearlyPension',
          'Pay Point':'payPoint'};
        
        for(let pi=0;pi<8;pi+=2){
          const label=String(r[pi]||'').trim();
          const val=String(r[pi+1]||'').trim();
          if(label&&sMap[label])slip[sMap[label]]=val;
        }
      }
    }
    
    if(!slip.eid){const m=sn.match(/(\d{8})/);if(m)slip.eid=m[1];}
    if(slip.eid)slips.push(slip);
  });
  return slips;
}

// ═══════ CHARGING vs SAP ATTENDANCE MATCHER ═══════
let chgMatchData = [];

async function chgMatchRun(){
  const chgFile = document.getElementById('chg-match-charging')?.files[0];
  const attFile = document.getElementById('chg-match-att')?.files[0];
  const el = document.getElementById('chg-match-results');
  const dlBtn = document.getElementById('chg-match-dl-btn');
  if(!chgFile) return alert('Charging file select karo!');
  if(!attFile) return alert('SAP Attendance file select karo!');
  el.innerHTML = '<div style="color:#a5b4fc;padding:8px">Processing...</div>';
  dlBtn.style.display='none';
  try{
    const [chgRows, attRows] = await Promise.all([readXLSX(chgFile), readXLSX(attFile)]);
    if(!chgRows.length) return el.innerHTML='<div style="color:#f87171">Charging file mein data nahi mila!</div>';
    if(!attRows.length) return el.innerHTML='<div style="color:#f87171">Attendance file mein data nahi mila!</div>';

    // Build SAP attendance lookup: eid -> { "DD.MM.YYYY" -> code }
    const attHeaders = Object.keys(attRows[0]);
    const attEidCol = attHeaders.find(h=>/employee.?id|emp.?id/i.test(h)) || attHeaders[1];
    const attDateCols = attHeaders.filter(h=>/^\d{2}\.\d{2}\.\d{4}$/.test(h));
    const attLookup = {};
    attRows.forEach(row=>{
      const eid = String(row[attEidCol]||'').trim();
      if(!eid||eid==='Employee ID') return;
      attLookup[eid] = {};
      attDateCols.forEach(dc=>{
        const code = String(row[dc]||'').trim();
        if(code) attLookup[eid][dc] = code;
      });
    });

    // Present codes
    const presentCodes = new Set(['P','U','S','HD','HE','WE','P*','U*','S*','O/T']); // HN removed — HN is absence, chain nahi tootegi

    // Parse charging rows
    const chgHeaders = Object.keys(chgRows[0]);
    const eidCol = chgHeaders.find(h=>/employee.?id|emp.?id/i.test(h)) || 'Employee ID';
    const nameCol = chgHeaders.find(h=>/name/i.test(h)) || 'Employee Name';
    const dateCol = chgHeaders.find(h=>/start.?date|date/i.test(h)) || 'Start Date';
    const desigCol = chgHeaders.find(h=>/desig/i.test(h)) || 'Designation';
    const hrsCol = chgHeaders.find(h=>/hour|hrs/i.test(h)) || 'Charging Hours';

    chgMatchData = [];
    let ok=0, mismatch=0, notfound=0;

    chgRows.forEach(row=>{
      const eid = String(row[eidCol]||'').trim();
      const name = String(row[nameCol]||'').trim();
      const dateRaw = String(row[dateCol]||'').trim();
      const desig = String(row[desigCol]||'').trim();
      const hrs = parseFloat(row[hrsCol])||0;
      if(!eid||!dateRaw||isNaN(hrs)||hrs===0) return;
      if(!/^\d{2}\.\d{2}\.\d{4}$/.test(dateRaw)) return;

      const empAtt = attLookup[eid];
      if(!empAtt){
        chgMatchData.push({eid,name,desig,date:dateRaw,hrs,sapCode:'EMP NOT FOUND',status:'notfound'});
        notfound++; return;
      }
      const sapCode = empAtt[dateRaw] || '';
      const isPresent = presentCodes.has(sapCode);
      if(!sapCode){
        chgMatchData.push({eid,name,desig,date:dateRaw,hrs,sapCode:'BLANK',status:'mismatch'});
        mismatch++;
      } else if(!isPresent){
        chgMatchData.push({eid,name,desig,date:dateRaw,hrs,sapCode,status:'mismatch'});
        mismatch++;
      } else {
        chgMatchData.push({eid,name,desig,date:dateRaw,hrs,sapCode,status:'ok'});
        ok++;
      }
    });

    // Sort: mismatches first
    chgMatchData.sort((a,b)=>{
      if(a.status!==b.status) return a.status==='ok'?1:-1;
      return a.date.localeCompare(b.date)||a.name.localeCompare(b.name);
    });

    // Render
    let h='';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
    h+='<div style="padding:8px 14px;border-radius:8px;background:rgba(34,197,94,.1);text-align:center"><div style="font-size:18px;font-weight:800;color:#22c55e">'+ok+'</div><div style="font-size:8px;color:#94a3b8">Sahi</div></div>';
    h+='<div style="padding:8px 14px;border-radius:8px;background:rgba(239,68,68,.1);text-align:center"><div style="font-size:18px;font-weight:800;color:#ef4444">'+mismatch+'</div><div style="font-size:8px;color:#94a3b8">Mismatch</div></div>';
    if(notfound) h+='<div style="padding:8px 14px;border-radius:8px;background:rgba(245,158,11,.1);text-align:center"><div style="font-size:18px;font-weight:800;color:#f59e0b">'+notfound+'</div><div style="font-size:8px;color:#94a3b8">Not Found</div></div>';
    h+='</div>';

    if(!mismatch && !notfound){
      h+='<div style="padding:12px;background:rgba(34,197,94,.08);border-radius:8px;color:#22c55e;font-weight:700;font-size:12px">Sab sahi hai! Koi mismatch nahi mila.</div>';
    } else {
      const mismatches = chgMatchData.filter(r=>r.status!=='ok');
      h+='<div style="font-size:10px;font-weight:700;color:#ef4444;margin-bottom:6px">Mismatch — Charging diya lekin SAP attendance nahi ('+mismatches.length+' entries):</div>';
      h+='<div style="max-height:320px;overflow-y:auto;border-radius:8px;border:1px solid rgba(239,68,68,.15)">';
      h+='<table style="width:100%;border-collapse:collapse;font-size:9px">';
      h+='<thead><tr style="background:rgba(239,68,68,.08);position:sticky;top:0;z-index:1">';
      ['Employee','Date','Hrs','SAP Code','Status'].forEach(th=>{
        h+='<th style="padding:5px;text-align:'+(th==='Employee'?'left':'center')+';color:#94a3b8">'+th+'</th>';
      });
      h+='</tr></thead><tbody>';
      mismatches.forEach(r=>{
        const sc = r.status==='notfound'?'#f59e0b':'#ef4444';
        const st = r.status==='notfound'?'Not in SAP':'No Attendance';
        h+='<tr style="border-bottom:1px solid rgba(255,255,255,.025)">';
        h+='<td style="padding:4px 5px"><div style="font-weight:600;color:#e2e8f0">'+r.name+'</div><div style="font-size:8px;color:#4b5563">'+r.eid+' · '+r.desig+'</div></td>';
        h+='<td style="padding:4px;text-align:center;color:#f59e0b;font-weight:700">'+r.date+'</td>';
        h+='<td style="padding:4px;text-align:center;color:#818cf8">'+r.hrs+'</td>';
        h+='<td style="padding:4px;text-align:center;font-family:monospace;font-weight:700;color:'+(r.sapCode==='BLANK'?'#64748b':'#f87171')+'">'+r.sapCode+'</td>';
        h+='<td style="padding:4px;text-align:center"><span style="font-size:8px;padding:2px 6px;border-radius:4px;background:rgba(239,68,68,.12);color:'+sc+';font-weight:700">'+st+'</span></td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
    el.innerHTML = h;
    if(chgMatchData.length) dlBtn.style.display='inline-block';
  } catch(err){ el.innerHTML='<div style="color:#f87171">Error: '+err.message+'</div>'; }
}

    chgRenderCalendar();
    toast('Sab employees complete! Ab Download All ZIP dabaao.');
  }
}

async function chgDownloadAllZip(){
  if(!Object.keys(chgBulkData).length) return alert('Koi employee save nahi hua!');
  try{
    // Dynamically load JSZip if not loaded
    if(typeof JSZip==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    const zip=new JSZip();
    const mon=S.mon; const yr=S.yr;
    Object.values(chgBulkData).forEach(({emp,rows,filename})=>{
      const wb=XLSX.utils.book_new();
      const ws=XLSX.utils.json_to_sheet(rows);

      const xlsxBuf=XLSX.write(wb,{type:'array',bookType:'xlsx'});

    const a=document.createElement('a');

function logDownload(){
  if(!actLog.length){alert('No activity to download!');return;}
  
  // Helper: convert YYYY-MM-DD to DD.MM.YYYY
  function fmtDate(ds){
    if(!ds)return'';
    const m=ds.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m)return m[3]+'.'+m[2]+'.'+m[1];
    return ds;
  }
  
  // Helper: list all dates from-to as DD.MM.YYYY
  function dateRange(from,to){
    if(!from)return'';
    if(!to||from===to)return fmtDate(from);
    const dates=[];
    const f=new Date(from+'T00:00:00');
    const t=new Date(to+'T00:00:00');
    const d=new Date(f);
    while(d<=t){dates.push(fmtDate(fD(d)));d.setDate(d.getDate()+1);}
    return dates.join(', ');
  }
  
  const rows=actLog.map((l,i)=>{
    let empName='',empId='',code='',dates='';
    const detail=l.detail||'';
    const action=l.action||'';
    
    // Parse Leave Apply: "NAME (ID) → CODE from YYYY-MM-DD to YYYY-MM-DD"
    const mLv=detail.match(/^(.+?)\s*\((\d+)\)\s*→\s*(\S+)\s+from\s+(\S+)\s+to\s+(\S+)/);
    if(mLv){
      empName=mLv[1].trim();empId=mLv[2];code=mLv[3];dates=dateRange(mLv[4],mLv[5]);
    }
    
    // Parse Leave Delete / Delete Entry: "NAME (ID) — CODE from DATE to DATE" or "NAME (ID) — code CODE from DATE to DATE"
    if(!empName){
      const mDl=detail.match(/^(.+?)\s*\((\d+)\)\s*—\s*(?:code\s+)?(\S+)\s+from\s+(\S+)\s+to\s+(\S+)/);
      if(mDl){empName=mDl[1].trim();empId=mDl[2];code=mDl[3];dates=dateRange(mDl[4],mDl[5]);}
    }
    
    // Parse single Attendance: "ID_SN on YYYY-MM-DD: old → new"
    if(!empName){
      const mAt=detail.match(/^(\S+?)\s+on\s+(\S+):\s+\S+\s*→\s*(\S*)/);
      if(mAt){
        const parts=mAt[1].split('_');
        empId=parts[0]||'';
        const emp=S.emps.find(e=>e.i===empId);
        empName=emp?emp.n:'';
        code=mAt[3]||'cleared';
        dates=fmtDate(mAt[2]);
      }
    }
    
    // Parse Add/Remove Employee: "NAME (ID)"
    if(!empName&&(action==='Add Employee'||action==='Remove Employee')){
      const mEmp=detail.match(/^(.+?)\s*\((\d+)\)/);
      if(mEmp){empName=mEmp[1].trim();empId=mEmp[2];}
    }
    
    // Parse Bulk Mark: "N employees → CODE on YYYY-MM-DD"
    if(!empName&&action==='Bulk Mark'){
      const mBk=detail.match(/→\s*(\S+)\s+on\s+(\S+)/);
      if(mBk){code=mBk[1];dates=fmtDate(mBk[2]);}
      empName='(Bulk)';
    }
    
    return{
      'SN':i+1,
      'Date & Time':l.time,
      'Action':action,
      'Employee Name':empName,
      'Employee ID':empId,
      'Code':code,
      'Dates':dates,
      'Extra':l.extra||''
    };
  });
  
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:20},{wch:16},{wch:26},{wch:12},{wch:6},{wch:50},{wch:18}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Activity Log');
  XLSX.writeFile(wb,`Activity_Log_${fD(new Date())}.xlsx`);
  toast('Activity log downloaded!');
}

function bioEntryRender(){
  const panel=document.getElementById('bio-entry-panel');
  if(!panel)return;
  
  const date=document.getElementById('bio-entry-date')?.value;
  const filter=document.getElementById('bio-entry-filter')?.value||'all';
  if(!date||!bioRawData[date]){panel.innerHTML='<div style="color:#4b5563;padding:8px;font-size:10px">No biometric data for this date</div>';return;}
  
  const dayData=bioRawData[date];
  const entries=bioEntryEntries[date]||{};
  
  // Build list of employees needing attention
  bioEntryList=[];
  S.emps.forEach(emp=>{
    const bd=dayData[emp.i];
    if(!bd)return;
    if(bd.status==='P'||bd.status==='U')return; // Already marked
    if(filter==='norecord'&&bd.status!=='norecord')return;
    if(filter==='skipped'&&bd.status!=='skip')return;
    if(filter==='short'&&bd.status!=='short')return;
    bioEntryList.push({eid:emp.i,name:emp.n,pp:ppN(emp.p),status:bd.status,inT:bd.inT,outT:bd.outT,entryCode:entries[emp.i]||''});
  });
  
  const totalNeed=bioEntryList.length;
  const doneCount=bioEntryList.filter(e=>e.entryCode).length;
  const pendCount=totalNeed-doneCount;
  
  // Progress

function bioEntryApply(code){
  if(!bioEntryList.length)return;
  const curr=bioEntryList[bioEntryIdx];
  const date=document.getElementById('bio-entry-date')?.value;
  if(!date)return;
  
  if(!bioEntryEntries[date])bioEntryEntries[date]={};
  
  if(code){
    bioEntryEntries[date][curr.eid]=code;
    // Also save to main attendance
    const emp=S.emps.find(e=>e.i===curr.eid);
    if(emp){
      const attKey=ek(emp)+'|'+date;
      S.att[attKey]=code;
    }
  } else {
    delete bioEntryEntries[date][curr.eid];
    const emp=S.emps.find(e=>e.i===curr.eid);
    if(emp){
      const attKey=ek(emp)+'|'+date;
      delete S.att[attKey];
    }
  }
  
  bioEntrySave();
  saveA();
  
  // Auto next to pending
  const nextPending=bioEntryList.findIndex((e,i)=>i>bioEntryIdx&&!e.entryCode&&e.eid!==curr.eid);
  if(nextPending>=0&&code){
    bioEntryIdx=nextPending;
  }
  
  toast(code?(code+' → '+curr.name):'Cleared '+curr.name);
  bioEntryRender();
}

function bioEntryNav(dir){
  bioEntryIdx+=dir;
  if(bioEntryIdx<0)bioEntryIdx=bioEntryList.length-1;
  if(bioEntryIdx>=bioEntryList.length)bioEntryIdx=0;
  bioEntryRender();
}

function bioEntrySkipToPending(){
  const next=bioEntryList.findIndex((e,i)=>i>bioEntryIdx&&!e.entryCode);
  if(next>=0){bioEntryIdx=next;}
  else{
    const first=bioEntryList.findIndex(e=>!e.entryCode);
    if(first>=0)bioEntryIdx=first;
    else toast('All done!');
  }
  bioEntryRender();
}

function bioEntryDownload(){
  const dates=Object.keys(bioEntryEntries).sort();
  const allDates=Object.keys(bioRawData).sort();
  if(!allDates.length)return alert('No biometric data processed yet!');
  
  // Collect ALL employees across all dates with their status and entry code
  const pRows=[],otherRows=[],norecRows=[],skipRows=[],shortRows=[];
  let sn={p:0,o:0,n:0,s:0,sh:0};
  
  allDates.forEach(date=>{
    const dayData=bioRawData[date]||{};
    const entries=bioEntryEntries[date]||{};
    const dp=date.split('-');
    const fmtDate=dp.length===3?(dp[2]+'.'+dp[1]+'.'+dp[0]):date;
    
    Object.entries(dayData).forEach(([eid,bd])=>{
      const emp=S.emps.find(e=>e.i===eid);
      if(!emp)return; // skip non-roster
      const md=mdData.length?mdData.find(m=>m.pid===eid):null;
      const desig=md?.pos||emp?.desig||'';
      const code=entries[eid]||'';
      const status=(bd.status||'').toLowerCase();
      
      const row={
        'Employee ID':eid,
        'Employee Name':emp?.n||eid,
        'Designation':desig,
        'Date':fmtDate,
        'IN Time':bd.inT||'--',
        'OUT Time':bd.outT||'--',
        'Status':bd.status||'',
        'Code':code,
        'Reason for Delay/Early Leaving':'',
        'Signature of Employee':'',
        'Signature of Controlling Officer':''
      };
      
      if(code==='P'||code==='P*'){
        sn.p++;row['SN']=sn.p;pRows.push(row);
      } else if(code&&code!==''){
        sn.o++;row['SN']=sn.o;otherRows.push(row);
      } else if(status==='norecord'||status==='no record'){
        sn.n++;row['SN']=sn.n;norecRows.push(row);
      } else if(status==='skipped'||status==='single'){
        sn.s++;row['SN']=sn.s;skipRows.push(row);
      } else if(status==='short'||status==='short duty'){
        sn.sh++;row['SN']=sn.sh;shortRows.push(row);
      }
    });
  });
  
  const wb=XLSX.utils.book_new();
  const cols=[{wch:4},{wch:13},{wch:26},{wch:18},{wch:12},{wch:8},{wch:8},{wch:12},{wch:6},{wch:28},{wch:22},{wch:26}];
  
  function addSheet(name,rows){
    if(!rows.length)rows=[{'SN':'','Employee ID':'No Data','Employee Name':'','Designation':'','Date':'','IN Time':'','OUT Time':'','Status':'','Code':''}];
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,name);
  }
  
  addSheet('P Marked ('+pRows.length+')',pRows);
  addSheet('Other Codes ('+otherRows.length+')',otherRows);
  addSheet('NO RECORD ('+norecRows.length+')',norecRows);
  addSheet('SKIPPED ('+skipRows.length+')',skipRows);
  addSheet('SHORT DUTY ('+shortRows.length+')',shortRows);
  
  XLSX.writeFile(wb,'Bio_Entry_Report.xlsx');
  const total=pRows.length+otherRows.length+norecRows.length+skipRows.length+shortRows.length;
  toast('Downloaded! P:'+pRows.length+' Other:'+otherRows.length+' NoRec:'+norecRows.length+' Skip:'+skipRows.length+' Short:'+shortRows.length);
}

let dlData=[];

function dlGenerate(){
  const minDays=parseInt(document.getElementById('dl-min')?.value)||3;
  const allDates=Object.keys(bioRawData).sort();
  const entryDates=Object.keys(bioEntryEntries).sort();
  
  if(!allDates.length)return alert('Pehle biometric files process karo!');
  
  // Collect all employees with P marked on NO RECORD/SKIPPED days
  const empIssues={};
  
  allDates.forEach(date=>{
    const dayData=bioRawData[date]||{};
    const entries=bioEntryEntries[date]||{};
    
    Object.entries(dayData).forEach(([eid,bd])=>{
      const status=(bd.status||'').toLowerCase();
      const code=entries[eid]||'';
      
      // Check: status is norecord/skipped AND code is P or P*
      const isIssue=(status==='norecord'||status==='no record'||status==='skipped'||status==='single')
                    &&(code==='P'||code==='P*');
      
      // Also check AMR data
      let amrIssue=false;
      if(typeof amrData!=='undefined'){
        Object.values(amrData).forEach(monthEntries=>{
          if(!Array.isArray(monthEntries))return;
          monthEntries.forEach(entry=>{
            if(entry.eid===eid&&entry.date===date)amrIssue=true;
          });
        });
      }
      
      if(isIssue||amrIssue){
        if(!empIssues[eid])empIssues[eid]={name:'',dates:[]};
        const emp=S.emps.find(e=>e.i===eid);
        empIssues[eid].name=emp?.n||bd.name||eid;
        
        const dp=date.split('-');
        const fmtDate=dp.length===3?(dp[2]+'.'+dp[1]+'.'+dp[0]):date;
        
        let issue='No Record';
        if(status==='skipped'||status==='single')issue=bd.inT?'No OUT':'No IN';
        
        empIssues[eid].dates.push({
          date:fmtDate,rawDate:date,
          inT:bd.inT||'--',outT:bd.outT||'--',
          status:bd.status||'',code,issue
        });
      }
    });
  });
  
  // Filter: only employees with >= minDays issues
  dlData=[];
  Object.entries(empIssues).forEach(([eid,data])=>{
    if(data.dates.length>=minDays){
      const emp=S.emps.find(e=>e.i===eid);
      const md=mdData.find(m=>m.pid===eid);
      dlData.push({
        eid,name:data.name,
        desig:emp?.desig||md?.pos||'',
        pp:emp?.p||'',
        dates:data.dates.sort((a,b)=>a.rawDate.localeCompare(b.rawDate))
      });
    }
  });
  
  dlData.sort((a,b)=>b.dates.length-a.dates.length);
  
  // Render results
  const el=document.getElementById('dl-results');if(!el)return;
  
  if(!dlData.length){
    el.innerHTML='<div style="color:#22c55e;font-size:11px;padding:8px">Koi employee nahi mila jiska '+minDays+'+ din mismatch ho!</div>';
    return;
  }
  
  // Split: 3+ din = serious, <3 din = short
  const seriousEmps = dlData.filter(e=>e.dates.length>=3);
  const shortEmps   = dlData.filter(e=>e.dates.length<3);

  let h='<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px">';
  h+='<span style="background:rgba(239,68,68,.15);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#ef4444">'+dlData.length+' employees</span>';
  if(seriousEmps.length) h+='<span style="background:rgba(239,68,68,.2);padding:3px 8px;border-radius:6px;font-size:10px;color:#ef4444">'+seriousEmps.length+' serious (3+ din)</span>';
  if(shortEmps.length) h+='<span style="background:rgba(245,158,11,.15);padding:3px 8px;border-radius:6px;font-size:10px;color:#f59e0b">'+shortEmps.length+' short (<3 din)</span>';
  if(shortEmps.length) h+='<button class="btn bp" style="font-size:9px;padding:3px 8px;background:linear-gradient(135deg,#b45309,#d97706)" onclick="dlPrintAllShort()">🖨️ Print All Short ('+shortEmps.length+')</button>';
  h+='</div>';

  // 3+ din wale UPAR
  if(seriousEmps.length){
    h+='<div style="font-size:10px;font-weight:700;color:#ef4444;margin-bottom:4px;padding:4px 8px;background:rgba(239,68,68,.07);border-radius:6px">⚠️ Serious — 3 din se zyada ('+seriousEmps.length+')</div>';
    seriousEmps.forEach((emp,i)=>{
      const gi=dlData.indexOf(emp);
      h+='<div class="cd" style="padding:10px;margin-bottom:6px;border-left:3px solid #ef4444">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px">';
      h+='<div><span style="font-weight:700;font-size:12px">'+emp.name+'</span> <span style="font-size:9px;color:#64748b">'+emp.eid+'</span></div>';
      h+='<div style="display:flex;gap:4px"><span style="background:rgba(239,68,68,.2);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#ef4444">'+emp.dates.length+' days</span>';
      h+='<button class="btn bg2" style="font-size:8px;padding:2px 6px" onclick="dlShowLetter('+gi+')">View</button>';
      h+='<button class="btn bp" style="font-size:8px;padding:2px 6px" onclick="dlPrintLetter('+gi+')">🖨️ Print</button></div>';
      h+='</div>';
      h+='<div style="font-size:9px;color:#94a3b8">'+emp.dates.map(d=>d.date+' ('+d.issue+')').join(' | ')+'</div>';
      h+='</div>';
    });
  }

  // 3 din se kam wale NEECHE
  if(shortEmps.length){
    h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px;margin-top:8px;padding:4px 8px;background:rgba(245,158,11,.07);border-radius:6px">📋 Short — 3 din se kam ('+shortEmps.length+') — Antim Chetavni</div>';
    shortEmps.forEach((emp,i)=>{
      const gi=dlData.indexOf(emp);
      h+='<div class="cd" style="padding:8px 10px;margin-bottom:4px;border-left:3px solid #f59e0b">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">';
      h+='<div><span style="font-weight:700;font-size:11px">'+emp.name+'</span> <span style="font-size:9px;color:#64748b">'+emp.eid+'</span></div>';
      h+='<div style="display:flex;gap:4px"><span style="background:rgba(245,158,11,.2);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#f59e0b">'+emp.dates.length+' days</span>';
      h+='<button class="btn bg2" style="font-size:8px;padding:2px 6px" onclick="dlShowShortLetter('+gi+')">View</button></div>';
      h+='</div>';
      h+='<div style="font-size:9px;color:#94a3b8">'+emp.dates.map(d=>d.date).join(', ')+'</div>';
      h+='</div>';
    });
  }

  el.innerHTML=h;
  toast(dlData.length+' employees with '+minDays+'+ days mismatch!');
}

function dlDownloadExcel(){
  if(!dlData.length)return alert('Pehle Generate Letters click karo!');
  
  const wb=XLSX.utils.book_new();
  
  // Sheet 1: Summary
  const summaryRows=[];
  dlData.forEach((emp,i)=>{
    summaryRows.push({
      'SN':i+1,'Employee ID':emp.eid,'Employee Name':emp.name,
      'Designation':emp.desig,'Pay Point':ppN(emp.pp),
      'Mismatch Days':emp.dates.length,
      'Dates':emp.dates.map(d=>d.date).join(', '),
      'Issues':emp.dates.map(d=>d.issue).join(', ')
    });
  });
  const ws1=XLSX.utils.json_to_sheet(summaryRows);
  ws1['!cols']=[{wch:4},{wch:13},{wch:26},{wch:22},{wch:14},{wch:10},{wch:40},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws1,'Summary ('+dlData.length+')');
  
  // Sheet 2: All Details
  const detailRows=[];
  let sn=0;
  dlData.forEach(emp=>{
    emp.dates.forEach(d=>{
      sn++;
      detailRows.push({
        'SN':sn,'Employee ID':emp.eid,'Employee Name':emp.name,
        'Designation':emp.desig,'Date':d.date,
        'IN Time':d.inT,'OUT Time':d.outT,
        'Issue':d.issue,'Code Marked':d.code,
        'Action Required':'Certify by Controlling Officer'
      });
    });
  });
  const ws2=XLSX.utils.json_to_sheet(detailRows);
  ws2['!cols']=[{wch:4},{wch:13},{wch:26},{wch:22},{wch:12},{wch:8},{wch:8},{wch:14},{wch:8},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws2,'Details ('+detailRows.length+')');
  
  XLSX.writeFile(wb,'Discrepancy_Letters_'+dlData.length+'_employees.xlsx');
  toast('Excel downloaded!');
}

function dlDownloadIndividualPDF(){
  if(!dlData.length)return alert('Pehle Excel se load karo!');
  
  // Rebuild as per-employee letters from date-wise data
  var empMap={};
  var empOrder=[];
  
  dlData.forEach(function(d){
    if(!d.date||!d.employees)return;
    d.employees.forEach(function(emp){
      if(!empMap[emp.eid]){
        empMap[emp.eid]={eid:emp.eid,name:emp.name,desig:emp.desig,pp:emp.pp,dates:[]};
        empOrder.push(emp.eid);
      }
      empMap[emp.eid].dates.push({
        date:d.date,rawDate:d.date,
        inT:emp.inT||'--',outT:emp.outT||'--',
        status:emp.status||'',code:emp.code||'',issue:emp.issue||''
      });
    });
  });
  
  var empList=empOrder.map(function(eid){return empMap[eid];});
  if(!empList.length)return alert('Koi employee nahi mila!');
  
  var w=window.open('','_blank','width=800,height=600');
  w.document.write('<html><head><title>Individual Letters - '+empList.length+' Employees</title>');
  w.document.write('<style>body{margin:0;padding:0}@media print{.page-break{page-break-before:always}body{padding:5px}}</style>');
  w.document.write('</head><body>');
  
  empList.forEach(function(emp,i){
    if(i>0)w.document.write('<div class="page-break"></div>');
    w.document.write(dlGetLetterHTML(emp,true));
  });
  
  w.document.write('</body></html>');
  w.document.close();
  setTimeout(function(){w.print();toast(empList.length+' individual letters!');},500);
}

function dlFromExcel(){
  const fileInput=document.getElementById('dl-excel');
  if(!fileInput||!fileInput.files[0])return alert('Excel file select karo!');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length)return alert('Excel mein data nahi hai!');
      
      const headers=Object.keys(rows[0]);
      const eidCol=headers.find(h=>h.match(/employee.*id|emp.*id|id|code/i))||headers[0];
      const nameCol=headers.find(h=>h.match(/employee.*name|emp.*name|name/i))||headers[1]||'';
      const desigCol=headers.find(h=>h.match(/designation|desig|post/i))||'';
      const dateCol=headers.find(h=>h.match(/date|din/i))||'';
      const inCol=headers.find(h=>h.match(/in.*time|in/i))||'';
      const outCol=headers.find(h=>h.match(/out.*time|out/i))||'';
      const statusCol=headers.find(h=>h.match(/status/i))||'';
      
      // Group by DATE
      const dateMap={};
      const dateOrder=[];
      
      rows.forEach(function(row){
        let eid=String(row[eidCol]||'').trim();
        if(eid.endsWith('.0'))eid=eid.slice(0,-2);
        if(!eid)return;
        
        const dateVal=dateCol?String(row[dateCol]||'').trim():'';
        if(!dateVal)return;
        
        const inT=inCol?String(row[inCol]||'').trim():'--';
        const outT=outCol?String(row[outCol]||'').trim():'--';
        const status=statusCol?String(row[statusCol]||'').trim():'';
        const name=nameCol?String(row[nameCol]||'').trim():eid;
        const desig=desigCol?String(row[desigCol]||'').trim():'';
        
        let issue='No Record';
        const st=status.toLowerCase();
        if(st.includes('short'))issue='Short Duty';
        else if(st.includes('skip')||st.includes('single')){
          issue=(inT&&inT!=='--'&&inT!=='Missing')?'No OUT':'No IN';
        } else if(st.includes('norec')||st.includes('no rec')){
          issue='No Record';
        } else {
          if((!inT||inT==='--')&&(!outT||outT==='--'))issue='No Record';
          else if(!outT||outT==='--')issue='No OUT';
          else if(!inT||inT==='--')issue='No IN';
          else issue='Short Duty';
        }
        
        if(!dateMap[dateVal]){
          dateMap[dateVal]=[];
          dateOrder.push(dateVal);
        }
        
        const emp=S.emps.find(function(e){return e.i===eid;});
        const md=mdData.find(function(m){return m.pid===eid;});
        
        dateMap[dateVal].push({
          eid,name:name||emp?.n||eid,
          desig:desig||emp?.desig||md?.pos||'',
          pp:emp?.p||'',
          inT:inT||'--',outT:outT||'--',
          status,issue
        });
      });
      
      // Build dlData - each entry is one DATE with multiple employees
      dlData=[];
      dateOrder.forEach(function(dt){
        dlData.push({
          date:dt,
          employees:dateMap[dt]
        });
      });
      
      const el=document.getElementById('dl-results');if(!el)return;
      if(!dlData.length){
        el.innerHTML='<div style="color:#f59e0b;font-size:11px;padding:8px">Koi data nahi mila.</div>';
        return;
      }
      
      const totalEmps=dlData.reduce(function(s,d){return s+d.employees.length;},0);
      let h='<div style="margin-bottom:6px"><span style="background:rgba(239,68,68,.15);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#ef4444">'+dlData.length+' dates</span> <span style="font-size:10px;color:#64748b">'+totalEmps+' entries from Excel</span></div>';
      
      dlData.forEach(function(d,i){
        h+='<div class="cd" style="padding:10px;margin-bottom:6px;border-left:3px solid #ef4444">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px">';
        h+='<div><span style="font-weight:700;font-size:13px;color:#f59e0b">'+d.date+'</span></div>';
        h+='<div style="display:flex;gap:4px"><span style="background:rgba(239,68,68,.2);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#ef4444">'+d.employees.length+' employees</span>';
        h+='<button class="btn bg2" style="font-size:8px;padding:2px 6px" onclick="dlShowDateLetter('+i+')">View Letter</button></div>';
        h+='</div>';
        h+='<div style="font-size:9px;color:#94a3b8">'+d.employees.map(function(e){return e.name;}).join(', ')+'</div>';
        h+='</div>';
      });
      el.innerHTML=h;
      toast(dlData.length+' dates loaded!');
      // Show date selector
      document.getElementById('dl-date-section').style.display='block';
      var dateDD=document.getElementById('dl-date-select');
      if(dateDD){
        var opts='<option value="all">All Dates ('+dlData.length+')</option>';
        dlData.forEach(function(d){
          opts+='<option value="'+d.date+'">'+d.date+' ('+d.employees.length+' employees)</option>';
        });
        dateDD.innerHTML=opts;
      }
      dlAllData=JSON.parse(JSON.stringify(dlData)); // Save full copy
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
}

// ═══════ SAP vs BIOMETRIC MATCHER ═══════
let sapMatchData=[];

async function sapMatch(){
  const f=document.getElementById('sap-file');
  if(!f||!f.files||!f.files[0])return alert('Upload SAP Excel file first!');
  
  const el=document.getElementById('sap-results');
  if(!el)return;
  el.innerHTML='<div style="padding:8px;color:#a5b4fc;font-size:10px">Processing...</div>';
  
  const rows=await readXLSX(f.files[0]);
  if(!rows.length)return el.innerHTML='<div style="color:#f87171;padding:8px">No data found in file!</div>';
  
  // Parse SAP file — detect format
  // Expect columns like: Employee ID, Name, 1, 2, 3, ... 31 (day columns with codes)
  const headers=Object.keys(rows[0]);
  
  // Find employee ID column
  const idCol=headers.find(h=>/employee.?id|emp.?id|eid|id/i.test(h))||headers[0];
  const nameCol=headers.find(h=>/name/i.test(h))||headers[1];
  
  // Find day columns (numeric 1-31)
  const dayCols={};
  headers.forEach(h=>{
    const n=parseInt(h);
    if(n>=1&&n<=31)dayCols[n]=h;
  });
  
  if(!Object.keys(dayCols).length){
    return el.innerHTML='<div style="color:#f87171;padding:8px">Cannot find day columns (1-31) in SAP file. Check format.</div>';
  }
  
  // Check which dates we have biometric data for
  const bioDates=Object.keys(bioRawData).sort();
  if(!bioDates.length){
    return el.innerHTML='<div style="color:#f87171;padding:8px">No biometric data saved. Process biometric files first (daily).</div>';
  }
  
  // Detect month/year — Priority: user selected month > SAP file dates > biometric dates
  let bioYr=0,bioMon=0;
  
  // 1. User selected month from UI (most reliable)
  const sapMonSel=document.getElementById('sap-month-sel');
  if(sapMonSel&&sapMonSel.value){
    const sp=sapMonSel.value.split('-');
    bioYr=parseInt(sp[0]);bioMon=parseInt(sp[1])-1;
  }
  
  // 2. Fallback: detect from biometric dates (use LATEST date to avoid Feb bleed)
  if(!bioYr){
    const latestBio=bioDates[bioDates.length-1];
    const dp=latestBio.split('-');
    bioYr=parseInt(dp[0]);bioMon=parseInt(dp[1])-1;
  }
  
  if(!bioYr)return el.innerHTML='<div style="color:#f87171;padding:8px">Month detect nahi hua. SAP month select karo upar se.</div>';
  
  const presentCodes=new Set(['P','P*','S','U','U*','HD','HE','OD']);
  sapMatchData=[];
  
  rows.forEach(row=>{
    const eid=String(row[idCol]||'').trim();
    if(!eid)return;
    const name=String(row[nameCol]||'').trim();
    const emp=S.emps.find(e=>e.i===eid);
    const md=mdData.length?mdData.find(m=>m.pid===eid):null;
    const desig=md?.pos||emp?.desig||'';
    
    Object.entries(dayCols).forEach(([day,col])=>{
      const sapCode=String(row[col]||'').trim();
      if(!sapCode)return;
      if(!presentCodes.has(sapCode))return; // Only check present codes
      
      // Build date string
      const dateStr=bioYr+'-'+String(bioMon+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      
      // Check biometric data for this date
      const dayData=bioRawData[dateStr];
      if(!dayData)return; // No bio data for this date
      
      const bd=dayData[eid];
      if(!bd)return;
      
      // Mismatch = SAP says present but bio says NO RECORD / SKIPPED / SHORT
      if(bd.status==='norecord'||bd.status==='skip'||bd.status==='short'){
        const bioStatus=bd.status==='norecord'?'NO RECORD':bd.status==='skip'?'SKIPPED':'SHORT DUTY';
        const fmtDate=String(day).padStart(2,'0')+'.'+String(bioMon+1).padStart(2,'0')+'.'+bioYr;
        
        sapMatchData.push({
          eid,name:name||emp?.n||eid,desig,
          date:fmtDate,dateStr,
          inTime:bd.inT||'--',
          outTime:bd.outT||'--',
          sapCode,bioStatus
        });
      }
    });
  });
  
  // Sort by date then employee
  sapMatchData.sort((a,b)=>a.dateStr.localeCompare(b.dateStr)||a.eid.localeCompare(b.eid));
  
  if(!sapMatchData.length){
    el.innerHTML='<div style="color:#22c55e;padding:8px;font-size:11px">✅ No mismatches found! SAP data matches biometric records.</div>';
    return;
  }
  
  // Summary
  const norecordCount=sapMatchData.filter(r=>r.bioStatus==='NO RECORD').length;
  const skipCount=sapMatchData.filter(r=>r.bioStatus==='SKIPPED').length;
  const shortCount=sapMatchData.filter(r=>r.bioStatus==='SHORT DUTY').length;
  
  let h='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">';
  h+='<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;background:#ef4444">Total: '+sapMatchData.length+'</span>';
  if(norecordCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;color:#ef4444;background:rgba(239,68,68,.1)">NO RECORD: '+norecordCount+'</span>';
  if(skipCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;color:#22c55e;background:rgba(34,197,94,.1)">SKIPPED: '+skipCount+'</span>';
  if(shortCount)h+='<span style="padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;color:#f59e0b;background:rgba(245,158,11,.1)">SHORT: '+shortCount+'</span>';
  h+='</div>';
  
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:8px;min-width:550px">';
  h+='<tr style="background:rgba(99,102,241,.1)"><th style="padding:4px;text-align:left;color:#818cf8">SN</th><th style="padding:4px;text-align:left;color:#818cf8">ID</th><th style="padding:4px;text-align:left;color:#818cf8">Name</th><th style="padding:4px;text-align:left;color:#818cf8">Desig</th><th style="padding:4px;text-align:left;color:#818cf8">Date</th><th style="padding:4px;text-align:left;color:#818cf8">IN</th><th style="padding:4px;text-align:left;color:#818cf8">OUT</th><th style="padding:4px;text-align:left;color:#818cf8">SAP Code</th><th style="padding:4px;text-align:left;color:#818cf8">Bio Status</th></tr>';
  
  sapMatchData.forEach((r,i)=>{
    const bioCol=r.bioStatus==='NO RECORD'?'#ef4444':r.bioStatus==='SKIPPED'?'#22c55e':'#f59e0b';
    h+='<tr style="border-bottom:1px solid rgba(255,255,255,.03)">';
    h+='<td style="padding:3px">'+(i+1)+'</td>';
    h+='<td style="padding:3px;color:#94a3b8;font-family:\'JetBrains Mono\',monospace;font-size:7px">'+r.eid+'</td>';
    h+='<td style="padding:3px;color:#e2e8f0;font-weight:500">'+r.name+'</td>';
    h+='<td style="padding:3px;color:#a5b4fc;font-size:7px">'+r.desig+'</td>';
    h+='<td style="padding:3px;color:#818cf8;font-weight:600">'+r.date+'</td>';
    h+='<td style="padding:3px;color:'+(r.inTime==='--'?'#f87171':'#94a3b8')+'">'+r.inTime+'</td>';
    h+='<td style="padding:3px;color:'+(r.outTime==='--'?'#f87171':'#94a3b8')+'">'+r.outTime+'</td>';
    h+='<td style="padding:3px;color:#22c55e;font-weight:700">'+r.sapCode+'</td>';
    h+='<td style="padding:3px;color:'+bioCol+';font-weight:700">'+r.bioStatus+'</td>';
    h+='</tr>';
  });
  h+='</table></div>';
  el.innerHTML=h;
}

function sapDownload(){
  if(!sapMatchData.length)return alert('Run Match first!');

let caData=[];


// ═══════ ADVANCED ATTENDANCE QUERY ═══════
function aqSelectYear(yr){

let aqResults=[];

function aqRun(){
  const monthSel=document.getElementById('aq-months');
  const selMonths=monthSel?Array.from(monthSel.selectedOptions).map(o=>o.value):[];
  if(!selMonths.length)return alert('Pehle month select karo!');
  
  const ppFilter=document.getElementById('aq-pp')?.value||'all';
  const desigFilter=document.getElementById('aq-desig')?.value||'all';
  const catFilter=document.getElementById('aq-cat')?.value||'all';
  const genderFilter=document.getElementById('aq-gender')?.value||'all';
  const field=document.getElementById('aq-field')?.value||'present';
  const op=document.getElementById('aq-op')?.value||'gte';
  const condVal=parseFloat(document.getElementById('aq-val')?.value);
  const hasCond=!isNaN(condVal);
  const exSun=document.getElementById('aq-exSun')?.checked;
  const exHol=document.getElementById('aq-exHol')?.checked;
  
  const holDates=new Set();
  if(exHol&&S.hols){Object.keys(S.hols).forEach(d=>holDates.add(d));}
  
  // Collect ALL employees across selected months
  const empMap={};
  selMonths.forEach(m=>{
    const md=yrAtt[m];if(!md)return;
    Object.entries(md).forEach(([eid,data])=>{
      if(!empMap[eid])empMap[eid]={name:data.name,days:{},months:[]};
      empMap[eid].months.push(m);
      Object.entries(data.days||{}).forEach(([dk,code])=>{
        empMap[eid].days[dk]=code;
      });
    });
  });
  
  // Apply filters and build results
  const results=[];
  Object.entries(empMap).forEach(([eid,data])=>{
    const emp=S.emps.find(e=>e.i===eid);
    const md=mdData.find(m=>m.pid===eid);
    
    // Pay point filter - check roster
    if(ppFilter!=='all'){
      const empPP=emp?.p||'';
      if(empPP!==ppFilter)return;
    }
    // Designation filter - check roster + master data
    if(desigFilter!=='all'){
      const empDesig=emp?.desig||emp?.chgDesig||md?.pos||'';
      if(empDesig!==desigFilter)return;
    }
    // Category filter - MR/DR from master data, S/U from roster
    if(catFilter!=='all'){
      if(catFilter==='MR'){
        const cat=(md?.empCat||'').toLowerCase();
        if(!cat.includes('monthly'))return;
      } else if(catFilter==='DR'){
        const cat=(md?.empCat||'').toLowerCase();
        if(!cat.includes('daily'))return;
      } else if(catFilter==='S'||catFilter==='U'){
        const ct=emp?.ct||'';
        if(ct!==catFilter)return;
      }
    }
    // Gender filter
    if(genderFilter!=='all'){
      const g=(md?.gender||'').toUpperCase().charAt(0);
      if(genderFilter==='M'&&g!=='M')return;
      if(genderFilter==='F'&&g!=='F')return;
    }
    
    // Count attendance
    const codes={};
    let totalDays=0,presentDays=0,absentDays=0,blankDays=0;
    
    Object.entries(data.days).forEach(([dk,code])=>{
      let dayOfWeek=-1;
      const dp=dk.split(/[.\/\-]/);
      if(dp.length===3){
        const d=parseInt(dp[0]),mo=parseInt(dp[1]),yr=parseInt(dp[2]);
        const dt=new Date(yr,mo-1,d);
        dayOfWeek=dt.getDay();
      }
      if(exSun&&dayOfWeek===0)return;
      if(exHol&&holDates.has(dk))return;
      
      totalDays++;
      const c=(code||'').trim().toUpperCase();
      if(!c||c==='BLANK'||c===''){blankDays++;return;}
      codes[c]=(codes[c]||0)+1;
      // Attendance = same as Archive: P,U,S,O/T,HD,HE,WE (YR_ATT_CODES)
      if(['P','P*','U','U*','S','O/T','HD','HE','WE','OD'].includes(c))presentDays++;
      // Absent = A only
      else if(['A','UA','UNA'].includes(c))absentDays++;
      // Leave = CL,SL,EL,CLH
      else if(['CL','CLH','SL','EL'].includes(c)){/*leave - not present not absent*/}
    });
    
    let leaveDays=(codes['CL']||0)+(codes['CLH']||0)+(codes['SL']||0)+(codes['EL']||0);
    let restDays=codes['R']||0;
    
    let fieldVal=0;
    if(field==='present')fieldVal=presentDays;
    else if(field==='absent')fieldVal=absentDays;
    else if(field==='leave')fieldVal=leaveDays;
    else if(field==='rest')fieldVal=restDays;
    else if(field==='total')fieldVal=totalDays;
    else if(field==='blank')fieldVal=blankDays;
    else fieldVal=codes[field.toUpperCase()]||0;
    
    if(hasCond){
      let pass=false;
      if(op==='gte')pass=fieldVal>=condVal;
      else if(op==='lte')pass=fieldVal<=condVal;
      else if(op==='eq')pass=fieldVal===condVal;
      else if(op==='gt')pass=fieldVal>condVal;
      else if(op==='lt')pass=fieldVal<condVal;
      else if(op==='neq')pass=fieldVal!==condVal;
      if(!pass)return;
    }
    
    results.push({
      eid,name:data.name||(md?.name)||'',
      pp:emp?.p||'',desig:emp?.desig||emp?.chgDesig||md?.pos||'',
      ct:emp?.ct||'',
      empCat:md?.empCat||'',
      gender:md?.gender||'',
      present:presentDays,absent:absentDays,leave:leaveDays,rest:restDays,total:totalDays,blank:blankDays,
      codes,fieldVal,
      months:data.months
    });
  });
  
  results.sort((a,b)=>b.fieldVal-a.fieldVal);
  aqResults=results;
  aqRenderResults();
  // Show search box
  const searchEl=document.getElementById('aq-search');
  if(searchEl){searchEl.style.display='block';searchEl.value='';}
  toast(results.length+' employees matched!');

function caGenerate(){
  const yrMonths=Object.keys(yrAtt).sort(yrSortMonths);
  if(!yrMonths.length)return alert('Upload attendance files first in Yearly Attendance!');
  
  const minDays=parseInt(document.getElementById('ca-min')?.value)||3;
  const maxDays=parseInt(document.getElementById('ca-max')?.value)||180;
  const el=document.getElementById('ca-results');
  if(!el)return;
  el.innerHTML='<div style="padding:10px;color:#a5b4fc;font-size:11px">Processing...</div>';
  
  setTimeout(()=>{
    // Build timeline: for each employee, find all dates with data
    // yrAtt structure: { "JAN-2026": { "22524318": { days:{1:"P",2:"CL",...}, name:"SANT" } } }
    
    // Collect all employee IDs from yrAtt
    const allEids=new Set();
    yrMonths.forEach(m=>{
      Object.keys(yrAtt[m]||{}).forEach(eid=>allEids.add(eid));
    });
    
    // For each employee, build sorted date→code map
    const today=new Date();
    caData=[];
    
    allEids.forEach(eid=>{
      const dateMap={};
      let latestDate=null;
      
      yrMonths.forEach(mk=>{
        const empData=yrAtt[mk]?.[eid];
        if(!empData)return;
        
        // Parse month key like "JAN-2026"
        const parts=mk.split('-');
        const monIdx=YMN.indexOf(parts[0]);
        const yr=parseInt(parts[1]);
        if(monIdx<0||isNaN(yr))return;
        
        // Days can be stored as:
        // Numeric keys: days[1]="P", days[2]="CL" 
        // OR date keys: days["01.10.2025"]="P"
        // Handle both formats
        if(empData.days){
          Object.entries(empData.days).forEach(([key,code])=>{
            if(!code)return;
            let dt;
            const numKey=parseInt(key);
            if(!isNaN(numKey)&&numKey>=1&&numKey<=31){
              // Numeric key
              dt=new Date(yr,monIdx,numKey);
            } else {
              // Date string key like "01.10.2025"
              const p=key.split('.');
              if(p.length===3){
                dt=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
              }
            }
            if(!dt||dt>today)return;
            const ds=fD(dt);
            dateMap[ds]=code;
            if(!latestDate||dt>latestDate)latestDate=dt;
          });
        }
      });
      
      if(!latestDate)return;
      
      // Also check main attendance data
      const rosterEmp=S.emps.find(e=>e.i===eid);
      if(rosterEmp){
        const key=ek(rosterEmp);
        // Scan main att for any recent entries
        for(let dd=0;dd<365;dd++){
          const dt=new Date(today);dt.setDate(dt.getDate()-dd);
          const ds=fD(dt);
          const c=gA(key,ds);
          if(c&&!dateMap[ds]){
            dateMap[ds]=c;
            if(dt>latestDate)latestDate=dt;
          }
        }
      }
      
      // Find last attendance date — HN bhi absent hi hai, chain nahi tootegi
      const absentCodes=new Set(['A','','BLANK','UA','UNA','HN','H']);
      
      let lastAttDate=null;
      const sortedDates=Object.keys(dateMap).sort().reverse();
      
      for(const ds of sortedDates){
        const code=dateMap[ds];
        if(code&&!absentCodes.has(code.trim().toUpperCase())){
          lastAttDate=new Date(ds+'T00:00:00');
          break;
        }
      }
      
      if(!lastAttDate)return; // No attendance found at all
      
      // Calculate absent days from lastAttDate+1 to today
      const absentSince=new Date(lastAttDate);
      absentSince.setDate(absentSince.getDate()+1);
      const diffMs=today.getTime()-absentSince.getTime();
      const absentDays=Math.floor(diffMs/(1000*60*60*24))+1;
      
      if(absentDays<minDays||absentDays>maxDays)return;
      
      // Get details
      const emp=S.emps.find(e=>e.i===eid);
      const md=mdData.length?mdData.find(m=>m.pid===eid):null;
      const desig=md?.pos||emp?.desig||'';
      const contract=emp?(emp.ct==='S'?'Surface':'Underground'):'';
      const pp=emp?ppN(emp.p):'';
      const name=emp?.n||yrAtt[yrMonths[0]]?.[eid]?.name||eid;
      
      caData.push({
        eid,name,desig,contract,pp,
        lastAttDate:lastAttDate,
        absentSince:absentSince,
        days:absentDays
      });
    });
    
    // Sort by days descending
    caData.sort((a,b)=>b.days-a.days);
    
    // Render
    if(!caData.length){
      el.innerHTML='<div style="padding:10px;color:#22c55e;font-size:12px">✅ No continuously absent employees found ('+minDays+'-'+maxDays+' days range)</div>';
      return;
    }
    
    const fmtDt=d=>`${String(d.getDate()).padStart(2,'0')}-${MO[d.getMonth()]}-${d.getFullYear()}`;
    
    let h='<div style="font-size:10px;color:#f87171;font-weight:600;margin-bottom:6px">Found '+caData.length+' employees continuously absent</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:9px">';
    h+='<tr style="background:rgba(239,68,68,.1)"><th style="padding:4px;text-align:left;color:#f87171">SN</th><th style="padding:4px;text-align:left;color:#f87171">ID</th><th style="padding:4px;text-align:left;color:#f87171">Name</th><th style="padding:4px;text-align:left;color:#f87171">Desig</th><th style="padding:4px;text-align:left;color:#f87171">Contract</th><th style="padding:4px;text-align:left;color:#f87171">Pay Point</th><th style="padding:4px;text-align:left;color:#f87171">Last Att</th><th style="padding:4px;text-align:left;color:#f87171">Absent Since</th><th style="padding:4px;text-align:left;color:#f87171">Days</th></tr>';
    
    caData.forEach((r,i)=>{
      const dayColor=r.days>=90?'#ef4444':r.days>=30?'#f59e0b':'#94a3b8';
      h+='<tr style="border-bottom:1px solid rgba(255,255,255,.03)">';
      h+='<td style="padding:3px 4px">'+(i+1)+'</td>';
      h+='<td style="padding:3px 4px;color:#94a3b8;font-family:\'JetBrains Mono\',monospace">'+r.eid+'</td>';
      h+='<td style="padding:3px 4px;color:#e2e8f0;font-weight:500">'+r.name+'</td>';
      h+='<td style="padding:3px 4px;color:#a5b4fc;font-size:8px">'+r.desig+'</td>';
      h+='<td style="padding:3px 4px;color:#64748b;font-size:8px">'+r.contract+'</td>';
      h+='<td style="padding:3px 4px;color:#64748b;font-size:8px">'+r.pp+'</td>';
      h+='<td style="padding:3px 4px;color:#22c55e;font-size:8px">'+fmtDt(r.lastAttDate)+'</td>';
      h+='<td style="padding:3px 4px;color:#f87171;font-size:8px">'+fmtDt(r.absentSince)+'</td>';
      h+='<td style="padding:3px 4px;color:'+dayColor+';font-weight:800;font-size:11px">'+r.days+'</td>';
      h+='</tr>';
    });
    h+='</table>';
    el.innerHTML=h;
  },100);
}

  const mon=parseInt(document.getElementById('ne-mon')?.value)||0;
  const yr=parseInt(document.getElementById('ne-yr')?.value)||2026;

function neDownload(){
  const eid=document.getElementById('ne-emp')?.value;if(!eid)return alert('Select employee first!');
  const emp=S.emps.find(e=>e.i===eid);if(!emp)return;
  const key=ek(emp);
  const codes=['P','P*','U','U*','S','WE','HD','HE','OD','CL','SL','EL','R','LL'];
  
  // Find all months that have data for this employee
  const monthsWithData=[];
  for(let y=2022;y<=2027;y++){
    for(let m=0;m<12;m++){
      const dim=dI(y,m);
      let hasData=false;
      for(let d=1;d<=dim;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(gA(key,ds)){hasData=true;break;}
      }
      if(hasData)monthsWithData.push({yr:y,mon:m});
    }
  }
  
  if(!monthsWithData.length)return alert('No attendance data found for '+emp.n);
  
  const wb=XLSX.utils.book_new();
  
  monthsWithData.forEach(({yr,mon})=>{
    const dim=dI(yr,mon);
    const row={'SN':1,'Employee ID':emp.i,'Employee Name':emp.n,'Pay Point':ppN(emp.p)};
    const counts={};codes.forEach(c=>counts[c]=0);
    
    for(let d=1;d<=dim;d++){
      const ds=`${yr}-${String(mon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const c=gA(key,ds)||'';
      row[String(d)]=c;
      if(c&&counts.hasOwnProperty(c))counts[c]++;
    }
    codes.forEach(c=>{row[c]=counts[c]||'';});
    
    const ws=XLSX.utils.json_to_sheet([row]);
    const cols=[{wch:4},{wch:13},{wch:26},{wch:12}];
    for(let d=1;d<=dim;d++)cols.push({wch:4});
    codes.forEach(()=>cols.push({wch:4}));
    ws['!cols']=cols;
    
    const sheetName=MO[mon]+' '+yr;
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });
  
  XLSX.writeFile(wb,'Attendance_'+emp.n.replace(/\s+/g,'_')+'.xlsx');
  toast(monthsWithData.length+' months downloaded for '+emp.n);
}

}

    h+='<tr>';
    h+='<td style="font-size:10px;padding:4px 6px;color:#64748b">'+(i+1)+'</td>';
    h+='<td style="font-size:10px;padding:4px 6px;color:#94a3b8;font-family:\'JetBrains Mono\',monospace">'+e.i+'</td>';
    h+='<td style="font-size:10px;padding:4px 6px;font-weight:500">'+e.n+'</td>';
    h+='<td style="font-size:9px;padding:4px 6px;color:#64748b">'+ppN(e.p)+'</td>';
    h+='<td style="padding:3px 4px"><input type="number" class="inp" style="width:60px;font-size:12px;font-weight:700;text-align:center;color:#818cf8" value="'+(hrs||'')+'" min="0" max="999" onchange="nightSetHrs(\''+e.i+'\',this.value)" placeholder="0"></td>';
    h+='</tr>';
  });
  
  h+='</tbody></table></div></div>';

  Object.values(data).forEach(v=>{if(v){totalHrs+=parseFloat(v)||0;filledCount++;}});
  h+='<div style="margin-top:8px;font-size:11px;color:#94a3b8">Total: <span style="color:#818cf8;font-weight:700">'+totalHrs+' hrs</span> across <span style="color:#a5b4fc;font-weight:600">'+filledCount+'</span> employees</div>';
  
  el.innerHTML=h;

function nightSetHrs(eid,val){
  const key=nightGetKey();
  if(!nightData[key])nightData[key]={};
  const num=parseFloat(val);
  if(!val||isNaN(num)||num<=0){
    delete nightData[key][eid];
  } else {
    nightData[key][eid]=num;
  }
  nightSave();
}

function nightDownload(){
  const key=nightGetKey();
  const data=nightData[key]||{};
  const ppF=S.ppF||'all';
  const fil=S.emps.filter(e=>ppF==='all'||e.p===ppF);
  
  const rows=fil.map((e,i)=>({
    'SN':i+1,
    'Employee ID':e.i,
    'Employee Name':e.n,
    'Pay Point':ppN(e.p),
    'Night Hours':data[e.i]||0
  }));
  
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:13},{wch:26},{wch:12},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Night Hours');
  XLSX.writeFile(wb,'Night_Hours_'+MF[S.mon]+'_'+S.yr+'.xlsx');
  toast('Night Hours downloaded!');
}

function rtParseBio(buffer){
  try{
  var data=new Uint8Array(buffer);
  var wb=XLSX.read(data,{type:'array',cellText:true,cellDates:false});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
  var result=[];
  for(var r=1;r<rows.length;r++){
    var row=rows[r];
    var eid=String(row[0]||'').trim();
    if(!eid)continue;
    var name=String(row[1]||'').trim();
    var inRaw=String(row[3]||'');
    var outRaw=String(row[5]||'');
    // Get HH:MM from time string like "04:25:33" or "21:22:27"
    var inM=inRaw.match(/(\d{1,2}):(\d{2})/);
    var outM=outRaw.match(/(\d{1,2}):(\d{2})/);
    var inTime=inM?(inM[1].padStart(2,'0')+':'+inM[2]):'';
    var outTime=outM?(outM[1].padStart(2,'0')+':'+outM[2]):'';
    if(!inTime)continue;
    result.push({eid:eid,name:name,inTime:inTime,outTime:outTime,sameInOut:inTime===outTime});
  }
  return result;
  }catch(err){alert('Parse error: '+err.message);return [];}
}</script></body></html>
